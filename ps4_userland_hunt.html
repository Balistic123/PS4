<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>USB Access Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: monospace; background: #000; color: #0f0; padding: 10px; font-size: 11px; line-height: 1.3; }
        h1 { color: #f00; font-size: 18px; margin-bottom: 10px; text-align: center; border-bottom: 2px solid #f00; padding-bottom: 5px; }
        .section { background: #1a0000; border: 2px solid #f00; margin: 8px 0; padding: 10px; height: calc(100vh - 100px); overflow-y: auto; }
        .btn { padding: 10px 20px; background: #f00; border: none; color: #fff; margin: 5px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .log { padding: 2px 0; font-size: 11px; }
        .success { color: #0f0; font-weight: bold; }
        .fail { color: #f00; font-weight: bold; }
        .warn { color: #ff0; font-weight: bold; }
        .info { color: #0ff; }
        .critical { color: #f0f; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🔌 USB ACCESS TEST 🔌</h1>
    <div style="text-align: center; margin-bottom: 8px;">
        <button class="btn" onclick="testAll()">RUN ALL TESTS</button>
    </div>
    <div class="section"><div id="log"></div></div>

<script>
function log(msg, type) {
    var div = document.createElement('div');
    div.className = 'log ' + (type || '');
    div.textContent = msg;
    document.getElementById('log').appendChild(div);
}

function testAll() {
    document.getElementById('log').innerHTML = '';
    log('═══════════════════════════════════════', 'critical');
    log('       USB/FILE SYSTEM ACCESS TEST       ', 'critical');
    log('═══════════════════════════════════════', 'critical');
    log('', '');
    
    // Test 1: File API
    log('[TEST 1] File API', 'info');
    if (typeof File !== 'undefined') {
        log('  ✓ File API available', 'success');
    } else {
        log('  ✗ File API NOT available', 'fail');
    }
    
    if (typeof FileReader !== 'undefined') {
        log('  ✓ FileReader available', 'success');
    } else {
        log('  ✗ FileReader NOT available', 'fail');
    }
    
    if (typeof Blob !== 'undefined') {
        log('  ✓ Blob API available', 'success');
    } else {
        log('  ✗ Blob API NOT available', 'fail');
    }
    log('', '');
    
    // Test 2: File Input
    log('[TEST 2] File Input Element', 'info');
    try {
        var input = document.createElement('input');
        input.type = 'file';
        log('  ✓ <input type="file"> created', 'success');
        log('  ✓ Can trigger: input.click()', 'success');
    } catch(e) {
        log('  ✗ Error: ' + e.message, 'fail');
    }
    log('', '');
    
    // Test 3: FileSystem API
    log('[TEST 3] FileSystem API', 'info');
    if (typeof requestFileSystem !== 'undefined') {
        log('  ✓ requestFileSystem available', 'critical');
    } else {
        log('  ✗ requestFileSystem NOT available', 'fail');
    }
    
    if (typeof webkitRequestFileSystem !== 'undefined') {
        log('  ✓ webkitRequestFileSystem available', 'critical');
    } else {
        log('  ✗ webkitRequestFileSystem NOT available', 'fail');
    }
    log('', '');
    
    // Test 4: Direct path access attempts
    log('[TEST 4] Direct Path Access Attempts', 'info');
    var paths = [
        '/mnt/usb0/',
        '/mnt/usb1/',
        '/usb0/',
        '/usb1/',
        '/dev/usb/',
        'file:///mnt/usb0/',
        '/hostapp/',
        '/system/',
        '/data/',
        '/user/'
    ];
    
    for (var i = 0; i < paths.length; i++) {
        try {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', paths[i], false);
            xhr.send();
            log('  [!] ' + paths[i] + ' → status: ' + xhr.status, 'critical');
        } catch(e) {
            log('  ✗ ' + paths[i] + ' → ' + e.message, 'warn');
        }
    }
    log('', '');
    
    // Test 5: WebUSB API
    log('[TEST 5] WebUSB API', 'info');
    if (typeof navigator.usb !== 'undefined') {
        log('  ✓ navigator.usb available', 'critical');
        try {
            navigator.usb.getDevices().then(function(devices) {
                log('  ✓ USB devices: ' + devices.length, 'critical');
            }).catch(function(e) {
                log('  ✗ getDevices error: ' + e.message, 'fail');
            });
        } catch(e) {
            log('  ✗ Error: ' + e.message, 'fail');
        }
    } else {
        log('  ✗ navigator.usb NOT available', 'fail');
    }
    log('', '');
    
    // Test 6: Storage APIs
    log('[TEST 6] Storage APIs', 'info');
    if (typeof navigator.storage !== 'undefined') {
        log('  ✓ navigator.storage available', 'success');
    } else {
        log('  ✗ navigator.storage NOT available', 'fail');
    }
    
    if (typeof navigator.getStorageUpdates !== 'undefined') {
        log('  ✓ navigator.getStorageUpdates available', 'critical');
    } else {
        log('  ✗ navigator.getStorageUpdates NOT available', 'fail');
    }
    log('', '');
    
    // Test 7: Create download link (file:// protocol)
    log('[TEST 7] File Download/Save', 'info');
    try {
        var blob = new Blob(['TEST DATA'], {type: 'text/plain'});
        var url = URL.createObjectURL(blob);
        log('  ✓ Blob URL created: ' + url.substring(0, 50) + '...', 'success');
        
        var a = document.createElement('a');
        a.href = url;
        a.download = 'test.txt';
        log('  ✓ Download link created', 'success');
    } catch(e) {
        log('  ✗ Error: ' + e.message, 'fail');
    }
    log('', '');
    
    // Test 8: XMLHttpRequest to file paths
    log('[TEST 8] XHR File Protocol Test', 'info');
    var filePaths = [
        'file:///mnt/usb0/test.txt',
        'file:///usb0/test.txt',
        'file:///data/test.txt'
    ];
    
    for (var i = 0; i < filePaths.length; i++) {
        try {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', filePaths[i], false);
            xhr.send();
            log('  [!] ' + filePaths[i] + ' → ' + xhr.status, 'critical');
        } catch(e) {
            log('  ✗ ' + filePaths[i] + ' → ' + e.message, 'warn');
        }
    }
    log('', '');
    
    // Test 9: Fetch API
    log('[TEST 9] Fetch API File Access', 'info');
    if (typeof fetch !== 'undefined') {
        log('  ✓ fetch() available', 'success');
        
        fetch('file:///mnt/usb0/test.txt').then(function(r) {
            log('  [!] Fetch succeeded! Status: ' + r.status, 'critical');
        }).catch(function(e) {
            log('  ✗ Fetch failed: ' + e.message, 'warn');
        });
    } else {
        log('  ✗ fetch() NOT available', 'fail');
    }
    log('', '');
    
    // Test 10: IndexedDB
    log('[TEST 10] IndexedDB', 'info');
    if (typeof indexedDB !== 'undefined') {
        log('  ✓ IndexedDB available', 'success');
    } else {
        log('  ✗ IndexedDB NOT available', 'fail');
    }
    log('', '');
    
    log('═══════════════════════════════════════', 'critical');
    log('              TEST COMPLETE              ', 'critical');
    log('═══════════════════════════════════════', 'critical');
}
</script>
</body>
</html>
