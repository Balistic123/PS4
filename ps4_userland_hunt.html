<!DOCTYPE html>
<html>
<head>
<style id="s">
@font-face { font-family: x; src: url(nonexistent-font.woff); unicode-range: U+0042; }
</style>
</head>
<body>
<div id="log" style="font-family: monospace; font-size: 14px; white-space: pre;"></div>
<script>
function log(msg) {
    let d = document.getElementById('log');
    if (d) d.textContent += msg + '\n';
}

window.onload = () => {
    log('START\n');
    
    let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
    document.fonts.add(A);
    void A.loaded;
    
    let fired = false;
    Object.defineProperty(FontFace.prototype, 'then', {
        configurable: true,
        get() {
            if (!fired && this === A) {
                fired = true;
                
                log('1. Inside getter');
                
                log('2. Creating y font...');
                let y = new FontFace('y', 'local(Helvetica Bold)', { unicodeRange: 'U+0041' });
                log('   y created OK');
                
                log('3. Creating z font...');
                let z = new FontFace('z', 'local(Helvetica Italic)', { unicodeRange: 'U+0041' });
                log('   z created OK');
                
                log('4. Deleting CSS rule...');
                document.getElementById('s').sheet.deleteRule(0);
                log('   Deleted OK');
                
                log('5. Calling offsetTop...');
                document.body.offsetTop;
                log('   offsetTop OK');
                
                log('6. Returning undefined...');
            }
            return undefined;
        }
    });
    
    log('Calling fonts.load...\n');
    document.fonts.load('1em x', 'AB');
    
    log('\nAfter fonts.load - this will not show if OOM happens');
};
</script>
</body>
</html>
