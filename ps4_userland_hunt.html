<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PS4 Fingerprint</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: monospace; background: #000; color: #0f0; padding: 15px; font-size: 13px; line-height: 1.5; }
        h1 { color: #0f0; font-size: 22px; margin-bottom: 15px; text-align: center; border-bottom: 2px solid #0f0; padding-bottom: 10px; }
        .btn { padding: 15px 25px; background: #0f0; border: none; color: #000; margin: 5px; cursor: pointer; font-size: 14px; font-weight: bold; width: 100%; max-width: 300px; }
        .btn-container { text-align: center; margin-bottom: 20px; }
        .status { background: rgba(0,255,0,0.1); border: 1px solid #0f0; padding: 15px; margin: 10px 0; text-align: center; font-size: 16px; font-weight: bold; }
        .section { background: #0a0a0a; border: 2px solid #0f0; margin: 15px 0; padding: 15px; }
        .section-title { color: #0ff; font-size: 18px; font-weight: bold; margin-bottom: 12px; border-bottom: 2px solid #0ff; padding-bottom: 8px; }
        .item { padding: 8px 0; border-bottom: 1px solid #222; display: flex; justify-content: space-between; }
        .item:last-child { border-bottom: none; }
        .item-name { color: #fff; font-weight: bold; flex: 1; }
        .item-value { color: #ccc; flex: 2; padding: 0 10px; }
        .item-status { font-weight: bold; width: 60px; text-align: center; }
        .yes { color: #0f0; }
        .no { color: #f00; }
        .warn { color: #ff0; }
    </style>
</head>
<body>
    <h1>🎮 PS4 BROWSER FINGERPRINT 🎮</h1>
    
    <div class="btn-container">
        <button class="btn" onclick="runAllTests()">▶ RUN ALL TESTS</button>
    </div>
    
    <div class="status" id="status">Ready. Click "RUN ALL TESTS" to begin.</div>
    
    <div id="results"></div>

<script>
function log(msg) {
    document.getElementById('status').textContent = msg;
    document.getElementById('status').scrollIntoView({ behavior: 'smooth' });
}

function addSection(title) {
    var section = document.createElement('div');
    section.className = 'section';
    section.innerHTML = '<div class="section-title">' + title + '</div><div id="s_' + title.replace(/\W/g, '') + '"></div>';
    document.getElementById('results').appendChild(section);
    return 's_' + title.replace(/\W/g, '');
}

function addItem(sectionId, name, value, status) {
    var container = document.getElementById(sectionId);
    if (!container) return;
    
    var item = document.createElement('div');
    item.className = 'item';
    
    var nameDiv = document.createElement('div');
    nameDiv.className = 'item-name';
    nameDiv.textContent = name;
    
    var valueDiv = document.createElement('div');
    valueDiv.className = 'item-value';
    valueDiv.textContent = value;
    
    var statusDiv = document.createElement('div');
    statusDiv.className = 'item-status ' + (status || '');
    statusDiv.textContent = status === 'yes' ? '✓ YES' : status === 'no' ? '✗ NO' : status === 'warn' ? '⚠ WARN' : '•';
    
    item.appendChild(nameDiv);
    item.appendChild(valueDiv);
    item.appendChild(statusDiv);
    container.appendChild(item);
}

function runAllTests() {
    log('🔄 Running tests... Please wait...');
    document.getElementById('results').innerHTML = '';
    
    setTimeout(function() {
        
        // ===== SECTION 1: BASIC INFO =====
        var s1 = addSection('📱 01. BASIC INFORMATION');
        addItem(s1, 'User Agent', navigator.userAgent, '');
        addItem(s1, 'Platform', navigator.platform, '');
        
        var wk = navigator.userAgent.match(/WebKit\/([0-9.]+)/);
        addItem(s1, 'WebKit Version', wk ? wk[1] : 'Unknown', 'warn');
        
        var safari = navigator.userAgent.match(/Version\/([0-9.]+)/);
        addItem(s1, 'Safari Version', safari ? safari[1] : 'Unknown', 'warn');
        
        var fw = navigator.userAgent.match(/PlayStation 4\/([0-9.]+)/);
        addItem(s1, 'PS4 Firmware', fw ? fw[1] : 'Unknown', 'warn');
        
        addItem(s1, 'Language', navigator.language, '');
        addItem(s1, 'CPU Cores', navigator.hardwareConcurrency || 'Unknown', 'warn');
        addItem(s1, 'Device Memory', navigator.deviceMemory ? navigator.deviceMemory + ' GB' : 'Unknown', 'warn');
        addItem(s1, 'Screen Width', screen.width + 'px', '');
        addItem(s1, 'Screen Height', screen.height + 'px', '');
        addItem(s1, 'Color Depth', screen.colorDepth + ' bits', '');
        
        // ===== SECTION 2: JAVASCRIPT CORE =====
        var s2 = addSection('⚙️ 02. JAVASCRIPT CORE');
        addItem(s2, 'Promise', typeof Promise !== 'undefined' ? 'Available' : 'Not Available', typeof Promise !== 'undefined' ? 'yes' : 'no');
        addItem(s2, 'Proxy', typeof Proxy !== 'undefined' ? 'Available' : 'Not Available', typeof Proxy !== 'undefined' ? 'yes' : 'no');
        addItem(s2, 'Symbol', typeof Symbol !== 'undefined' ? 'Available' : 'Not Available', typeof Symbol !== 'undefined' ? 'yes' : 'no');
        addItem(s2, 'Reflect', typeof Reflect !== 'undefined' ? 'Available' : 'Not Available', typeof Reflect !== 'undefined' ? 'yes' : 'no');
        addItem(s2, 'Map', typeof Map !== 'undefined' ? 'Available' : 'Not Available', typeof Map !== 'undefined' ? 'yes' : 'no');
        addItem(s2, 'Set', typeof Set !== 'undefined' ? 'Available' : 'Not Available', typeof Set !== 'undefined' ? 'yes' : 'no');
        addItem(s2, 'WeakMap', typeof WeakMap !== 'undefined' ? 'Available' : 'Not Available', typeof WeakMap !== 'undefined' ? 'yes' : 'no');
        addItem(s2, 'WeakSet', typeof WeakSet !== 'undefined' ? 'Available' : 'Not Available', typeof WeakSet !== 'undefined' ? 'yes' : 'no');
        addItem(s2, 'WeakRef', typeof WeakRef !== 'undefined' ? 'Available' : 'Not Available', typeof WeakRef !== 'undefined' ? 'yes' : 'no');
        addItem(s2, 'FinalizationRegistry', typeof FinalizationRegistry !== 'undefined' ? 'Available' : 'Not Available', typeof FinalizationRegistry !== 'undefined' ? 'yes' : 'no');
        addItem(s2, 'BigInt', typeof BigInt !== 'undefined' ? 'Available' : 'Not Available', typeof BigInt !== 'undefined' ? 'yes' : 'no');
        addItem(s2, 'Intl', typeof Intl !== 'undefined' ? 'Available' : 'Not Available', typeof Intl !== 'undefined' ? 'yes' : 'no');
        
        // ===== SECTION 3: TYPEDARRAYS =====
        var s3 = addSection('🔢 03. TYPEDARRAYS & BINARY');
        addItem(s3, 'ArrayBuffer', typeof ArrayBuffer !== 'undefined' ? 'Available' : 'Not Available', typeof ArrayBuffer !== 'undefined' ? 'yes' : 'no');
        addItem(s3, 'SharedArrayBuffer', typeof SharedArrayBuffer !== 'undefined' ? 'Available' : 'Not Available', typeof SharedArrayBuffer !== 'undefined' ? 'yes' : 'no');
        addItem(s3, 'DataView', typeof DataView !== 'undefined' ? 'Available' : 'Not Available', typeof DataView !== 'undefined' ? 'yes' : 'no');
        addItem(s3, 'Uint8Array', typeof Uint8Array !== 'undefined' ? 'Available' : 'Not Available', typeof Uint8Array !== 'undefined' ? 'yes' : 'no');
        addItem(s3, 'Uint32Array', typeof Uint32Array !== 'undefined' ? 'Available' : 'Not Available', typeof Uint32Array !== 'undefined' ? 'yes' : 'no');
        addItem(s3, 'Float64Array', typeof Float64Array !== 'undefined' ? 'Available' : 'Not Available', typeof Float64Array !== 'undefined' ? 'yes' : 'no');
        addItem(s3, 'BigInt64Array', typeof BigInt64Array !== 'undefined' ? 'Available' : 'Not Available', typeof BigInt64Array !== 'undefined' ? 'yes' : 'no');
        addItem(s3, 'Atomics', typeof Atomics !== 'undefined' ? 'Available' : 'Not Available', typeof Atomics !== 'undefined' ? 'yes' : 'no');
        
        // ===== SECTION 4: WEB APIS =====
        var s4 = addSection('🌐 04. WEB APIS');
        addItem(s4, 'fetch', typeof fetch !== 'undefined' ? 'Available' : 'Not Available', typeof fetch !== 'undefined' ? 'yes' : 'no');
        addItem(s4, 'XMLHttpRequest', typeof XMLHttpRequest !== 'undefined' ? 'Available' : 'Not Available', typeof XMLHttpRequest !== 'undefined' ? 'yes' : 'no');
        addItem(s4, 'WebSocket', typeof WebSocket !== 'undefined' ? 'Available' : 'Not Available', typeof WebSocket !== 'undefined' ? 'yes' : 'no');
        addItem(s4, 'Worker', typeof Worker !== 'undefined' ? 'Available' : 'Not Available', typeof Worker !== 'undefined' ? 'yes' : 'no');
        addItem(s4, 'ServiceWorker', 'serviceWorker' in navigator ? 'Available' : 'Not Available', 'serviceWorker' in navigator ? 'yes' : 'no');
        addItem(s4, 'Blob', typeof Blob !== 'undefined' ? 'Available' : 'Not Available', typeof Blob !== 'undefined' ? 'yes' : 'no');
        addItem(s4, 'FileReader', typeof FileReader !== 'undefined' ? 'Available' : 'Not Available', typeof FileReader !== 'undefined' ? 'yes' : 'no');
        
        // ===== SECTION 5: WEBASSEMBLY =====
        var s5 = addSection('⚙️ 05. WEBASSEMBLY');
        var wasmAvail = typeof WebAssembly !== 'undefined';
        addItem(s5, 'WebAssembly', wasmAvail ? 'Available' : 'NOT AVAILABLE', wasmAvail ? 'yes' : 'no');
        
        if (wasmAvail) {
            addItem(s5, 'WebAssembly.Module', typeof WebAssembly.Module !== 'undefined' ? 'Available' : 'Not Available', typeof WebAssembly.Module !== 'undefined' ? 'yes' : 'no');
            addItem(s5, 'WebAssembly.Instance', typeof WebAssembly.Instance !== 'undefined' ? 'Available' : 'Not Available', typeof WebAssembly.Instance !== 'undefined' ? 'yes' : 'no');
            
            try {
                var wasm = new Uint8Array([0,97,115,109,1,0,0,0,1,7,1,96,0,1,127,3,2,1,0,7,10,1,6,97,110,115,119,101,114,0,0,10,9,1,7,0,65,42,15,11]);
                var mod = new WebAssembly.Module(wasm);
                var inst = new WebAssembly.Instance(mod);
                var res = inst.exports.answer();
                addItem(s5, 'Compile & Execute Test', 'SUCCESS! Returned: ' + res, 'yes');
            } catch(e) {
                addItem(s5, 'Compile & Execute Test', 'FAILED: ' + e.message, 'no');
            }
        }
        
        // ===== SECTION 6: FONT APIS (CVE-2021-30858) =====
        var s6 = addSection('🔤 06. FONT APIS (CVE-2021-30858)');
        addItem(s6, 'FontFace', typeof FontFace !== 'undefined' ? 'Available' : 'Not Available', typeof FontFace !== 'undefined' ? 'yes' : 'no');
        addItem(s6, 'FontFaceSet', typeof FontFaceSet !== 'undefined' ? 'Available' : 'Not Available', typeof FontFaceSet !== 'undefined' ? 'yes' : 'no');
        addItem(s6, 'document.fonts', typeof document.fonts !== 'undefined' ? 'Available' : 'Not Available', typeof document.fonts !== 'undefined' ? 'yes' : 'no');
        
        if (typeof FontFace !== 'undefined' && typeof FontFaceSet !== 'undefined') {
            try {
                var ff = new FontFace("test", "");
                var ffs = new FontFaceSet([ff]);
                addItem(s6, 'CVE-2021-30858 Attack Surface', '⚠️ PRESENT - EXPLOITABLE!', 'warn');
            } catch(e) {
                addItem(s6, 'CVE-2021-30858 Attack Surface', 'Not exploitable: ' + e.message, 'no');
            }
        }
        
        // ===== SECTION 7: GRAPHICS =====
        var s7 = addSection('🎨 07. GRAPHICS APIS');
        var canvas = document.createElement('canvas');
        var hasCanvas = !!canvas.getContext;
        addItem(s7, 'Canvas', hasCanvas ? 'Available' : 'Not Available', hasCanvas ? 'yes' : 'no');
        
        if (hasCanvas) {
            var ctx2d = canvas.getContext('2d');
            addItem(s7, 'Canvas 2D', ctx2d ? 'Available' : 'Not Available', ctx2d ? 'yes' : 'no');
            
            var gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
            addItem(s7, 'WebGL', gl ? 'Available' : 'Not Available', gl ? 'yes' : 'no');
            
            if (gl) {
                try {
                    addItem(s7, 'WebGL Vendor', gl.getParameter(gl.VENDOR), 'warn');
                    addItem(s7, 'WebGL Renderer', gl.getParameter(gl.RENDERER), 'warn');
                    addItem(s7, 'WebGL Version', gl.getParameter(gl.VERSION), 'warn');
                    addItem(s7, 'GLSL Version', gl.getParameter(gl.SHADING_LANGUAGE_VERSION), 'warn');
                } catch(e) {
                    addItem(s7, 'WebGL Info', 'Error: ' + e.message, 'no');
                }
            }
            
            var gl2 = canvas.getContext('webgl2');
            addItem(s7, 'WebGL 2', gl2 ? 'Available' : 'Not Available', gl2 ? 'yes' : 'no');
        }
        
        addItem(s7, 'OffscreenCanvas', typeof OffscreenCanvas !== 'undefined' ? 'Available' : 'Not Available', typeof OffscreenCanvas !== 'undefined' ? 'yes' : 'no');
        
        // ===== SECTION 8: STORAGE =====
        var s8 = addSection('💾 08. STORAGE APIS');
        
        try {
            localStorage.setItem('test_fp', '1');
            localStorage.removeItem('test_fp');
            addItem(s8, 'localStorage', 'Works', 'yes');
        } catch(e) {
            addItem(s8, 'localStorage', 'Error: ' + e.message, 'no');
        }
        
        try {
            sessionStorage.setItem('test_fp', '1');
            sessionStorage.removeItem('test_fp');
            addItem(s8, 'sessionStorage', 'Works', 'yes');
        } catch(e) {
            addItem(s8, 'sessionStorage', 'Error: ' + e.message, 'no');
        }
        
        addItem(s8, 'IndexedDB', typeof indexedDB !== 'undefined' ? 'Available' : 'Not Available', typeof indexedDB !== 'undefined' ? 'yes' : 'no');
        addItem(s8, 'Cache API', typeof caches !== 'undefined' ? 'Available' : 'Not Available', typeof caches !== 'undefined' ? 'yes' : 'no');
        
        // ===== SECTION 9: CRYPTO =====
        var s9 = addSection('🔐 09. CRYPTO APIS');
        var hasCrypto = typeof crypto !== 'undefined';
        addItem(s9, 'crypto', hasCrypto ? 'Available' : 'Not Available', hasCrypto ? 'yes' : 'no');
        
        if (hasCrypto) {
            addItem(s9, 'crypto.getRandomValues', typeof crypto.getRandomValues !== 'undefined' ? 'Available' : 'Not Available', typeof crypto.getRandomValues !== 'undefined' ? 'yes' : 'no');
            addItem(s9, 'crypto.subtle', typeof crypto.subtle !== 'undefined' ? 'Available' : 'Not Available', typeof crypto.subtle !== 'undefined' ? 'yes' : 'no');
            addItem(s9, 'crypto.randomUUID', typeof crypto.randomUUID !== 'undefined' ? 'Available' : 'Not Available', typeof crypto.randomUUID !== 'undefined' ? 'yes' : 'no');
        }
        
        // ===== SECTION 10: SECURITY =====
        var s10 = addSection('🔒 10. SECURITY FEATURES');
        
        try {
            eval('1+1');
            addItem(s10, 'eval()', 'ALLOWED', 'warn');
        } catch(e) {
            addItem(s10, 'eval()', 'Blocked: ' + e.message, 'yes');
        }
        
        try {
            new Function('return 1')();
            addItem(s10, 'Function constructor', 'ALLOWED', 'warn');
        } catch(e) {
            addItem(s10, 'Function constructor', 'Blocked: ' + e.message, 'yes');
        }
        
        // ===== SECTION 11: PERFORMANCE =====
        var s11 = addSection('⏱️ 11. PERFORMANCE & MEMORY');
        addItem(s11, 'performance', typeof performance !== 'undefined' ? 'Available' : 'Not Available', typeof performance !== 'undefined' ? 'yes' : 'no');
        addItem(s11, 'performance.now', typeof performance !== 'undefined' && performance.now ? 'Available' : 'Not Available', typeof performance !== 'undefined' && performance.now ? 'yes' : 'no');
        
        if (performance && performance.memory) {
            addItem(s11, 'JS Heap Size Limit', (performance.memory.jsHeapSizeLimit / 1024 / 1024).toFixed(2) + ' MB', 'warn');
            addItem(s11, 'Total JS Heap Size', (performance.memory.totalJSHeapSize / 1024 / 1024).toFixed(2) + ' MB', 'warn');
            addItem(s11, 'Used JS Heap Size', (performance.memory.usedJSHeapSize / 1024 / 1024).toFixed(2) + ' MB', 'warn');
        } else {
            addItem(s11, 'performance.memory', 'Not Available', 'no');
        }
        
        // ===== SECTION 12: MEDIA =====
        var s12 = addSection('🎵 12. MEDIA APIS');
        addItem(s12, 'Audio', typeof Audio !== 'undefined' ? 'Available' : 'Not Available', typeof Audio !== 'undefined' ? 'yes' : 'no');
        addItem(s12, 'Video', typeof HTMLVideoElement !== 'undefined' ? 'Available' : 'Not Available', typeof HTMLVideoElement !== 'undefined' ? 'yes' : 'no');
        addItem(s12, 'AudioContext', typeof AudioContext !== 'undefined' || typeof webkitAudioContext !== 'undefined' ? 'Available' : 'Not Available', (typeof AudioContext !== 'undefined' || typeof webkitAudioContext !== 'undefined') ? 'yes' : 'no');
        addItem(s12, 'MediaSource', typeof MediaSource !== 'undefined' ? 'Available' : 'Not Available', typeof MediaSource !== 'undefined' ? 'yes' : 'no');
        addItem(s12, 'RTCPeerConnection', typeof RTCPeerConnection !== 'undefined' ? 'Available' : 'Not Available', typeof RTCPeerConnection !== 'undefined' ? 'yes' : 'no');
        
        // ===== SECTION 13: MISC =====
        var s13 = addSection('🎮 13. MISCELLANEOUS');
        addItem(s13, 'Gamepad API', typeof navigator.getGamepads !== 'undefined' ? 'Available' : 'Not Available', typeof navigator.getGamepads !== 'undefined' ? 'yes' : 'no');
        addItem(s13, 'Geolocation', typeof navigator.geolocation !== 'undefined' ? 'Available' : 'Not Available', typeof navigator.geolocation !== 'undefined' ? 'yes' : 'no');
        addItem(s13, 'Vibration', typeof navigator.vibrate !== 'undefined' ? 'Available' : 'Not Available', typeof navigator.vibrate !== 'undefined' ? 'yes' : 'no');
        addItem(s13, 'Notification', typeof Notification !== 'undefined' ? 'Available' : 'Not Available', typeof Notification !== 'undefined' ? 'yes' : 'no');
        addItem(s13, 'Clipboard API', typeof navigator.clipboard !== 'undefined' ? 'Available' : 'Not Available', typeof navigator.clipboard !== 'undefined' ? 'yes' : 'no');
        
        log('✅ ALL TESTS COMPLETE! Scroll down to see all results. Take screenshots!');
        
    }, 100);
}

window.onerror = function(msg, url, line) {
    log('❌ ERROR: ' + msg + ' (line ' + line + ')');
    return true;
};
</script>
</body>
</html>
