<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PS4 WebKit Info</title>
<style>
    body {
        background: #111;
        color: #0f0;
        font-family: monospace;
        padding: 20px;
        word-wrap: break-word;
    }

    .box {
        border: 1px solid #0f0;
        padding: 15px;
        margin-bottom: 15px;
    }

    h1 {
        color: #fff;
    }
</style>
</head>
<body>

<h1>PS4 Browser / WebKit Detector</h1>

<div class="box">
    <h2>User Agent</h2>
    <div id="ua"></div>
</div>

<div class="box">
    <h2>Detected Safari Version</h2>
    <div id="safari"></div>
</div>

<div class="box">
    <h2>Detected AppleWebKit Version</h2>
    <div id="webkit"></div>
</div>

<div class="box">
    <h2>Extra Features</h2>
    <div id="features"></div>
</div>

<script>
const ua = navigator.userAgent;

document.getElementById("ua").textContent = ua;

// Detect AppleWebKit version
const wkMatch = ua.match(/AppleWebKit\/([0-9.]+)/);
const wkVersion = wkMatch ? wkMatch[1] : "Unknown";

document.getElementById("webkit").textContent = wkVersion;

// Detect Safari version
const safariMatch = ua.match(/Version\/([0-9.]+)/);
const safariVersion = safariMatch ? safariMatch[1] : "Unknown";

document.getElementById("safari").textContent = safariVersion;

// Feature checks
const features = [
    ["WebAssembly", typeof WebAssembly !== "undefined"],
    ["SharedArrayBuffer", typeof SharedArrayBuffer !== "undefined"],
    ["AudioContext", typeof AudioContext !== "undefined"],
    ["WebGL", !!document.createElement('canvas').getContext('webgl')],
    ["ServiceWorker", 'serviceWorker' in navigator],
    ["IndexedDB", 'indexedDB' in window],
    ["WebRTC", !!window.RTCPeerConnection],
    ["OffscreenCanvas", typeof OffscreenCanvas !== "undefined"],
];

let featureHTML = "";

features.forEach(f => {
    featureHTML += `${f[0]}: ${f[1] ? "YES" : "NO"}<br>`;
});

document.getElementById("features").innerHTML = featureHTML;

console.log("User Agent:", ua);
console.log("AppleWebKit:", wkVersion);
console.log("Safari Version:", safariVersion);
</script>

</body>
</html>
