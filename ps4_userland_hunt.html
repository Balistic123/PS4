function hex(n) {
    if (n < 0) n = n >>> 0;
    return '0x' + n.toString(16).padStart(8, '0');
}

class Int64 {
    constructor(low, high) {
        this.low = low >>> 0;
        this.high = high >>> 0;
    }
    
    static fromDouble(d) {
        let buf = new ArrayBuffer(8);
        new Float64Array(buf)[0] = d;
        let parts = new Uint32Array(buf);
        return new Int64(parts[0], parts[1]);
    }
    
    asDouble() {
        let buf = new ArrayBuffer(8);
        let u32 = new Uint32Array(buf);
        u32[0] = this.low;
        u32[1] = this.high;
        return new Float64Array(buf)[0];
    }
    
    toString() {
        return '0x' + this.high.toString(16).padStart(8,'0') + '_' + this.low.toString(16).padStart(8,'0');
    }
}

// Decode JSC NaN-boxed pointer
function decodeJSCPointer(raw) {
    let addr = Int64.fromDouble(raw);
    
    // Check if it's NaN-boxed (0x7ff8... or 0xfff8...)
    let isNaNBoxed = (addr.high & 0xfff80000) === 0x7ff80000 || 
                     (addr.high & 0xfff80000) === 0xfff80000;
    
    if (isNaNBoxed) {
        // Extract actual pointer from NaN-box
        // JSC typically stores pointer in lower bits
        // Exact encoding varies, but let's try common patterns
        
        // Pattern 1: Lower 48 bits are the pointer
        let ptr48_low = addr.low;
        let ptr48_high = addr.high & 0x0000ffff;
        
        // Pattern 2: Might need to unmask differently
        let decoded = new Int64(ptr48_low, ptr48_high);
        
        return {
            raw: addr,
            isNaNBoxed: true,
            decoded: decoded,
            decodedStr: decoded.toString()
        };
    } else {
        return {
            raw: addr,
            isNaNBoxed: false,
            decoded: addr,
            decodedStr: addr.toString()
        };
    }
}
