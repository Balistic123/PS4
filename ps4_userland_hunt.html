function log(msg) {

function hex(n) {
    if (typeof n === 'number') {
        if (n < 0) n = n >>> 0; // Convert to unsigned
        return '0x' + n.toString(16).padStart(8, '0');
    }
    return String(n);
}

function hex64(low, high) {
    return '0x' + high.toString(16).padStart(8, '0') + low.toString(16).padStart(8, '0');
}

function f64_to_u32(f) {
    let buf = new ArrayBuffer(8);
    let f64 = new Float64Array(buf);
    let u32 = new Uint32Array(buf);
    f64[0] = f;
    return [u32[0], u32[1]];
}

function u32_to_f64(low, high) {
    let buf = new ArrayBuffer(8);
    let u32 = new Uint32Array(buf);
    let f64 = new Float64Array(buf);
    u32[0] = low;
    u32[1] = high;
    return f64[0];
}
