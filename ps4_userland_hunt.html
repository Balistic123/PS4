function log(msg, type) {
    var div = document.createElement('div');
    div.className = 'log ' + (type || '');
    div.textContent = '[' + new Date().toISOString().substr(14, 9) + '] ' + msg;

    logDiv.scrollTop = logDiv.scrollHeight;
}

function sep() {
    log('═'.repeat(90), 'info');
}

function hex(num) {
    if (typeof num === 'bigint') {
        return '0x' + num.toString(16);
    }
    if (typeof num === 'number') {
        return '0x' + num.toString(16);
    }
    return String(num);
}

// Type conversion utilities
var conversionBuf = new ArrayBuffer(8);
var f64 = new Float64Array(conversionBuf);
var u32 = new Uint32Array(conversionBuf);
var u8 = new Uint8Array(conversionBuf);

function f2i(val) {
    f64[0] = val;
    return BigInt(u32[0]) + (BigInt(u32[1]) << 32n);
}

function i2f(val) {
    var bigIntVal = BigInt(val);
    u32[0] = Number(bigIntVal & 0xffffffffn);
    u32[1] = Number(bigIntVal >> 32n);
    return f64[0];
}

function f2u32(val) {
    f64[0] = val;
    return [u32[0], u32[1]];
}
