<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>FontFaceSet Raw Data Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: monospace; background: #000; color: #0f0; padding: 20px; font-size: 14px; line-height: 1.6; }
        h1 { color: #0ff; font-size: 24px; margin-bottom: 20px; text-align: center; }
        .btn { padding: 15px 30px; background: #0ff; border: none; color: #000; margin: 10px auto; cursor: pointer; font-size: 16px; font-weight: bold; display: block; width: 300px; }
        .output { background: #111; border: 2px solid #0ff; padding: 20px; margin: 20px 0; }
        .test { margin: 20px 0; padding: 15px; background: #0a0a0a; border-left: 4px solid #0ff; }
        .test-title { color: #ff0; font-size: 18px; font-weight: bold; margin-bottom: 10px; }
        .data { color: #0f0; padding: 5px 0; }
        .label { color: #888; display: inline-block; width: 250px; }
        .value { color: #fff; font-weight: bold; }
        pre { background: #000; color: #0f0; padding: 10px; margin: 10px 0; overflow-x: auto; border: 1px solid #333; }
    </style>
</head>
<body>
    <h1>FontFaceSet Raw Data Test - No Interpretation</h1>
    <button class="btn" onclick="runTests()">RUN RAW DATA TESTS</button>
    <div class="output" id="output"></div>

<script>
function out(html) {
    document.getElementById('output').innerHTML += html;
}

function runTests() {
    document.getElementById('output').innerHTML = '';
    
    out('<div class="test-title">RAW DATA OUTPUT - NO INTERPRETATION</div>');
    out('<div style="color: #888; margin-bottom: 20px;">PS4 Firmware 13.04 | WebKit 605.1.15</div>');
    
    // ============================================
    // TEST 1: Prototype Confusion
    // ============================================
    out('<div class="test">');
    out('<div class="test-title">TEST 1: PROTOTYPE CONFUSION (Raw Data)</div>');
    
    try {
        // Create FontFace
        var ff1 = new FontFace("test1", "");
        out('<div class="data"><span class="label">FontFace created:</span> <span class="value">' + (ff1 ? 'true' : 'false') + '</span></div>');
        
        // Check if prototype property exists
        out('<div class="data"><span class="label">ff1.prototype exists:</span> <span class="value">' + (ff1.prototype !== undefined) + '</span></div>');
        out('<div class="data"><span class="label">ff1.prototype value:</span> <span class="value">' + ff1.prototype + '</span></div>');
        out('<div class="data"><span class="label">typeof ff1.prototype:</span> <span class="value">' + typeof ff1.prototype + '</span></div>');
        
        // Get property descriptor BEFORE modification
        var desc1 = Object.getOwnPropertyDescriptor(ff1, 'prototype');
        out('<div class="data"><span class="label">Has own property "prototype":</span> <span class="value">' + (desc1 !== undefined) + '</span></div>');
        if (desc1) {
            out('<div class="data"><span class="label">descriptor.configurable (before):</span> <span class="value">' + desc1.configurable + '</span></div>');
            out('<div class="data"><span class="label">descriptor.writable (before):</span> <span class="value">' + desc1.writable + '</span></div>');
            out('<div class="data"><span class="label">descriptor.enumerable (before):</span> <span class="value">' + desc1.enumerable + '</span></div>');
        }
        
        out('<div style="height: 10px;"></div>');
        
        // Try to use defineProperty
        var definePropertyWorked = false;
        var definePropertyError = null;
        
        try {
            Object.defineProperty(ff1, 'prototype', {
                configurable: true,
                value: { exploited: true }
            });
            definePropertyWorked = true;
        } catch(e) {
            definePropertyError = e.message;
        }
        
        out('<div class="data"><span class="label">defineProperty executed:</span> <span class="value">' + definePropertyWorked + '</span></div>');
        if (definePropertyError) {
            out('<div class="data"><span class="label">defineProperty error:</span> <span class="value">' + definePropertyError + '</span></div>');
        }
        
        // Get property descriptor AFTER modification
        var desc2 = Object.getOwnPropertyDescriptor(ff1, 'prototype');
        if (desc2) {
            out('<div class="data"><span class="label">descriptor.configurable (after):</span> <span class="value">' + desc2.configurable + '</span></div>');
            out('<div class="data"><span class="label">descriptor.value (after):</span> <span class="value">' + JSON.stringify(desc2.value) + '</span></div>');
        }
        
        out('<div style="height: 10px;"></div>');
        
        // Try __defineGetter__
        var getterCalled = false;
        var getterError = null;
        
        try {
            ff1.__defineGetter__('prototype', function() {
                getterCalled = true;
                return { fromGetter: true };
            });
        } catch(e) {
            getterError = e.message;
        }
        
        out('<div class="data"><span class="label">__defineGetter__ executed:</span> <span class="value">' + (getterError === null) + '</span></div>');
        if (getterError) {
            out('<div class="data"><span class="label">__defineGetter__ error:</span> <span class="value">' + getterError + '</span></div>');
        }
        
        // Try to access prototype to trigger getter
        var protoAfterGetter = ff1.prototype;
        out('<div class="data"><span class="label">Getter was called:</span> <span class="value">' + getterCalled + '</span></div>');
        out('<div class="data"><span class="label">prototype after getter:</span> <span class="value">' + JSON.stringify(protoAfterGetter) + '</span></div>');
        
    } catch(e) {
        out('<div class="data" style="color: #f00;">TEST 1 ERROR: ' + e.message + '</div>');
    }
    
    out('</div>');
    
    // ============================================
    // TEST 2: Property Redefinition with Getter
    // ============================================
    out('<div class="test">');
    out('<div class="test-title">TEST 2: PROPERTY REDEFINITION (Raw Data)</div>');
    
    try {
        var ff2 = new FontFace("test2", "");
        
        // Original family value
        out('<div class="data"><span class="label">Original family:</span> <span class="value">' + ff2.family + '</span></div>');
        
        // Get original descriptor
        var origDesc = Object.getOwnPropertyDescriptor(ff2, 'family');
        out('<div class="data"><span class="label">Original descriptor exists:</span> <span class="value">' + (origDesc !== undefined) + '</span></div>');
        if (origDesc) {
            out('<div class="data"><span class="label">Original configurable:</span> <span class="value">' + origDesc.configurable + '</span></div>');
            out('<div class="data"><span class="label">Original writable:</span> <span class="value">' + origDesc.writable + '</span></div>');
            out('<div class="data"><span class="label">Original has getter:</span> <span class="value">' + (origDesc.get !== undefined) + '</span></div>');
        }
        
        out('<div style="height: 10px;"></div>');
        
        // Try to redefine with custom getter
        var customGetterCalled = false;
        var redefineError = null;
        
        try {
            Object.defineProperty(ff2, 'family', {
                get: function() {
                    customGetterCalled = true;
                    return 'CUSTOM_GETTER_VALUE';
                },
                configurable: true
            });
        } catch(e) {
            redefineError = e.message;
        }
        
        out('<div class="data"><span class="label">Redefine executed:</span> <span class="value">' + (redefineError === null) + '</span></div>');
        if (redefineError) {
            out('<div class="data"><span class="label">Redefine error:</span> <span class="value">' + redefineError + '</span></div>');
        }
        
        // Access family to trigger custom getter
        var familyValue = ff2.family;
        
        out('<div class="data"><span class="label">Custom getter called:</span> <span class="value">' + customGetterCalled + '</span></div>');
        out('<div class="data"><span class="label">family value after redefine:</span> <span class="value">' + familyValue + '</span></div>');
        out('<div class="data"><span class="label">Value equals "CUSTOM_GETTER_VALUE":</span> <span class="value">' + (familyValue === 'CUSTOM_GETTER_VALUE') + '</span></div>');
        
        // Get descriptor after modification
        var newDesc = Object.getOwnPropertyDescriptor(ff2, 'family');
        if (newDesc) {
            out('<div class="data"><span class="label">New descriptor.configurable:</span> <span class="value">' + newDesc.configurable + '</span></div>');
            out('<div class="data"><span class="label">New descriptor has getter:</span> <span class="value">' + (newDesc.get !== undefined) + '</span></div>');
        }
        
    } catch(e) {
        out('<div class="data" style="color: #f00;">TEST 2 ERROR: ' + e.message + '</div>');
    }
    
    out('</div>');
    
    // ============================================
    // TEST 3: FontFaceSet.size Corruption
    // ============================================
    out('<div class="test">');
    out('<div class="test-title">TEST 3: FONTFACESET SIZE CORRUPTION (Raw Data)</div>');
    
    try {
        var ff3 = new FontFace("test3", "");
        var ffs = new FontFaceSet([ff3]);
        
        out('<div class="data"><span class="label">Original FontFaceSet.size:</span> <span class="value">' + ffs.size + '</span></div>');
        out('<div class="data"><span class="label">typeof size:</span> <span class="value">' + typeof ffs.size + '</span></div>');
        
        // Get original descriptor
        var sizeDesc1 = Object.getOwnPropertyDescriptor(ffs, 'size');
        out('<div class="data"><span class="label">size is own property:</span> <span class="value">' + (sizeDesc1 !== undefined) + '</span></div>');
        if (sizeDesc1) {
            out('<div class="data"><span class="label">size.configurable:</span> <span class="value">' + sizeDesc1.configurable + '</span></div>');
            out('<div class="data"><span class="label">size.writable:</span> <span class="value">' + sizeDesc1.writable + '</span></div>');
        }
        
        out('<div style="height: 10px;"></div>');
        
        // Try to corrupt size
        var sizeCorruptError = null;
        
        try {
            Object.defineProperty(ffs, 'size', {
                value: 999999,
                writable: true,
                configurable: true
            });
        } catch(e) {
            sizeCorruptError = e.message;
        }
        
        out('<div class="data"><span class="label">Size corruption executed:</span> <span class="value">' + (sizeCorruptError === null) + '</span></div>');
        if (sizeCorruptError) {
            out('<div class="data"><span class="label">Size corruption error:</span> <span class="value">' + sizeCorruptError + '</span></div>');
        }
        
        // Read size after corruption attempt
        var newSize = ffs.size;
        out('<div class="data"><span class="label">Size after corruption:</span> <span class="value">' + newSize + '</span></div>');
        out('<div class="data"><span class="label">Size equals 999999:</span> <span class="value">' + (newSize === 999999) + '</span></div>');
        
        // Get descriptor after
        var sizeDesc2 = Object.getOwnPropertyDescriptor(ffs, 'size');
        if (sizeDesc2) {
            out('<div class="data"><span class="label">New size.configurable:</span> <span class="value">' + sizeDesc2.configurable + '</span></div>');
            out('<div class="data"><span class="label">New size.value:</span> <span class="value">' + sizeDesc2.value + '</span></div>');
        }
        
        // Check if forEach still works correctly
        var forEachCount = 0;
        try {
            ffs.forEach(function() {
                forEachCount++;
            });
        } catch(e) {
            out('<div class="data"><span class="label">forEach error:</span> <span class="value">' + e.message + '</span></div>');
        }
        
        out('<div class="data"><span class="label">forEach count:</span> <span class="value">' + forEachCount + '</span></div>');
        out('<div class="data"><span class="label">size != forEach count:</span> <span class="value">' + (ffs.size !== forEachCount) + '</span></div>');
        
    } catch(e) {
        out('<div class="data" style="color: #f00;">TEST 3 ERROR: ' + e.message + '</div>');
    }
    
    out('</div>');
    
    // ============================================
    // SUMMARY
    // ============================================
    out('<div class="test">');
    out('<div class="test-title">SUMMARY - BOOLEAN CHECKS</div>');
    out('<div class="data">These values should all be TRUE for exploitability:</div>');
    out('<div style="height: 10px;"></div>');
    
    // We'll set these based on the tests above
    out('<div class="data"><span class="label">1. Prototype became configurable:</span> <span class="value" id="check1">See Test 1</span></div>');
    out('<div class="data"><span class="label">2. Custom getter was called:</span> <span class="value" id="check2">See Test 2</span></div>');
    out('<div class="data"><span class="label">3. Size corrupted to 999999:</span> <span class="value" id="check3">See Test 3</span></div>');
    
    out('</div>');
}

window.onerror = function(msg, url, line) {
    out('<div style="color: #f00; padding: 20px; margin: 20px 0; border: 2px solid #f00;">');
    out('<div style="font-size: 18px; font-weight: bold;">JAVASCRIPT ERROR</div>');
    out('<div>Message: ' + msg + '</div>');
    out('<div>Line: ' + line + '</div>');
    out('</div>');
    return true;
};
</script>
</body>
</html>
