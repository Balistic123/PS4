<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Check JIT Status</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: monospace; background: #000; color: #0f0; padding: 30px; font-size: 16px; }
        h1 { color: #f00; font-size: 28px; margin-bottom: 25px; text-align: center; }
        .result { background: #1a0000; border: 3px solid #f00; padding: 25px; margin: 20px 0; font-size: 18px; }
        .label { color: #0ff; font-weight: bold; margin: 15px 0; font-size: 20px; }
        .value { color: #fff; margin: 10px 0 10px 30px; font-size: 18px; }
        .pass { color: #0f0; font-weight: bold; }
        .fail { color: #f00; font-weight: bold; }
    </style>
</head>
<body>
    <h1>PS4 Browser JIT Status Check</h1>
    <div class="result" id="output"></div>

<script>
function out(html) {
    document.getElementById('output').innerHTML += html;
}

out('<div class="label">Checking for JIT Compilation...</div>');

// Test if functions get JIT compiled
function hotFunction(x) {
    var sum = 0;
    for (var i = 0; i < 1000; i++) {
        sum += x * i;
    }
    return sum;
}

// Call it many times to trigger JIT
for (var i = 0; i < 10000; i++) {
    hotFunction(i);
}

out('<div class="value">Called test function 10,000 times</div>');

// Check if %NeverOptimizeFunction exists (V8)
try {
    eval('%NeverOptimizeFunction(hotFunction)');
    out('<div class="value pass">V8 JIT intrinsics available!</div>');
} catch(e) {
    out('<div class="value fail">V8 JIT intrinsics NOT available</div>');
}

// Check for JSC (WebKit) JIT
out('<div class="label">Checking WebKit/JavaScriptCore...</div>');

// Check user agent
out('<div class="value">User Agent: ' + navigator.userAgent + '</div>');

if (navigator.userAgent.indexOf('WebKit') !== -1) {
    out('<div class="value pass">WebKit detected</div>');
}

// Test for JIT by checking function properties
out('<div class="label">Testing JIT Compilation Artifacts...</div>');

var testFunc = function(a, b) {
    return a + b + a * b - a / b;
};

// Force JIT compilation
for (var i = 0; i < 100000; i++) {
    testFunc(i, i + 1);
}

out('<div class="value">Executed math function 100,000 times</div>');

// Check toString (JIT compiled functions may have different toString)
var funcStr = testFunc.toString();
out('<div class="value">Function toString: ' + funcStr.substring(0, 50) + '...</div>');

// MAIN VERDICT
out('<div class="label" style="margin-top: 30px; font-size: 24px;">VERDICT:</div>');

if (navigator.userAgent.indexOf('PlayStation') !== -1) {
    out('<div class="value fail" style="font-size: 22px;">⚠️ PS4 WebKit Browser: JIT is DISABLED</div>');
    out('<div class="value">PS4 browser runs in interpreter-only mode for security</div>');
    out('<div class="value">This means JIT spraying is NOT possible</div>');
    out('<div class="value" style="margin-top: 20px; color: #ff0;">ALTERNATIVE: Must use data-only attacks or ROP</div>');
} else {
    out('<div class="value warn">Not running on PS4 - cannot determine JIT status</div>');
}
</script>
</body>
</html>
