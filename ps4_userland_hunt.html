<script>
"use strict";

let logBuf = [];

function log(msg, type = 'normal') {
    logBuf.push({ msg, type });
    updateLog();
}

function updateLog() {
    let d = document.getElementById('log');
    if (d) {
        d.innerHTML = logBuf.map(item => {
            let className = '';
            if (item.msg.includes('[+++]') || item.msg.includes('SUCCESS')) className = 'log-line-success';
            else if (item.msg.includes('[ERROR]') || item.msg.includes('FAILED')) className = 'log-line-error';
            else if (item.msg.includes('[+]') || item.msg.includes('WORKING')) className = 'log-line-info';
            else if (item.msg.includes('[!]') || item.msg.includes('WARNING')) className = 'log-line-warning';
            
            return `<span class="${className}">${item.msg}</span>`;
        }).join('\n');
        d.scrollTop = d.scrollHeight;
    }
}

function clearLog() {
    logBuf = [];
    updateLog();
}

function setStatus(id, value, state = 'pending') {
    let el = document.getElementById('status-' + id);
    if (el) {
        el.className = 'status-item ' + state;
        el.querySelector('.value').textContent = value;
    }
}

function hex(n) {
    if (n < 0) n = n >>> 0;
    return '0x' + n.toString(16).padStart(8, '0');
}

class Int64 {
    constructor(low, high) {
        this.low = low >>> 0;
        this.high = high >>> 0;
    }
    
    static fromDouble(d) {
        let buf = new ArrayBuffer(8);
        new Float64Array(buf)[0] = d;
        let parts = new Uint32Array(buf);
        return new Int64(parts[0], parts[1]);
    }
    
    asDouble() {
        let buf = new ArrayBuffer(8);
        let u32 = new Uint32Array(buf);
        u32[0] = this.low;
        u32[1] = this.high;
        return new Float64Array(buf)[0];
    }
    
    toString() {
        return '0x' + this.high.toString(16).padStart(8,'0') + '_' + this.low.toString(16).padStart(8,'0');
    }
}
