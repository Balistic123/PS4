<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>PS4 Fingerprint</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: monospace; background: #000; color: #0f0; padding: 15px; font-size: 12px; }
        h1 { color: #0f0; font-size: 20px; margin-bottom: 15px; }
        .btn { padding: 12px 20px; background: #0f0; border: none; color: #000; margin: 5px; cursor: pointer; font-size: 13px; font-weight: bold; }
        .status { background: rgba(0,255,0,0.1); border: 1px solid #0f0; padding: 10px; margin: 10px 0; }
        #results { margin: 15px 0; }
        .section { background: #0a0a0a; border: 1px solid #0f0; margin: 10px 0; padding: 10px; }
        .section-title { color: #0ff; font-size: 14px; font-weight: bold; margin-bottom: 8px; border-bottom: 1px solid #0f0; padding-bottom: 4px; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th { background: #1a1a1a; color: #0ff; padding: 6px; text-align: left; border: 1px solid #333; }
        td { padding: 4px 6px; border: 1px solid #333; }
        .yes { color: #0f0; font-weight: bold; }
        .no { color: #f00; font-weight: bold; }
        .warn { color: #ff0; font-weight: bold; }
        #textReport { width: 100%; height: 400px; background: #000; color: #0f0; border: 1px solid #0f0; padding: 10px; font-family: monospace; font-size: 10px; }
    </style>
</head>
<body>
    <h1>PS4 COMPLETE FINGERPRINT</h1>
    
    <div>
        <button class="btn" onclick="runAllTests()">RUN ALL TESTS</button>
        <button class="btn" onclick="sendReport()">SEND TO SERVER</button>
        <button class="btn" onclick="copyReport()">COPY REPORT</button>
    </div>
    
    <div class="status" id="status">Ready. Click "RUN ALL TESTS".</div>
    
    <div id="results"></div>
    
    <div class="section">
        <div class="section-title">FULL TEXT REPORT</div>
        <textarea id="textReport" readonly></textarea>
    </div>

<script>
var results = {};
var report = '';

function log(msg) {
    document.getElementById('status').textContent = msg;
}

function addSection(title) {
    var div = document.createElement('div');
    div.className = 'section';
    div.innerHTML = '<div class="section-title">' + title + '</div><table id="t_' + title.replace(/\W/g, '') + '"></table>';
    document.getElementById('results').appendChild(div);
    return 't_' + title.replace(/\W/g, '');
}

function addRow(tid, name, value, status) {
    var t = document.getElementById(tid);
    if (!t) return;
    var r = t.insertRow();
    r.insertCell(0).textContent = name;
    r.insertCell(1).textContent = value;
    var c = r.insertCell(2);
    c.textContent = status === 'yes' ? '✓' : status === 'no' ? '✗' : status === 'warn' ? '⚠' : '•';
    c.className = status || '';
    c.style.textAlign = 'center';
}

function runAllTests() {
    log('Running tests...');
    document.getElementById('results').innerHTML = '';
    
    // Test 1: Basic Info
    var t1 = addSection('01 Basic Info');
    addRow(t1, 'User Agent', navigator.userAgent, '');
    var wk = navigator.userAgent.match(/WebKit\/([0-9.]+)/);
    addRow(t1, 'WebKit', wk ? wk[1] : 'Unknown', 'warn');
    var fw = navigator.userAgent.match(/PlayStation 4\/([0-9.]+)/);
    addRow(t1, 'Firmware', fw ? fw[1] : 'Unknown', 'warn');
    
    // Test 2: JS APIs
    var t2 = addSection('02 JavaScript APIs');
    addRow(t2, 'Promise', typeof Promise !== 'undefined' ? 'Yes' : 'No', typeof Promise !== 'undefined' ? 'yes' : 'no');
    addRow(t2, 'Proxy', typeof Proxy !== 'undefined' ? 'Yes' : 'No', typeof Proxy !== 'undefined' ? 'yes' : 'no');
    addRow(t2, 'Symbol', typeof Symbol !== 'undefined' ? 'Yes' : 'No', typeof Symbol !== 'undefined' ? 'yes' : 'no');
    addRow(t2, 'BigInt', typeof BigInt !== 'undefined' ? 'Yes' : 'No', typeof BigInt !== 'undefined' ? 'yes' : 'no');
    addRow(t2, 'WeakRef', typeof WeakRef !== 'undefined' ? 'Yes' : 'No', typeof WeakRef !== 'undefined' ? 'yes' : 'no');
    addRow(t2, 'FinalizationRegistry', typeof FinalizationRegistry !== 'undefined' ? 'Yes' : 'No', typeof FinalizationRegistry !== 'undefined' ? 'yes' : 'no');
    
    // Test 3: TypedArrays
    var t3 = addSection('03 TypedArrays');
    addRow(t3, 'ArrayBuffer', typeof ArrayBuffer !== 'undefined' ? 'Yes' : 'No', typeof ArrayBuffer !== 'undefined' ? 'yes' : 'no');
    addRow(t3, 'SharedArrayBuffer', typeof SharedArrayBuffer !== 'undefined' ? 'Yes' : 'No', typeof SharedArrayBuffer !== 'undefined' ? 'yes' : 'no');
    addRow(t3, 'DataView', typeof DataView !== 'undefined' ? 'Yes' : 'No', typeof DataView !== 'undefined' ? 'yes' : 'no');
    addRow(t3, 'Uint8Array', typeof Uint8Array !== 'undefined' ? 'Yes' : 'No', typeof Uint8Array !== 'undefined' ? 'yes' : 'no');
    addRow(t3, 'Float64Array', typeof Float64Array !== 'undefined' ? 'Yes' : 'No', typeof Float64Array !== 'undefined' ? 'yes' : 'no');
    addRow(t3, 'Atomics', typeof Atomics !== 'undefined' ? 'Yes' : 'No', typeof Atomics !== 'undefined' ? 'yes' : 'no');
    
    // Test 4: Web APIs
    var t4 = addSection('04 Web APIs');
    addRow(t4, 'fetch', typeof fetch !== 'undefined' ? 'Yes' : 'No', typeof fetch !== 'undefined' ? 'yes' : 'no');
    addRow(t4, 'WebSocket', typeof WebSocket !== 'undefined' ? 'Yes' : 'No', typeof WebSocket !== 'undefined' ? 'yes' : 'no');
    addRow(t4, 'Worker', typeof Worker !== 'undefined' ? 'Yes' : 'No', typeof Worker !== 'undefined' ? 'yes' : 'no');
    addRow(t4, 'ServiceWorker', 'serviceWorker' in navigator ? 'Yes' : 'No', 'serviceWorker' in navigator ? 'yes' : 'no');
    
    // Test 5: WebAssembly
    var t5 = addSection('05 WebAssembly');
    var wasmAvail = typeof WebAssembly !== 'undefined';
    addRow(t5, 'WebAssembly', wasmAvail ? 'Yes' : 'No', wasmAvail ? 'yes' : 'no');
    
    if (wasmAvail) {
        try {
            var wasm = new Uint8Array([0,97,115,109,1,0,0,0,1,7,1,96,0,1,127,3,2,1,0,7,10,1,6,97,110,115,119,101,114,0,0,10,9,1,7,0,65,42,15,11]);
            var mod = new WebAssembly.Module(wasm);
            var inst = new WebAssembly.Instance(mod);
            var res = inst.exports.answer();
            addRow(t5, 'Compile & Execute', 'SUCCESS (returned ' + res + ')', 'yes');
        } catch(e) {
            addRow(t5, 'Compile & Execute', 'Failed: ' + e.message, 'no');
        }
    }
    
    // Test 6: Font APIs (CVE-2021-30858)
    var t6 = addSection('06 Font APIs CVE-2021-30858');
    addRow(t6, 'FontFace', typeof FontFace !== 'undefined' ? 'Yes' : 'No', typeof FontFace !== 'undefined' ? 'yes' : 'no');
    addRow(t6, 'FontFaceSet', typeof FontFaceSet !== 'undefined' ? 'Yes' : 'No', typeof FontFaceSet !== 'undefined' ? 'yes' : 'no');
    
    if (typeof FontFace !== 'undefined' && typeof FontFaceSet !== 'undefined') {
        try {
            var ff = new FontFace("test", "");
            var ffs = new FontFaceSet([ff]);
            addRow(t6, 'CVE-2021-30858 Surface', 'PRESENT!', 'warn');
        } catch(e) {
            addRow(t6, 'CVE-2021-30858 Surface', 'Not exploitable', 'no');
        }
    }
    
    // Test 7: Graphics
    var t7 = addSection('07 Graphics');
    var canvas = document.createElement('canvas');
    var hasCanvas = !!canvas.getContext;
    addRow(t7, 'Canvas', hasCanvas ? 'Yes' : 'No', hasCanvas ? 'yes' : 'no');
    
    if (hasCanvas) {
        var gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
        addRow(t7, 'WebGL', gl ? 'Yes' : 'No', gl ? 'yes' : 'no');
        if (gl) {
            addRow(t7, 'WebGL Vendor', gl.getParameter(gl.VENDOR), 'warn');
            addRow(t7, 'WebGL Renderer', gl.getParameter(gl.RENDERER), 'warn');
        }
    }
    
    // Test 8: Storage
    var t8 = addSection('08 Storage');
    try {
        localStorage.setItem('test', '1');
        localStorage.removeItem('test');
        addRow(t8, 'localStorage', 'Works', 'yes');
    } catch(e) {
        addRow(t8, 'localStorage', 'Error', 'no');
    }
    addRow(t8, 'IndexedDB', typeof indexedDB !== 'undefined' ? 'Yes' : 'No', typeof indexedDB !== 'undefined' ? 'yes' : 'no');
    
    // Test 9: Crypto
    var t9 = addSection('09 Crypto');
    addRow(t9, 'crypto', typeof crypto !== 'undefined' ? 'Yes' : 'No', typeof crypto !== 'undefined' ? 'yes' : 'no');
    addRow(t9, 'crypto.subtle', crypto && crypto.subtle ? 'Yes' : 'No', crypto && crypto.subtle ? 'yes' : 'no');
    
    // Test 10: Security
    var t10 = addSection('10 Security');
    try {
        eval('1+1');
        addRow(t10, 'eval()', 'Allowed', 'warn');
    } catch(e) {
        addRow(t10, 'eval()', 'Blocked', 'yes');
    }
    try {
        new Function('return 1')();
        addRow(t10, 'Function()', 'Allowed', 'warn');
    } catch(e) {
        addRow(t10, 'Function()', 'Blocked', 'yes');
    }
    
    generateReport();
    log('✓ COMPLETE! Results below.');
}

function generateReport() {
    var txt = 'PS4 FINGERPRINT REPORT\n';
    txt += '======================\n';
    txt += 'Generated: ' + new Date().toISOString() + '\n';
    txt += 'UA: ' + navigator.userAgent + '\n\n';
    
    var sections = document.querySelectorAll('.section');
    for (var i = 0; i < sections.length; i++) {
        var title = sections[i].querySelector('.section-title');
        if (title) {
            txt += title.textContent + '\n';
            txt += '---\n';
            
            var table = sections[i].querySelector('table');
            if (table) {
                var rows = table.querySelectorAll('tr');
                for (var j = 0; j < rows.length; j++) {
                    var cells = rows[j].querySelectorAll('td');
                    if (cells.length >= 3) {
                        txt += cells[0].textContent + ': ' + cells[1].textContent + ' ' + cells[2].textContent + '\n';
                    }
                }
            }
            txt += '\n';
        }
    }
    
    report = txt;
    document.getElementById('textReport').value = txt;
    
    // Auto-send
    sendReport();
}

function sendReport() {
    log('Sending to server...');
    
    fetch('http://10.204.17.81:8080/report', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            type: 'ps4_fingerprint',
            textReport: report,
            timestamp: Date.now()
        }),
        mode: 'no-cors'
    })
    .then(function() {
        log('✓ Sent to server!');
    })
    .catch(function() {
        log('⚠ Server not available. Copy manually.');
    });
}

function copyReport() {
    var t = document.getElementById('textReport');
    t.select();
    try {
        document.execCommand('copy');
        log('✓ Copied!');
    } catch(e) {
        log('⚠ Could not copy.');
    }
}

window.onerror = function(msg) { log('ERROR: ' + msg); return true; };
</script>
</body>
</html>
